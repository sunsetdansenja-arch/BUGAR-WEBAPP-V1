<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Portal - Bugar Connect</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { animation: { 'slide-up': 'slideUp 0.4s ease-out', 'fade-in': 'fadeIn 0.3s ease-out' }, keyframes: { slideUp: { 'from': { opacity: '0', transform: 'translateY(20px)' }, 'to': { opacity: '1', transform: 'translateY(0)' } }, fadeIn: { 'from': { opacity: '0' }, 'to': { opacity: '1' } } } } } }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .paper-slip { background-color: #fff; color: #1a1a1a; background-image: radial-gradient(#e5e5e5 1px, transparent 1px); background-size: 20px 20px; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#111111] text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect, useMemo } = React;

        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/239f820a-2d32-4432-a4b1-af48e7f97550";
        const LOGO_URL = "https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png";
        
        const formatIDR = (val) => 'Rp ' + Number(val || 0).toLocaleString('id-ID');

        const getBase64Logo = () => {
            return new Promise((resolve) => {
                const img = new Image(); img.crossOrigin = 'Anonymous'; img.src = LOGO_URL;
                img.onload = () => { const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0); resolve(canvas.toDataURL('image/png')); };
                img.onerror = () => resolve(null);
            });
        };

        const HotelDateRangePicker = ({ value, onChange, title, theme = "dark" }) => {
            const [step, setStep] = useState(0); const [showModal, setShowModal] = useState(false);
            const days = useMemo(() => {
                const arr = []; const today = new Date(); today.setHours(0,0,0,0);
                const getLocalIso = (d) => new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                for(let i=34; i>=0; i--) {
                    const d = new Date(today); d.setDate(d.getDate() - i);
                    arr.push({ date: d, iso: getLocalIso(d), dayStr: d.getDate(), isToday: i===0 });
                } return arr;
            }, []);
            const handleDayClick = (iso) => { if (step === 0 || iso < value.start) { onChange({ start: iso, end: iso }); setStep(1); } else { onChange({ ...value, end: iso }); setStep(0); setShowModal(false); } };
            const formatDateStr = (iso) => { if(!iso) return "-"; const d = new Date(iso); return d.toLocaleDateString('id-ID', {day:'numeric', month:'short'}); };

            const isDark = theme === "dark";
            const boxClass = isDark ? "bg-[#1C1C1E] border border-white/10 text-white hover:border-white/20 shadow-inner" : "bg-[#F2F2F7] border border-gray-200 text-[#1C1C1E] shadow-sm";
            const titleClass = isDark ? "text-gray-500" : "text-gray-400";

            return (
                <div className="w-full">
                    <label className={`text-[10px] uppercase font-black tracking-widest mb-2 block ${titleClass}`}>{title || "Pilih Rentang Waktu"}</label>
                    <div onClick={() => {setShowModal(true); setStep(0);}} className={`${boxClass} rounded-2xl p-4 flex justify-between items-center cursor-pointer active:scale-95 transition-all`}>
                        <div className="flex gap-4 items-center"><i className="fa-regular fa-calendar text-[#0A84FF] text-xl"></i><div><p className={`text-[10px] font-bold uppercase tracking-widest ${titleClass}`}>Mulai</p><p className="text-base font-black">{formatDateStr(value.start)}</p></div></div>
                        <div className={`h-8 w-[1px] ${isDark ? 'bg-white/10' : 'bg-gray-300'}`}></div>
                        <div className="text-right"><p className={`text-[10px] font-bold uppercase tracking-widest ${titleClass}`}>Selesai</p><p className="text-base font-black">{formatDateStr(value.end)}</p></div>
                    </div>
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-fade-in">
                            <div className="bg-[#1C1C1E] w-full max-w-sm rounded-[2.5rem] p-6 shadow-2xl border border-white/10 animate-slide-up relative overflow-hidden">
                                <div className="text-center mb-6"><h3 className="text-lg font-black uppercase tracking-tight text-white">{step === 0 ? "Pilih Tanggal Mulai" : "Pilih Tanggal Selesai"}</h3><p className="text-[10px] text-[#0A84FF] font-bold uppercase tracking-widest mt-1">Maksimal 35 Hari Ke Belakang</p></div>
                                <div className="grid grid-cols-7 gap-2 mb-2">{['Min','Sen','Sel','Rab','Kam','Jum','Sab'].map(d=><div key={d} className="text-center text-[9px] font-black text-gray-500 uppercase">{d}</div>)}</div>
                                <div className="grid grid-cols-7 gap-y-2 gap-x-0 relative">
                                    {Array.from({length: days[0].date.getDay()}).map((_,i) => <div key={`blank-${i}`} />)}
                                    {days.map((d, i) => {
                                        const isStart = d.iso === value.start; const isEnd = d.iso === value.end; const inRange = d.iso > value.start && d.iso < value.end;
                                        let bgClass = "bg-transparent text-gray-300";
                                        if (isStart || isEnd) bgClass = "bg-[#0A84FF] text-white shadow-[0_0_15px_rgba(10,132,255,0.5)] z-10 scale-110 rounded-full";
                                        else if (inRange) bgClass = "bg-[#0A84FF]/20 text-[#0A84FF] rounded-none";
                                        else if (d.isToday) bgClass = "bg-white/10 text-white border border-white/20 rounded-full";
                                        let wrapperClass = "flex justify-center items-center h-10 w-full relative cursor-pointer";
                                        if(isStart && value.start !== value.end) wrapperClass += " rounded-l-full bg-[#0A84FF]/20";
                                        if(isEnd && value.start !== value.end) wrapperClass += " rounded-r-full bg-[#0A84FF]/20";
                                        return (<div key={i} className={wrapperClass} onClick={() => handleDayClick(d.iso)}><div className={`w-8 h-8 flex items-center justify-center font-bold text-sm transition-all ${bgClass}`}>{d.dayStr}</div></div>)
                                    })}
                                </div>
                                <button onClick={()=>setShowModal(false)} className="mt-8 w-full py-4 bg-white/10 text-white font-black uppercase tracking-widest rounded-2xl active:scale-95 text-base hover:bg-white/20 transition-all">Batalkan</button>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        const FinanceView = ({ onLogout, sendToN8N, showToast }) => {
            const isoToday = new Date().toISOString().split('T')[0];
            const [activeTab, setActiveTab] = useState('administrasi');
            
            const [reportSubTab, setReportSubTab] = useState('keuangan'); 
            const [dataOwner, setDataOwner] = useState(null);
            const [filterGajiGlobal, setFilterGajiGlobal] = useState({ start: isoToday, end: isoToday });
            const [gajiGlobalData, setGajiGlobalData] = useState({});
            const [loadingGajiGlobal, setLoadingGajiGlobal] = useState(false);

            const [filterLog, setFilterLog] = useState({ start: isoToday, end: isoToday, cabang: 'ALL' });
            const [logData, setLogData] = useState([]);
            const [loadingLog, setLoadingLog] = useState(false);

            useEffect(() => {
                const loadOwnerData = async () => {
                    try {
                        const res = await sendToN8N('owner_load');
                        let finalData = Array.isArray(res) ? res[0] : res;
                        if (finalData && finalData.json) finalData = finalData.json;
                        setDataOwner(finalData || null);
                    } catch (e) {}
                };
                if(activeTab === 'administrasi' && reportSubTab === 'keuangan' && !dataOwner) {
                    loadOwnerData();
                }
            }, [activeTab, reportSubTab, dataOwner]);

            const fetchGajiGlobal = async () => {
                setLoadingGajiGlobal(true);
                try {
                    const res = await sendToN8N('filter_report', { startDate: filterGajiGlobal.start, endDate: filterGajiGlobal.end, cabang: 'ALL' });
                    let finalData = Array.isArray(res) ? res[0] : res;
                    const rawList = (finalData?.data || finalData?.json?.data)?.daftarTerapis || [];
                    
                    const grouped = {};
                    rawList.forEach(t => {
                        const cab = t.cabang || 'UNKNOWN';
                        if(!grouped[cab]) grouped[cab] = [];
                        grouped[cab].push(t);
                    });
                    setGajiGlobalData(grouped);
                } catch (e) {} setLoadingGajiGlobal(false);
            };

            const fetchLogOrder = async () => {
                setLoadingLog(true);
                try {
                    const res = await sendToN8N('filter_report', { startDate: filterLog.start, endDate: filterLog.end, cabang: filterLog.cabang });
                    let finalData = Array.isArray(res) ? res[0] : res;
                    const rawTransactions = (finalData?.data || finalData?.json?.data)?.rawTransactions || [];
                    setLogData(rawTransactions);
                } catch (e) {} setLoadingLog(false);
            };

            const handleAccBonus = async (item, newPercent) => {
                const targetId = item.db_id || item.id || item.ID;
                if (!targetId) return showToast("Gagal: ID Transaksi tidak ditemukan", "error");

                setLoadingLog(true);
                const res = await sendToN8N('acc_bonus', {
                    id_database: targetId,
                    tagihan: item.TAGIHAN,
                    persen_baru: newPercent
                });

                if (res && res.status === 'success') {
                    showToast(`Bonus ${newPercent}% Berhasil Di-ACC!`);
                    await fetchLogOrder(); 
                } else {
                    showToast('Gagal memproses ACC Bonus', 'error');
                }
                setLoadingLog(false);
            };

            const downloadLaporanBulanIni = async () => {
                if(!dataOwner || !dataOwner.leaderboard) return;
                const { jsPDF } = window.jspdf; const doc = new jsPDF({ format: 'a4' });
                const logo = await getBase64Logo();
                if (logo) doc.addImage(logo, 'PNG', 90, 15, 30, 30);
                
                doc.setFontSize(20); doc.setTextColor(255, 59, 48); doc.setFont(undefined, 'bold'); doc.text("BUGAR REFLEKSI", 105, 55, { align: "center" });
                doc.setFontSize(12); doc.setTextColor(50, 50, 50); doc.text("LAPORAN KEUANGAN KONSOLIDASI", 105, 62, { align: "center" });
                
                doc.setLineWidth(0.5); doc.line(20, 70, 190, 70);
                doc.setFontSize(10); doc.setTextColor(100, 100, 100); doc.setFont(undefined, 'normal');
                const monthName = new Date().toLocaleString('id-ID', { month: 'long', year: 'numeric' });
                doc.text(`Periode Laporan: Bulan ${monthName}`, 20, 80);
                
                let y = 95;
                doc.setFontSize(12); doc.setTextColor(0, 0, 0); doc.setFont(undefined, 'bold');
                doc.text("RINCIAN PER CABANG", 20, y);
                y += 10;
                
                doc.setFont(undefined, 'normal');
                dataOwner.leaderboard.forEach(c => {
                    doc.text(`${c.id}`, 20, y);
                    doc.text(`Omset: ${formatIDR(c.omsetBulanIni)}  |  Beban: ${formatIDR(c.expenseBulanIni)}`, 190, y, { align: 'right' });
                    y += 8;
                });
                
                y += 5; doc.setLineWidth(0.2); doc.line(20, y, 190, y); y += 10;
                
                const totalBranchExpense = dataOwner.leaderboard.reduce((s, c) => s + c.expenseBulanIni, 0);
                const logistikPusatBulanIni = dataOwner.expenseBulanIni - totalBranchExpense;
                
                doc.text("Pengeluaran Logistik Pusat (Global)", 20, y); doc.text(`${formatIDR(logistikPusatBulanIni)}`, 190, y, { align: 'right' });
                y += 15;
                
                doc.setLineWidth(0.5); doc.line(20, y, 190, y); y += 10;
                
                doc.setFont(undefined, 'bold'); doc.setFontSize(14);
                doc.text("TOTAL OMSET KESELURUHAN", 20, y); doc.text(`${formatIDR(dataOwner.grandTotalBulanIni)}`, 190, y, { align: 'right' });
                y += 8;
                doc.setTextColor(255, 59, 48);
                doc.text("HAK KOMISI TERAPIS", 20, y); doc.text(`- ${formatIDR(dataOwner.grandBagiTerapisBulanIni)}`, 190, y, { align: 'right' });
                y += 8;
                doc.text("TOTAL BEBAN KESELURUHAN", 20, y); doc.text(`- ${formatIDR(dataOwner.expenseBulanIni)}`, 190, y, { align: 'right' });
                y += 10;
                
                doc.setLineWidth(1); doc.line(20, y, 190, y); y += 15;
                
                doc.setTextColor(0, 0, 0); doc.setFontSize(18);
                const labaBersih = dataOwner.globalLabaBulanIni;
                if(labaBersih < 0) doc.setTextColor(255, 59, 48);
                doc.text("LABA KOTOR PERUSAHAAN", 20, y); doc.text(`${formatIDR(labaBersih)}`, 190, y, { align: 'right' });
                
                doc.save(`Laporan_Keuangan_${monthName.replace(/\s+/g, '_')}.pdf`);
            };

            const downloadSlipTerapis = async (terapis) => {
                const { jsPDF } = window.jspdf; const doc = new jsPDF({ format: 'a4' });
                const logo = await getBase64Logo();
                if (logo) doc.addImage(logo, 'PNG', 90, 15, 30, 30);
                
                doc.setFontSize(20); doc.setTextColor(255, 59, 48); doc.setFont(undefined, 'bold'); doc.text("BUGAR REFLEKSI", 105, 55, { align: "center" });
                doc.setFontSize(12); doc.setTextColor(50, 50, 50); doc.setFont(undefined, 'normal'); doc.text("SLIP GAJI & KOMISI TERAPIS", 105, 62, { align: "center" });
                
                doc.setLineWidth(0.5); doc.line(20, 70, 190, 70);
                
                doc.setFontSize(12); doc.setTextColor(80, 80, 80);
                doc.text(`Cabang      : ${terapis.cabang}`, 20, 85);
                doc.text(`Nama Terapis: ${terapis.nama}`, 20, 95);
                doc.text(`Periode     : ${filterGajiGlobal.start} s/d ${filterGajiGlobal.end}`, 20, 105);
                
                doc.setLineWidth(0.2); doc.setLineDash([2, 2], 0); doc.line(20, 115, 190, 115); doc.setLineDash([]);
                
                doc.setFontSize(14); doc.setTextColor(0, 0, 0); doc.setFont(undefined, 'bold');
                doc.text("Rincian Kinerja:", 20, 130);
                doc.setFontSize(12); doc.setFont(undefined, 'normal');
                doc.text(`Total Pasien Diselesaikan`, 20, 145); doc.text(`${terapis.totalPasien} Orang`, 190, 145, { align: 'right' });
                doc.text(`Total Komisi (Hak Terapis)`, 20, 155); doc.text(`${formatIDR(terapis.totalKomisi)}`, 190, 155, { align: 'right' });
                
                doc.setLineWidth(0.5); doc.line(20, 175, 190, 175);
                
                doc.setFontSize(20); doc.setFont(undefined, 'bold'); doc.setTextColor(52, 199, 89);
                doc.text("TOTAL DITERIMA", 20, 195); doc.text(`${formatIDR(terapis.totalKomisi)}`, 190, 220, { align: 'right' });
                
                doc.setFontSize(10); doc.setFont(undefined, 'normal'); doc.setTextColor(150, 150, 150);
                doc.text("Dokumen ini sah dan diterbitkan secara otomatis oleh Sistem Bugar Connect.", 105, 230, { align: "center" });
                doc.text("Terima kasih atas dedikasi dan kerja keras Anda!", 105, 236, { align: "center" });
                
                doc.save(`Slip_Gaji_${terapis.nama.replace(/\s+/g, '_')}_${filterGajiGlobal.start}.pdf`);
            };

            return (
                // UPDATE: pb-40 agar konten tidak ketutup navbar bawah
                <div className="min-h-screen bg-[#F2F2F7] pb-40 animate-fade-in font-sans">
                    <nav className="bg-[#1C1C1E] p-4 sticky top-0 z-40 shadow-lg border-b border-white/10">
                        <div className="max-w-xl mx-auto flex justify-between items-center text-white"><div className="flex items-center gap-3"><i className="fa-solid fa-file-invoice-dollar text-[#0A84FF] text-2xl"></i><div><p className="text-[9px] text-[#0A84FF] font-black tracking-widest uppercase">Finance Center</p><h1 className="text-base font-black uppercase tracking-tight">Portal Keuangan</h1></div></div><button onClick={onLogout} className="text-white bg-white/10 px-5 py-2.5 rounded-full text-[10px] font-black hover:bg-[#FF3B30] transition-all tracking-widest">KELUAR</button></div>
                    </nav>

                    {activeTab === 'administrasi' && (
                        <div className="animate-slide-up max-w-xl mx-auto p-4 pt-6 space-y-6">
                            <div className="flex bg-white p-1.5 rounded-2xl border border-gray-200 shadow-sm mb-4">
                                <button onClick={() => setReportSubTab('keuangan')} className={`flex-1 py-3.5 rounded-xl text-[11px] font-black uppercase transition-all tracking-widest ${reportSubTab === 'keuangan' ? 'bg-[#0A84FF] text-white shadow-md' : 'text-gray-500 hover:text-black'}`}>Lap. Konsolidasi</button>
                                <button onClick={() => setReportSubTab('gaji')} className={`flex-1 py-3.5 rounded-xl text-[11px] font-black uppercase transition-all tracking-widest ${reportSubTab === 'gaji' ? 'bg-[#0A84FF] text-white shadow-md' : 'text-gray-500 hover:text-black'}`}>Gaji Terapis</button>
                            </div>

                            {reportSubTab === 'keuangan' && dataOwner && (() => {
                                const monthName = new Date().toLocaleString('id-ID', { month: 'long', year: 'numeric' });
                                const totalBranchExpense = dataOwner.leaderboard.reduce((s, c) => s + c.expenseBulanIni, 0);
                                const logistikPusatBulanIni = dataOwner.expenseBulanIni - totalBranchExpense;
                                const labaBersih = dataOwner.globalLabaBulanIni;
                                
                                return (
                                    <div className="bg-white p-4 sm:p-8 rounded-[2.5rem] border border-gray-100 shadow-sm animate-fade-in">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-xs sm:text-sm font-black uppercase tracking-[0.2em] text-[#1C1C1E] flex items-center gap-2 sm:gap-3"><i className="fa-solid fa-chart-pie text-[#0A84FF]"></i> Laporan Bulan Ini</h3>
                                            <button onClick={downloadLaporanBulanIni} className="bg-[#0A84FF] text-white p-3 rounded-xl hover:bg-blue-600 transition-all"><i className="fa-solid fa-download"></i></button>
                                        </div>
                                        
                                        <div className="paper-slip p-5 sm:p-8 rounded-3xl shadow-inner border border-gray-300 relative">
                                            <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-4 bg-white rounded-b-full"></div>
                                            <h4 className="text-center font-black text-xl sm:text-2xl text-[#FF3B30] mb-1 tracking-tighter uppercase">Bugar Refleksi</h4>
                                            <p className="text-center font-bold text-[8px] sm:text-[10px] uppercase border-b-2 border-dashed border-gray-400 pb-4 mb-5 tracking-[0.3em] text-gray-500">Laporan Konsolidasi</p>
                                            
                                            <p className="text-[9px] sm:text-[10px] font-bold text-gray-600 uppercase tracking-widest bg-gray-100 p-2 sm:p-3 rounded-xl mb-6 text-center">Periode: {monthName}</p>
                                            
                                            {/* UPDATE: Struktur List Cabang Diperbaiki (Anti-Overlap) */}
                                            <div className="space-y-4 mb-6 border-b border-gray-300 pb-6">
                                                {dataOwner.leaderboard.map(c => (
                                                    <div key={c.id} className="flex justify-between items-start sm:items-center text-[10px] sm:text-xs">
                                                        <span className="font-black text-gray-800 uppercase leading-tight mt-0.5">{c.id}</span>
                                                        <div className="text-right flex flex-col gap-1">
                                                            <span className="text-gray-500 font-bold whitespace-nowrap">Omset: {formatIDR(c.omsetBulanIni)}</span> 
                                                            <span className="text-red-500 font-bold whitespace-nowrap">Beban: {formatIDR(c.expenseBulanIni)}</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="flex justify-between items-start text-[10px] sm:text-xs mb-6 border-b border-gray-300 pb-6">
                                                <span className="font-black text-gray-800 uppercase mt-0.5">LOGISTIK PUSAT</span>
                                                <span className="text-red-500 font-bold text-right whitespace-nowrap">- {formatIDR(logistikPusatBulanIni)}</span>
                                            </div>
                                            
                                            <div className="border-t border-b border-gray-300 py-4 mb-6 space-y-3">
                                                <div className="flex justify-between font-black text-sm sm:text-base text-gray-800">
                                                    <span>TOTAL OMSET</span> 
                                                    <span className="text-right text-xs sm:text-base">{formatIDR(dataOwner.grandTotalBulanIni)}</span>
                                                </div>
                                                <div className="flex justify-between font-black text-sm sm:text-base text-red-600">
                                                    <span>HAK TERAPIS</span> 
                                                    <span className="text-right text-xs sm:text-base">- {formatIDR(dataOwner.grandBagiTerapisBulanIni)}</span>
                                                </div>
                                                <div className="flex justify-between font-black text-sm sm:text-base text-red-600">
                                                    <span>TOTAL BEBAN</span> 
                                                    <span className="text-right text-xs sm:text-base">- {formatIDR(dataOwner.expenseBulanIni)}</span>
                                                </div>
                                            </div>

                                            {/* UPDATE: Laba Kotor Dirapikan */}
                                            <div className="flex flex-col items-end sm:flex-row sm:justify-between font-black text-xl text-black sm:items-center gap-1 mt-4">
                                                <span className="text-xs tracking-widest uppercase text-gray-500 self-start sm:self-auto">LABA KOTOR</span> 
                                                <span className={`text-2xl ${labaBersih < 0 ? "text-red-600" : "text-[#34C759]"}`}>{formatIDR(labaBersih)}</span>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })()}
                            {reportSubTab === 'keuangan' && !dataOwner && <div className="text-center py-10"><i className="fa-solid fa-spinner fa-spin text-gray-400 text-3xl"></i></div>}

                            {reportSubTab === 'gaji' && (
                                <div className="animate-fade-in space-y-6">
                                    <div className="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
                                        <HotelDateRangePicker value={filterGajiGlobal} onChange={setFilterGajiGlobal} title="Pilih Periode Penggajian" theme="light" />
                                        <button onClick={fetchGajiGlobal} disabled={loadingGajiGlobal} className="w-full bg-[#0A84FF] text-white font-black py-5 rounded-2xl hover:bg-blue-600 active:scale-95 transition-all text-sm uppercase tracking-widest mt-6 shadow-[0_10px_20px_rgba(10,132,255,0.3)]">
                                            {loadingGajiGlobal ? <i className="fa-solid fa-spinner fa-spin"></i> : "TARIK SEMUA CABANG"}
                                        </button>
                                    </div>

                                    {Object.keys(gajiGlobalData).length > 0 && (
                                        <div className="space-y-6">
                                            {Object.entries(gajiGlobalData).sort(([a],[b])=>a.localeCompare(b)).map(([cabangName, terapisList]) => (
                                                <div key={cabangName} className="bg-white rounded-[2.5rem] border border-gray-200 overflow-hidden shadow-sm animate-fade-in">
                                                    <div className="bg-[#F2F2F7] p-5 border-b border-gray-200 flex items-center gap-3">
                                                        <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm"><i className="fa-solid fa-store text-gray-400"></i></div>
                                                        <h4 className="font-black text-lg text-[#1C1C1E] uppercase tracking-tight">{cabangName}</h4>
                                                    </div>
                                                    <div className="p-4 space-y-3">
                                                        {terapisList.map((t, idx) => (
                                                            <div key={idx} className="bg-[#F2F2F7] p-5 rounded-2xl border border-gray-100">
                                                                <div className="flex justify-between items-center">
                                                                    <div><p className="font-black text-base uppercase text-[#1C1C1E] tracking-tight">{t.nama}</p><p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">{t.totalPasien} Pasien</p></div>
                                                                    <div className="text-right">
                                                                        <p className="text-base font-black text-[#0A84FF] leading-none mb-1">{formatIDR(t.totalKomisi)}</p>
                                                                        <button onClick={() => downloadSlipTerapis(t)} className="mt-2 bg-white hover:bg-gray-50 text-gray-600 px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all active:scale-95 shadow-sm border border-gray-200"><i className="fa-solid fa-print mr-1"></i> PDF A4</button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    {Object.keys(gajiGlobalData).length === 0 && !loadingGajiGlobal && <p className="text-center text-xs font-bold text-gray-400 uppercase tracking-widest py-10">Tarik data untuk melihat gaji.</p>}
                                </div>
                            )}
                        </div>
                    )}

                    {/* TAB: LOG ORDER BUKU BESAR */}
                    {activeTab === 'log_order' && (
                        <div className="animate-slide-up max-w-xl mx-auto p-4 pt-6 space-y-6">
                            <div className="bg-white p-6 sm:p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
                                <h3 className="text-sm font-black uppercase tracking-[0.2em] text-[#1C1C1E] mb-6 flex items-center gap-3"><i className="fa-solid fa-book-open text-[#0A84FF] text-lg"></i> Buku Besar Transaksi</h3>
                                <HotelDateRangePicker value={filterLog} onChange={(val)=>setFilterLog({...filterLog, start:val.start, end:val.end})} title="Filter Periode Waktu" theme="light" />
                                <div className="mt-5 mb-6">
                                    <label className="text-[10px] uppercase font-black tracking-widest mb-2 block text-gray-400">Pilih Cabang</label>
                                    <select className="w-full p-4 bg-[#F2F2F7] text-[#1C1C1E] rounded-2xl outline-none font-bold text-base border border-transparent appearance-none" value={filterLog.cabang} onChange={e => setFilterLog({...filterLog, cabang: e.target.value})}>
                                        <option value="ALL">-- SEMUA CABANG --</option>
                                        {Array.from({length: 12}).map((_, i) => <option key={i} value={`BUGAR${i+1}`}>BUGAR{i+1}</option>)}
                                    </select>
                                </div>
                                <button onClick={fetchLogOrder} disabled={loadingLog} className="w-full bg-[#1C1C1E] text-white font-black py-5 rounded-2xl hover:bg-gray-800 active:scale-95 transition-all text-sm uppercase tracking-widest shadow-lg">
                                    {loadingLog ? <i className="fa-solid fa-spinner fa-spin"></i> : "TARIK LOG ORDER"}
                                </button>
                            </div>

                            <div className="space-y-3">
                                {loadingLog ? <div className="text-center py-10"><i className="fa-solid fa-spinner fa-spin text-gray-400 text-3xl"></i></div> : null}
                                {!loadingLog && logData.length === 0 && <p className="text-center text-xs font-bold text-gray-400 uppercase tracking-widest py-10">Tarik data untuk melihat log.</p>}
                                {logData.map((item, idx) => {
                                    const isBatal = Number(item.TAGIHAN) === 0;
                                    return (
                                        <div key={idx} className={`p-4 sm:p-5 rounded-2xl border transition-all ${isBatal ? 'bg-red-50 border-red-200' : 'bg-white border-gray-200 shadow-sm'}`}>
                                            <div className="flex justify-between items-start border-b border-gray-100 pb-3 mb-3">
                                                <div>
                                                    <span className="bg-[#1C1C1E] text-white text-[8px] sm:text-[9px] px-2 py-1 rounded font-black tracking-widest uppercase">{item.CABANG_ID}</span>
                                                    <span className="text-[9px] sm:text-[10px] text-gray-400 font-bold ml-2">{item.TANGGAL} ({item.JAM_MULAI})</span>
                                                </div>
                                                {isBatal && <span className="text-[8px] sm:text-[9px] text-[#FF3B30] font-black border border-[#FF3B30] px-2 py-0.5 rounded tracking-widest uppercase bg-red-100">Dibatalkan</span>}
                                                {!isBatal && <span className={`text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded border ${item.METODE_BAYAR === 'TRANSFER' ? 'border-[#0A84FF] text-[#0A84FF]' : 'border-[#34C759] text-[#34C759]'}`}>{item.METODE_BAYAR}</span>}
                                            </div>
                                            <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-1 gap-2 sm:gap-0">
                                                <div>
                                                    <h5 className={`font-black text-sm sm:text-base text-[#1C1C1E] uppercase tracking-tight ${isBatal ? 'line-through opacity-60' : ''}`}>{item.NAMA_PASIEN}</h5>
                                                    <p className="text-[9px] sm:text-[10px] text-gray-500 font-bold tracking-widest mt-1">{item.PAKET}</p>
                                                    <p className="text-[8px] sm:text-[9px] text-gray-400 font-black uppercase tracking-widest mt-2">Trp: {item.TERAPIS}</p>
                                                </div>
                                                <div className="text-left sm:text-right">
                                                    <p className={`text-base sm:text-lg font-black ${isBatal ? 'text-[#FF3B30]' : 'text-[#0A84FF]'}`}>{formatIDR(item.TAGIHAN)}</p>
                                                    <p className="text-[8px] sm:text-[9px] text-gray-400 font-bold mt-1 tracking-widest">Id: {item.db_id || item.id}</p>
                                                </div>
                                            </div>
                                            
                                            {/* UI PENDING & APPROVED BONUS KHUSUS FINANCE */}
                                            {!isBatal && item.STATUS_BONUS === 'PENDING' && (
                                                <div className="bg-[#FFCC00]/10 border border-[#FFCC00]/30 p-3 rounded-xl mt-4">
                                                    <p className="text-[10px] font-black text-[#FFCC00] uppercase tracking-widest mb-1"><i className="fa-solid fa-bell mr-1"></i> Pengajuan Bonus Kasir</p>
                                                    <p className="text-[10px] text-gray-600 font-bold mb-3">Alasan Kasir: {item.ALASAN_BONUS || "-"}</p>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => handleAccBonus(item, 40)} className="flex-1 py-2 bg-[#1C1C1E] text-white text-[9px] font-black rounded-lg hover:bg-[#0A84FF] active:scale-95 transition-all">ACC 40%</button>
                                                        <button onClick={() => handleAccBonus(item, 45)} className="flex-1 py-2 bg-[#1C1C1E] text-white text-[9px] font-black rounded-lg hover:bg-[#0A84FF] active:scale-95 transition-all">ACC 45%</button>
                                                        <button onClick={() => handleAccBonus(item, 50)} className="flex-1 py-2 bg-[#1C1C1E] text-white text-[9px] font-black rounded-lg hover:bg-[#0A84FF] active:scale-95 transition-all">ACC 50%</button>
                                                    </div>
                                                </div>
                                            )}
                                            {!isBatal && item.STATUS_BONUS === 'APPROVED' && (
                                                <div className="mt-3 bg-[#34C759]/10 p-2 text-center rounded-lg text-[9px] font-black text-[#34C759] uppercase">
                                                    <i className="fa-solid fa-check-circle mr-1"></i> Bonus Approved
                                                </div>
                                            )}

                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-xl z-50 bg-white/90 backdrop-blur-2xl border-t border-gray-200 pb-8 pt-3 px-6 rounded-t-[2.5rem] shadow-[0_-20px_50px_rgba(0,0,0,0.1)]">
                        <div className="flex justify-between items-center">
                            <button onClick={() => setActiveTab('administrasi')} className={`flex-1 py-2 flex flex-col items-center gap-1.5 transition-all ${activeTab === 'administrasi' ? 'text-[#0A84FF]' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-file-invoice-dollar text-2xl mb-1"></i><span className="text-[9px] font-black uppercase tracking-widest">Administrasi</span></button>
                            <button onClick={() => setActiveTab('log_order')} className={`flex-1 py-2 flex flex-col items-center gap-1.5 transition-all ${activeTab === 'log_order' ? 'text-[#0A84FF]' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-book-open text-2xl mb-1"></i><span className="text-[9px] font-black uppercase tracking-widest">Log Order</span></button>
                            <button onClick={onLogout} className="flex-1 py-2 flex flex-col items-center gap-1.5 transition-all text-gray-400 hover:text-[#FF3B30]"><i className="fa-solid fa-power-off text-2xl mb-1"></i><span className="text-[9px] font-black uppercase tracking-widest">Keluar</span></button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(localStorage.getItem('isLoggedIn') === 'true');
            const [userRole, setUserRole] = useState(localStorage.getItem('userRole') || ''); 
            const [loginData, setLoginData] = useState({ id: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const showToast = (message, type = 'success') => { setToast({ show: true, message, type }); setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000); };

            const handleLogout = () => { localStorage.clear(); setIsLoggedIn(false); setUserRole(''); };

            // AUTO LOGOUT JIKA BUKAN KEUANGAN
            useEffect(() => {
                if (isLoggedIn && userRole !== 'KEUANGAN') {
                    handleLogout();
                }
            }, [isLoggedIn, userRole]);

            const sendToN8N = async (action, payload = {}) => {
                try {
                    const response = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, ...payload }) });
                    const text = await response.text(); if (!text) return {}; const rawData = JSON.parse(text);
                    let unwrapped = Array.isArray(rawData) ? rawData[0] : rawData; return (unwrapped && unwrapped.json) ? unwrapped.json : unwrapped;
                } catch (error) { showToast("Koneksi Error", 'error'); return { status: 'error' }; }
            };

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true);
                const cleanId = loginData.id.trim().toUpperCase(); const cleanPass = loginData.password.trim();
                const res = await sendToN8N('login', { id: cleanId, password: cleanPass });
                
                if (res && res.status === 'success') {
                    if (cleanId.includes('KEUANGAN') || cleanId.includes('FINANCE')) {
                        localStorage.setItem('isLoggedIn', 'true'); localStorage.setItem('userRole', 'KEUANGAN'); localStorage.setItem('activeCabang', cleanId);
                        setUserRole('KEUANGAN'); setIsLoggedIn(true);
                    } else { showToast('Akses Ditolak: Khusus Keuangan', 'error'); }
                } else { showToast(res.message || 'ID atau Password Salah', 'error'); }
                setLoading(false);
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-[#111111] flex items-center justify-center p-6 pb-24 relative overflow-hidden">
                        <div className="absolute top-10 left-10 w-72 h-72 bg-[#0A84FF]/10 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-10 right-10 w-72 h-72 bg-[#34C759]/10 rounded-full blur-3xl"></div>
                        <div className="bg-[#1C1C1E]/80 backdrop-blur-2xl p-10 rounded-[3rem] w-full max-w-md border border-white/10 shadow-[0_30px_60px_rgba(0,0,0,0.5)] relative z-10">
                            <div className="text-center mb-10"><img src={LOGO_URL} alt="Bugar Logo" className="h-20 mx-auto mb-5 drop-shadow-[0_0_20px_rgba(10,132,255,0.4)]" /><h1 className="text-3xl font-black text-white tracking-tighter uppercase leading-none mb-1">Bugar Finance</h1><p className="text-[10px] text-[#0A84FF] uppercase font-black tracking-[0.3em] mt-2">Portal Keuangan V1.0</p></div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <input type="text" placeholder="LOGIN ID" required className="w-full p-5 rounded-2xl bg-black text-white outline-none border border-white/5 focus:border-[#0A84FF] uppercase font-bold transition-all text-center tracking-widest text-base shadow-inner" value={loginData.id} onChange={(e) => setLoginData({...loginData, id: e.target.value})} />
                                <input type="password" placeholder="PASSWORD" required className="w-full p-5 rounded-2xl bg-black text-white outline-none border border-white/5 focus:border-[#0A84FF] font-bold transition-all text-center tracking-widest text-base shadow-inner" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} />
                                <button type="submit" disabled={loading} className="w-full bg-[#0A84FF] text-white font-black py-5 mt-2 rounded-2xl active:scale-95 transition-all shadow-[0_10px_30px_rgba(10,132,255,0.3)] tracking-widest uppercase text-base hover:bg-blue-600">{loading ? <i className="fa-solid fa-spinner fa-spin"></i> : "MASUK SEKARANG"}</button>
                            </form>
                        </div>
                        {toast.show && <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-white font-black text-[10px] uppercase tracking-[0.2em] z-[100] animate-fade-in shadow-2xl ${toast.type === 'success' ? 'bg-[#34C759]' : 'bg-[#FF3B30]'}`}>{toast.message}</div>}
                    </div>
                );
            }

            return (
                <div>
                    {userRole === 'KEUANGAN' && <FinanceView onLogout={handleLogout} sendToN8N={sendToN8N} showToast={showToast} />}
                    {toast.show && <div className={`fixed bottom-32 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-white font-black text-[10px] uppercase tracking-[0.2em] z-[100] animate-fade-in shadow-2xl ${toast.type === 'success' ? 'bg-[#34C759]' : 'bg-[#FF3B30]'}`}>{toast.message}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
