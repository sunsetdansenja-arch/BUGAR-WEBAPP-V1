<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Portal - Bugar Connect</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { animation: { 'slide-up': 'slideUp 0.4s ease-out', 'fade-in': 'fadeIn 0.3s ease-out' }, keyframes: { slideUp: { 'from': { opacity: '0', transform: 'translateY(20px)' }, 'to': { opacity: '1', transform: 'translateY(0)' } }, fadeIn: { 'from': { opacity: '0' }, 'to': { opacity: '1' } } } } } }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .paper-slip { background-color: #fff; color: #1a1a1a; background-image: radial-gradient(#e5e5e5 1px, transparent 1px); background-size: 20px 20px; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input, select, textarea { font-size: 16px !important; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#111111] text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect, useMemo } = React;

        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/239f820a-2d32-4432-a4b1-af48e7f97550";
        const LOGO_URL = "https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png";
        
        const formatIDR = (val) => 'Rp ' + Number(val || 0).toLocaleString('id-ID');

        const getBase64Logo = () => {
            return new Promise((resolve) => {
                const img = new Image(); img.crossOrigin = 'Anonymous'; img.src = LOGO_URL;
                img.onload = () => { const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0); resolve(canvas.toDataURL('image/png')); };
                img.onerror = () => resolve(null);
            });
        };

        const HotelDateRangePicker = ({ value, onChange, title, theme = "dark" }) => {
            const [step, setStep] = useState(0); const [showModal, setShowModal] = useState(false);
            const days = useMemo(() => {
                const arr = []; const today = new Date(); today.setHours(0,0,0,0);
                const getLocalIso = (d) => new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                for(let i=34; i>=0; i--) { const d = new Date(today); d.setDate(d.getDate() - i); arr.push({ date: d, iso: getLocalIso(d), dayStr: d.getDate(), isToday: i===0 }); } return arr;
            }, []);
            const handleDayClick = (iso) => { if (step === 0 || iso < value.start) { onChange({ start: iso, end: iso }); setStep(1); } else { onChange({ ...value, end: iso }); setStep(0); setShowModal(false); } };
            const formatDateStr = (iso) => { if(!iso) return "-"; const d = new Date(iso); return d.toLocaleDateString('id-ID', {day:'numeric', month:'short'}); };
            const isDark = theme === "dark";
            const boxClass = isDark ? "bg-[#1C1C1E] border border-white/10 text-white" : "bg-[#F2F2F7] border border-gray-200 text-[#1C1C1E]";
            return (
                <div className="w-full">
                    <label className="text-[10px] uppercase font-black tracking-widest mb-2 block text-gray-500">{title || "Pilih Rentang Waktu"}</label>
                    <div onClick={() => {setShowModal(true); setStep(0);}} className={`${boxClass} rounded-2xl p-4 flex justify-between items-center cursor-pointer active:scale-95 transition-all shadow-sm`}>
                        <div className="flex gap-4 items-center"><i className="fa-regular fa-calendar text-[#0A84FF] text-xl"></i><div><p className="text-[10px] font-bold uppercase text-gray-400">Mulai</p><p className="text-base font-black">{formatDateStr(value.start)}</p></div></div>
                        <div className="h-8 w-[1px] bg-gray-300"></div>
                        <div className="text-right"><p className="text-[10px] font-bold uppercase text-gray-400">Selesai</p><p className="text-base font-black">{formatDateStr(value.end)}</p></div>
                    </div>
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                            <div className="bg-[#1C1C1E] w-full max-w-sm rounded-[2.5rem] p-6 shadow-2xl border border-white/10">
                                <div className="text-center mb-6"><h3 className="text-lg font-black uppercase text-white">{step === 0 ? "Mulai" : "Selesai"}</h3></div>
                                <div className="grid grid-cols-7 gap-2 mb-2">{['Min','Sen','Sel','Rab','Kam','Jum','Sab'].map(d=><div key={d} className="text-center text-[9px] font-black text-gray-500 uppercase">{d}</div>)}</div>
                                <div className="grid grid-cols-7 gap-y-2">
                                    {Array.from({length: days[0].date.getDay()}).map((_,i) => <div key={`blank-${i}`} />)}
                                    {days.map((d, i) => {
                                        const isStart = d.iso === value.start; const isEnd = d.iso === value.end; const inRange = d.iso > value.start && d.iso < value.end;
                                        let bgClass = isStart || isEnd ? "bg-[#0A84FF] text-white rounded-full shadow-lg scale-110" : inRange ? "bg-[#0A84FF]/20 text-[#0A84FF]" : "text-gray-300";
                                        return (<div key={i} className="flex justify-center items-center h-10 w-full cursor-pointer" onClick={() => handleDayClick(d.iso)}><div className={`w-8 h-8 flex items-center justify-center font-bold text-sm transition-all ${bgClass}`}>{d.dayStr}</div></div>)
                                    })}
                                </div>
                                <button onClick={()=>setShowModal(false)} className="mt-8 w-full py-4 bg-white/10 text-white font-black rounded-2xl tracking-widest uppercase">BATAL</button>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        const FinanceView = ({ onLogout, sendToN8N, showToast }) => {
            const isoToday = new Date().toISOString().split('T')[0];
            const [activeTab, setActiveTab] = useState('administrasi');
            
            const [reportSubTab, setReportSubTab] = useState('keuangan'); 
            const [dataOwner, setDataOwner] = useState(null);
            const [loadingOwner, setLoadingOwner] = useState(false);
            
            const [filterGajiGlobal, setFilterGajiGlobal] = useState({ start: isoToday, end: isoToday });
            const [gajiGlobalData, setGajiGlobalData] = useState({});
            const [loadingGajiGlobal, setLoadingGajiGlobal] = useState(false);

            // STATE UNTUK TAB CEK OMSET HARIAN
            const [filterOmset, setFilterOmset] = useState({ start: isoToday, end: isoToday, cabang: 'ALL' });
            const [omsetData, setOmsetData] = useState(null);
            const [loadingOmset, setLoadingOmset] = useState(false);

            const [filterLog, setFilterLog] = useState({ start: isoToday, end: isoToday, cabang: 'ALL' });
            const [logData, setLogData] = useState([]);
            const [loadingLog, setLoadingLog] = useState(false);
            const [statusFilter, setStatusFilter] = useState('ALL'); 

            const [editModal, setEditModal] = useState({ show: false, data: null });
            const [savingEdit, setSavingEdit] = useState(false);

            const [exportMonth, setExportMonth] = useState(isoToday.substring(0, 7));
            const [exportingPDF, setExportingPDF] = useState(false);

            useEffect(() => {
                const loadOwnerData = async () => {
                    if (loadingOwner || dataOwner) return;
                    setLoadingOwner(true);
                    try {
                        const res = await sendToN8N('owner_load');
                        let finalData = Array.isArray(res) ? res[0] : res;
                        if (finalData && finalData.json) finalData = finalData.json;
                        setDataOwner(finalData || { empty: true });
                    } catch (e) { 
                        setDataOwner({ empty: true }); 
                        showToast("Gagal memuat dashboard", "error"); 
                    }
                    setLoadingOwner(false);
                };
                
                if(activeTab === 'administrasi' && reportSubTab === 'keuangan' && !dataOwner) {
                    loadOwnerData();
                }
                // eslint-disable-next-line
            }, [activeTab, reportSubTab]);

            // FUNGSI CEK OMSET SPESIFIK
            const fetchOmsetSpesifik = async () => {
                setLoadingOmset(true);
                try {
                    const res = await sendToN8N('filter_report', { startDate: filterOmset.start, endDate: filterOmset.end, cabang: filterOmset.cabang });
                    let finalData = Array.isArray(res) ? res[0] : res;
                    setOmsetData(finalData?.data || finalData?.json?.data);
                } catch (e) {
                    showToast('Gagal menarik data omset', 'error');
                }
                setLoadingOmset(false);
            };

            const fetchGajiGlobal = async () => {
                setLoadingGajiGlobal(true);
                try {
                    const res = await sendToN8N('filter_report', { startDate: filterGajiGlobal.start, endDate: filterGajiGlobal.end, cabang: 'ALL' });
                    let finalData = Array.isArray(res) ? res[0] : res;
                    const rawList = (finalData?.data || finalData?.json?.data)?.daftarTerapis || [];
                    
                    const grouped = {};
                    rawList.forEach(t => {
                        const cab = t.cabang || 'UNKNOWN';
                        if(!grouped[cab]) grouped[cab] = [];
                        grouped[cab].push(t);
                    });
                    setGajiGlobalData(grouped);
                } catch (e) {} setLoadingGajiGlobal(false);
            };

            const fetchLogOrder = async () => {
                setLoadingLog(true);
                try {
                    const res = await sendToN8N('filter_report', { startDate: filterLog.start, endDate: filterLog.end, cabang: filterLog.cabang });
                    let finalData = Array.isArray(res) ? res[0] : res;
                    const rawTransactions = (finalData?.data || finalData?.json?.data)?.rawTransactions || [];
                    setLogData(rawTransactions);
                } catch (e) {} setLoadingLog(false);
            };

            const executeUpdateOrder = async (e) => {
                e.preventDefault();
                setSavingEdit(true);
                
                const tagihan = Number(editModal.data.TAGIHAN) || 0;
                const bagiTrp = Number(editModal.data.BAGI_TERAPIS) || 0;
                const bagiOwn = tagihan - bagiTrp;

                const payload = {
                    id_database: editModal.data.db_id || editModal.data.id || editModal.data.ID,
                    NAMA_PASIEN: editModal.data.NAMA_PASIEN,
                    TERAPIS: editModal.data.TERAPIS,
                    TAGIHAN: tagihan,
                    BAGI_TERAPIS: bagiTrp,
                    BAGI_OWNER: bagiOwn,
                    STATUS_BONUS: editModal.data.STATUS_BONUS
                };

                const res = await sendToN8N('update_order', payload);
                if (res && res.status === 'success') {
                    showToast('Transaksi Berhasil Diperbarui!');
                    setEditModal({ show: false, data: null });
                    await fetchLogOrder(); 
                } else {
                    showToast('Gagal memperbarui transaksi', 'error');
                }
                setSavingEdit(false);
            };

            const applyQuickPercent = (percent) => {
                if(!editModal.data) return;
                const tagihan = Number(editModal.data.TAGIHAN) || 0;
                const newTrp = tagihan * (percent / 100);
                setEditModal({ ...editModal, data: { ...editModal.data, BAGI_TERAPIS: newTrp, STATUS_BONUS: 'APPROVED' }});
            };

            const downloadLaporanBulanIni = async () => {
                if(!dataOwner || !dataOwner.leaderboard) return;
                const { jsPDF } = window.jspdf; const doc = new jsPDF({ format: 'a4' });
                const logo = await getBase64Logo(); if (logo) doc.addImage(logo, 'PNG', 90, 15, 30, 30);
                doc.setFontSize(20); doc.setTextColor(255, 59, 48); doc.setFont(undefined, 'bold'); doc.text("BUGAR REFLEKSI", 105, 55, { align: "center" });
                doc.setFontSize(12); doc.setTextColor(50, 50, 50); doc.text("LAPORAN KEUANGAN KONSOLIDASI", 105, 62, { align: "center" });
                
                doc.setLineWidth(0.5); doc.line(20, 70, 190, 70);
                doc.setFontSize(10); doc.setTextColor(100, 100, 100); doc.setFont(undefined, 'normal');
                const monthName = new Date().toLocaleString('id-ID', { month: 'long', year: 'numeric' });
                doc.text(`Periode Laporan: Bulan ${monthName}`, 20, 80);
                
                let y = 95;
                doc.setFontSize(12); doc.setTextColor(0, 0, 0); doc.setFont(undefined, 'bold');
                doc.text("RINCIAN PER CABANG", 20, y);
                y += 10;
                
                doc.setFont(undefined, 'normal');
                dataOwner.leaderboard.forEach(c => {
                    doc.text(`${c.id}`, 20, y);
                    doc.text(`Omset: ${formatIDR(c.omsetBulanIni)}  |  Beban: ${formatIDR(c.expenseBulanIni)}`, 190, y, { align: 'right' });
                    y += 8;
                });
                
                y += 5; doc.setLineWidth(0.2); doc.line(20, y, 190, y); y += 10;
                
                const totalBranchExpense = dataOwner.leaderboard.reduce((s, c) => s + c.expenseBulanIni, 0);
                const logistikPusatBulanIni = dataOwner.expenseBulanIni - totalBranchExpense;
                
                doc.text("Pengeluaran Logistik Pusat (Global)", 20, y); doc.text(`${formatIDR(logistikPusatBulanIni)}`, 190, y, { align: 'right' });
                y += 15;
                
                doc.setLineWidth(0.5); doc.line(20, y, 190, y); y += 10;
                
                doc.setFont(undefined, 'bold'); doc.setFontSize(14);
                doc.text("TOTAL OMSET KESELURUHAN", 20, y); doc.text(`${formatIDR(dataOwner.grandTotalBulanIni)}`, 190, y, { align: 'right' });
                y += 8;
                doc.setTextColor(255, 59, 48);
                doc.text("HAK KOMISI TERAPIS", 20, y); doc.text(`- ${formatIDR(dataOwner.grandBagiTerapisBulanIni)}`, 190, y, { align: 'right' });
                y += 8;
                doc.text("TOTAL BEBAN KESELURUHAN", 20, y); doc.text(`- ${formatIDR(dataOwner.expenseBulanIni)}`, 190, y, { align: 'right' });
                y += 10;
                
                doc.setLineWidth(1); doc.line(20, y, 190, y); y += 15;
                
                doc.setTextColor(0, 0, 0); doc.setFontSize(18);
                const labaBersih = dataOwner.globalLabaBulanIni;
                if(labaBersih < 0) doc.setTextColor(255, 59, 48);
                doc.text("LABA KOTOR PERUSAHAAN", 20, y); doc.text(`${formatIDR(labaBersih)}`, 190, y, { align: 'right' });
                
                doc.save(`Laporan_Keuangan_${monthName.replace(/\s+/g, '_')}.pdf`);
            };

            const handleExportSpecificMonth = async () => {
                if(!exportMonth) return;
                setExportingPDF(true);
                try {
                    const year = exportMonth.split('-')[0];
                    const month = exportMonth.split('-')[1];
                    const lastDay = new Date(year, month, 0).getDate();
                    const startDate = `${exportMonth}-01`;
                    const endDate = `${exportMonth}-${lastDay}`;

                    const res = await sendToN8N('filter_report', { startDate, endDate, cabang: 'ALL' });
                    let finalData = Array.isArray(res) ? res[0] : res;
                    const reportData = (finalData?.data || finalData?.json?.data);

                    if (!reportData || reportData.omset === 0) {
                        showToast("Data tidak ditemukan untuk bulan ini", "error");
                        setExportingPDF(false);
                        return;
                    }

                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ format: 'a4' });
                    const logo = await getBase64Logo(); 
                    if (logo) doc.addImage(logo, 'PNG', 90, 15, 30, 30);
                    
                    doc.setFontSize(20); doc.setTextColor(255, 59, 48); doc.setFont(undefined, 'bold'); 
                    doc.text("BUGAR REFLEKSI", 105, 55, { align: "center" });
                    doc.setFontSize(12); doc.setTextColor(50, 50, 50); 
                    doc.text("LAPORAN PENDAPATAN & PENGELUARAN", 105, 62, { align: "center" });
                    
                    doc.setLineWidth(0.5); doc.line(20, 70, 190, 70);
                    doc.setFontSize(12); doc.setTextColor(0, 0, 0); doc.setFont(undefined, 'normal');
                    
                    const monthName = new Date(year, month - 1).toLocaleString('id-ID', { month: 'long', year: 'numeric' });
                    doc.text(`Periode: Bulan ${monthName}`, 20, 80);
                    
                    let y = 95;
                    doc.setFontSize(14); doc.setFont(undefined, 'bold');
                    doc.text("RINGKASAN KEUANGAN", 20, y);
                    y += 10;
                    
                    const totalKomisi = reportData.omset - reportData.bagiOwner;

                    doc.setFontSize(12); doc.setFont(undefined, 'normal');
                    doc.text("Total Omset Global", 20, y); doc.text(`${formatIDR(reportData.omset)}`, 190, y, { align: 'right' }); y += 8;
                    doc.setTextColor(255, 59, 48);
                    doc.text("Total Beban Laci Keluar", 20, y); doc.text(`- ${formatIDR(reportData.expense)}`, 190, y, { align: 'right' }); y += 8;
                    doc.text("Total Hak Komisi Terapis", 20, y); doc.text(`- ${formatIDR(totalKomisi)}`, 190, y, { align: 'right' }); y += 12;
                    
                    doc.setLineWidth(0.5); doc.line(20, y, 190, y); y += 10;
                    
                    doc.setTextColor(0, 0, 0); doc.setFontSize(16); doc.setFont(undefined, 'bold');
                    const labaBersih = reportData.laba;
                    if(labaBersih < 0) doc.setTextColor(255, 59, 48);
                    else doc.setTextColor(52, 199, 89);
                    doc.text("LABA KOTOR PERUSAHAAN", 20, y); doc.text(`${formatIDR(labaBersih)}`, 190, y, { align: 'right' });
                    
                    y += 20;
                    doc.setTextColor(0, 0, 0); doc.setFontSize(14); doc.setFont(undefined, 'bold');
                    doc.text("RINCIAN KOMISI TERAPIS", 20, y);
                    y += 10;

                    doc.setFontSize(10); doc.setFont(undefined, 'normal');
                    if (reportData.daftarTerapis && reportData.daftarTerapis.length > 0) {
                        reportData.daftarTerapis.forEach(t => {
                            if (y > 270) { doc.addPage(); y = 20; }
                            doc.text(`${t.nama} (${t.cabang}) - ${t.totalPasien} Pasien`, 20, y);
                            doc.text(`${formatIDR(t.totalKomisi)}`, 190, y, { align: 'right' });
                            y += 6;
                        });
                    } else {
                        doc.text("Tidak ada data terapis di bulan ini.", 20, y);
                    }
                    
                    doc.setFontSize(8); doc.setTextColor(150, 150, 150);
                    doc.text("Dicetak otomatis oleh Sistem Bugar Connect V5.16", 105, 290, { align: "center" });

                    doc.save(`Laporan_Keuangan_Bugar_${monthName.replace(/\s+/g, '_')}.pdf`);
                    showToast("PDF Berhasil Diunduh!");
                } catch (e) {
                    showToast("Gagal merakit PDF", "error");
                }
                setExportingPDF(false);
            };

            const downloadSlipTerapis = async (terapis) => {
                const { jsPDF } = window.jspdf; const doc = new jsPDF({ format: 'a4' });
                const logo = await getBase64Logo(); if (logo) doc.addImage(logo, 'PNG', 90, 15, 30, 30);
                doc.setFontSize(20); doc.setTextColor(255, 59, 48); doc.setFont(undefined, 'bold'); doc.text("BUGAR REFLEKSI", 105, 55, { align: "center" });
                doc.setFontSize(12); doc.setTextColor(50, 50, 50); doc.setFont(undefined, 'normal'); doc.text("SLIP GAJI & KOMISI TERAPIS", 105, 62, { align: "center" });
                
                doc.setLineWidth(0.5); doc.line(20, 70, 190, 70);
                
                doc.setFontSize(12); doc.setTextColor(80, 80, 80);
                doc.text(`Cabang      : ${terapis.cabang}`, 20, 85);
                doc.text(`Nama Terapis: ${terapis.nama}`, 20, 95);
                doc.text(`Periode     : ${filterGajiGlobal.start} s/d ${filterGajiGlobal.end}`, 20, 105);
                
                doc.setLineWidth(0.2); doc.setLineDash([2, 2], 0); doc.line(20, 115, 190, 115); doc.setLineDash([]);
                
                doc.setFontSize(14); doc.setTextColor(0, 0, 0); doc.setFont(undefined, 'bold');
                doc.text("Rincian Kinerja:", 20, 130);
                doc.setFontSize(12); doc.setFont(undefined, 'normal');
                doc.text(`Total Pasien Diselesaikan`, 20, 145); doc.text(`${terapis.totalPasien} Orang`, 190, 145, { align: 'right' });
                doc.text(`Total Komisi (Hak Terapis)`, 20, 155); doc.text(`${formatIDR(terapis.totalKomisi)}`, 190, 155, { align: 'right' });
                
                doc.setLineWidth(0.5); doc.line(20, 175, 190, 175);
                
                doc.setFontSize(20); doc.setFont(undefined, 'bold'); doc.setTextColor(52, 199, 89);
                doc.text("TOTAL DITERIMA", 20, 195); doc.text(`${formatIDR(terapis.totalKomisi)}`, 190, 195, { align: 'right' });
                
                doc.setFontSize(10); doc.setFont(undefined, 'normal'); doc.setTextColor(150, 150, 150);
                doc.text("Dokumen ini sah dan diterbitkan secara otomatis oleh Sistem Bugar Connect.", 105, 230, { align: "center" });
                doc.text("Terima kasih atas dedikasi dan kerja keras Anda!", 105, 236, { align: "center" });
                
                doc.save(`Slip_Gaji_${terapis.nama.replace(/\s+/g, '_')}_${filterGajiGlobal.start}.pdf`);
            };

            const displayedLogs = useMemo(() => {
                if (statusFilter === 'PENDING') return logData.filter(i => i.STATUS_BONUS === 'PENDING');
                if (statusFilter === 'APPROVED') return logData.filter(i => i.STATUS_BONUS === 'APPROVED');
                return logData;
            }, [logData, statusFilter]);

            return (
                <div className="min-h-screen bg-[#F2F2F7] pb-32 font-sans text-[#1C1C1E]">
                    <nav className="bg-[#1C1C1E] p-4 sticky top-0 z-40 shadow-lg flex justify-between items-center text-white">
                        <div className="flex items-center gap-3"><i className="fa-solid fa-file-invoice-dollar text-[#0A84FF] text-2xl"></i><h1 className="text-base font-black uppercase tracking-tight">Finance Portal</h1></div>
                        <button onClick={onLogout} className="text-white bg-white/10 px-4 py-2 rounded-full text-[10px] font-black tracking-widest uppercase hover:bg-[#FF3B30] transition-all">Keluar</button>
                    </nav>

                    {activeTab === 'administrasi' && (
                        <div className="max-w-xl mx-auto p-4 space-y-6 animate-slide-up">
                            {/* MENU TIGA SUB-TAB BARU */}
                            <div className="flex bg-white p-1 rounded-2xl border border-gray-200 shadow-sm mt-4">
                                <button onClick={() => setReportSubTab('keuangan')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${reportSubTab === 'keuangan' ? 'bg-[#0A84FF] text-white shadow-md' : 'text-gray-500'}`}>Konsolidasi</button>
                                <button onClick={() => setReportSubTab('omset')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${reportSubTab === 'omset' ? 'bg-[#0A84FF] text-white shadow-md' : 'text-gray-500'}`}>Cek Omset</button>
                                <button onClick={() => setReportSubTab('gaji')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${reportSubTab === 'gaji' ? 'bg-[#0A84FF] text-white shadow-md' : 'text-gray-500'}`}>Gaji Terapis</button>
                            </div>

       const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(localStorage.getItem('finance_isLoggedIn') === 'true');
            const [userRole, setUserRole] = useState(localStorage.getItem('finance_userRole') || ''); 
            const [loginData, setLoginData] = useState({ id: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const showToast = (message, type = 'success') => { setToast({ show: true, message, type }); setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000); };
            
            const handleLogout = () => { 
                localStorage.removeItem('finance_isLoggedIn');
                localStorage.removeItem('finance_userRole');
                localStorage.removeItem('finance_activeCabang');
                setIsLoggedIn(false); setUserRole(''); 
            };

            useEffect(() => { if (isLoggedIn && userRole !== 'KEUANGAN') handleLogout(); }, [isLoggedIn, userRole]);

            const sendToN8N = async (action, payload = {}) => {
                try {
                    const response = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, ...payload }) });
                    const rawData = await response.json();
                    let unwrapped = Array.isArray(rawData) ? rawData[0] : rawData; return unwrapped.json || unwrapped;
                } catch (error) { return null; }
            };

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true);
                const cleanId = loginData.id.trim().toUpperCase();
                const res = await sendToN8N('login', { id: cleanId, password: loginData.password });
                if (res && res.status === 'success') {
                    if (cleanId === 'KEUANGAN' || cleanId.includes('FINANCE')) {
                        localStorage.setItem('finance_isLoggedIn', 'true'); 
                        localStorage.setItem('finance_userRole', 'KEUANGAN'); 
                        localStorage.setItem('finance_activeCabang', cleanId);
                        setUserRole('KEUANGAN'); setIsLoggedIn(true);
                    } else { showToast('Khusus Akun Keuangan!', 'error'); }
                } else { showToast('ID/Password Salah', 'error'); }
                setLoading(false);
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#111111] relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-[#0A84FF]/10 to-[#34C759]/10"></div>
                        <div className="bg-[#1C1C1E]/80 backdrop-blur-2xl p-10 rounded-[3rem] w-full max-w-md border border-white/10 z-10 shadow-[0_30px_60px_rgba(0,0,0,0.5)]">
                            <div className="text-center mb-8"><img src={LOGO_URL} className="h-20 mx-auto mb-4 drop-shadow-[0_0_20px_rgba(10,132,255,0.4)]" /><h1 className="text-3xl font-black uppercase text-white">Bugar Finance</h1><p className="text-[10px] font-black text-[#0A84FF] tracking-[0.3em] mt-1">RECONCILIATION PORTAL V5</p></div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="text" placeholder="ID KEUANGAN" required className="w-full p-5 rounded-2xl bg-black border border-white/5 text-center font-bold uppercase text-white outline-none focus:border-[#0A84FF]" value={loginData.id} onChange={(e)=>setLoginData({...loginData, id: e.target.value})} />
                                <input type="password" placeholder="PASSWORD" required className="w-full p-5 rounded-2xl bg-black border border-white/5 text-center font-bold text-white outline-none focus:border-[#0A84FF]" value={loginData.password} onChange={(e)=>setLoginData({...loginData, password: e.target.value})} />
                                <button type="submit" disabled={loading} className="w-full bg-[#0A84FF] text-white font-black py-5 mt-2 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest">{loading ? "Memproses..." : "MASUK KE PORTAL"}</button>
                            </form>
                        </div>
                        {toast.show && <div className={`fixed bottom-10 px-8 py-4 rounded-full text-white font-black text-[10px] tracking-widest uppercase z-50 animate-fade-in ${toast.type === 'success' ? 'bg-[#34C759]' : 'bg-[#FF3B30]'}`}>{toast.message}</div>}
                    </div>
                );
            }

            return (
                <div>
                    <FinanceView onLogout={handleLogout} sendToN8N={sendToN8N} showToast={showToast} />
                    {toast.show && <div className={`fixed bottom-32 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-white font-black text-[10px] tracking-widest uppercase z-[100] animate-fade-in shadow-2xl ${toast.type === 'success' ? 'bg-[#34C759]' : 'bg-[#FF3B30]'}`}>{toast.message}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
