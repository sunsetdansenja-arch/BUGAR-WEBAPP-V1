<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Review - Bugar Refleksi</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { animation: { 'slide-up': 'slideUp 0.4s ease-out', 'fade-in': 'fadeIn 0.3s ease-out' }, keyframes: { slideUp: { 'from': { opacity: '0', transform: 'translateY(20px)' }, 'to': { opacity: '1', transform: 'translateY(0)' } }, fadeIn: { 'from': { opacity: '0' }, 'to': { opacity: '1' } } } } } }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #111111; color: white; }
        .star-rating i { cursor: pointer; transition: all 0.2s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/239f820a-2d32-4432-a4b1-af48e7f97550";
        const LOGO_URL = "https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png";

        const ReviewApp = () => {
            const [txData, setTxData] = useState(null);
            const [txId, setTxId] = useState('');
            const [rating, setRating] = useState(0);
            const [komplain, setKomplain] = useState('');
            const [saran, setSaran] = useState('');
            
            const [loading, setLoading] = useState(true);
            const [submitting, setSubmitting] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [error, setError] = useState('');

            // LOAD DATA TRANSAKSI SAAT WEB DIBUKA
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (!id) {
                    setError('Link tidak valid. Mohon gunakan link dari WhatsApp Resmi Bugar.');
                    setLoading(false);
                    return;
                }
                setTxId(id);

                // CEK ANTI-SPAM LOKAL
                if (localStorage.getItem(`review_done_${id}`)) {
                    setSubmitted(true);
                    setLoading(false);
                    return;
                }

                fetchData(id);
            }, []);

            const fetchData = async (id) => {
                try {
                    const res = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'get_review_data', id_transaksi: id })
                    });
                    const result = await res.json();
                    const final = Array.isArray(result) ? result[0] : result;
                    const cleanData = final.json ? final.json.data : final.data;

                    if (cleanData) {
                        setTxData(cleanData);
                    } else {
                        setError('Data kunjungan tidak ditemukan.');
                    }
                } catch (e) {
                    setError('Gagal menyambung ke server.');
                }
                setLoading(false);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (rating === 0) return alert('Pilih bintang dulu ya Kak!');
                
                setSubmitting(true);
                try {
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'submit_review',
                            id_transaksi: txId,
                            cabang: txData.cabang,
                            terapis: txData.terapis,
                            rating: rating,
                            komplain: komplain || "-",
                            saran: saran || "-"
                        })
                    });
                    localStorage.setItem(`review_done_${txId}`, 'true');
                    setSubmitted(true);
                } catch (e) {
                    alert('Gagal mengirim ulasan.');
                }
                setSubmitting(false);
            };

            if (loading) return <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#111111]"><i className="fa-solid fa-circle-notch fa-spin text-[#0A84FF] text-4xl mb-4"></i><p className="text-xs font-black uppercase tracking-widest text-gray-500">Mencari data kunjungan Kakak...</p></div>;

            if (error) return <div className="min-h-screen flex items-center justify-center p-6 bg-[#111111] text-center"><div className="bg-[#1C1C1E] p-8 rounded-[2rem] border border-red-500/20"><i className="fa-solid fa-triangle-exclamation text-red-500 text-4xl mb-4"></i><p className="text-sm font-bold text-gray-300">{error}</p></div></div>;

            if (submitted) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#111111] animate-fade-in">
                    <div className="bg-[#1C1C1E] p-10 rounded-[3rem] w-full max-w-md border border-white/10 text-center shadow-2xl">
                        <div className="w-20 h-20 bg-[#34C759]/20 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-check text-[#34C759] text-3xl"></i></div>
                        <h2 className="text-2xl font-black uppercase text-white mb-2">Terima Kasih!</h2>
                        <p className="text-sm text-gray-400">Ulasan Kakak sudah kami terima. Masukan Kakak sangat berarti bagi kami untuk terus meningkatkan layanan.</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-6 bg-[#111111] flex flex-col items-center justify-center font-sans overflow-x-hidden">
                    <div className="w-full max-w-md animate-slide-up">
                        {/* STRUK DIGITAL CARD */}
                        <div className="bg-white text-black p-6 rounded-t-[2.5rem] relative overflow-hidden shadow-xl">
                            <div className="absolute top-0 right-0 p-4 opacity-5"><i className="fa-solid fa-spa text-7xl"></i></div>
                            <img src={LOGO_URL} className="h-10 mb-4" />
                            <h2 className="text-xs font-black uppercase text-gray-400 tracking-widest mb-4">Detail Relaksasi</h2>
                            <div className="space-y-3">
                                <div className="flex justify-between border-b border-gray-100 pb-2"><span className="text-[10px] font-bold text-gray-400 uppercase">Pelanggan</span><span className="text-sm font-black uppercase">{txData.nama}</span></div>
                                <div className="flex justify-between border-b border-gray-100 pb-2"><span className="text-[10px] font-bold text-gray-400 uppercase">Layanan</span><span className="text-sm font-black uppercase">{txData.paket}</span></div>
                                <div className="flex justify-between"><span className="text-[10px] font-bold text-gray-400 uppercase">Terapis</span><span className="text-sm font-black text-[#0A84FF] uppercase">{txData.terapis}</span></div>
                            </div>
                        </div>

                        {/* FORM ULASAN */}
                        <div className="bg-[#1C1C1E] p-8 rounded-b-[2.5rem] border-t-4 border-dashed border-[#111111] shadow-2xl">
                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div className="text-center">
                                    <p className="text-sm font-bold text-gray-300 mb-4 tracking-tight">Bagaimana pengalaman Kakak hari ini?</p>
                                    <div className="flex justify-center gap-3 text-4xl">
                                        {[1,2,3,4,5].map(s => (
                                            <i key={s} onClick={()=>setRating(s)} className={`fa-star ${s <= rating ? 'fa-solid text-[#FFCC00] drop-shadow-[0_0_8px_rgba(255,204,0,0.5)]' : 'fa-regular text-gray-700'} cursor-pointer active:scale-75 transition-all`}></i>
                                        ))}
                                    </div>
                                    <p className="text-[10px] font-black uppercase tracking-widest mt-4 text-[#FFCC00]">
                                        {rating === 1 ? "Sangat Kurang" : rating === 2 ? "Kurang Pas" : rating === 3 ? "Biasa Saja" : rating === 4 ? "Sangat Nyaman" : rating === 5 ? "Luar Biasa!" : ""}
                                    </p>
                                </div>

                                <div className="space-y-4 pt-4">
                                    <textarea placeholder="Keluhan / Komplain (Jika ada)..." className="w-full p-4 bg-black text-white rounded-2xl text-sm font-bold outline-none border border-white/5 focus:border-red-500/50 transition-all resize-none" rows="2" value={komplain} onChange={e=>setKomplain(e.target.value)}></textarea>
                                    <textarea placeholder="Saran & Masukan untuk Bugar..." className="w-full p-4 bg-black text-white rounded-2xl text-sm font-bold outline-none border border-white/5 focus:border-[#0A84FF]/50 transition-all resize-none" rows="2" value={saran} onChange={e=>setSaran(e.target.value)}></textarea>
                                </div>

                                <button type="submit" disabled={submitting || rating === 0} className={`w-full py-5 rounded-2xl font-black text-sm uppercase tracking-widest transition-all ${rating > 0 ? 'bg-[#0A84FF] text-white shadow-[0_10px_30px_rgba(10,132,255,0.3)] active:scale-95' : 'bg-gray-800 text-gray-500 cursor-not-allowed'}`}>
                                    {submitting ? <i className="fa-solid fa-spinner fa-spin"></i> : "Kirim Ulasan Sekarang"}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ReviewApp />);
    </script>
</body>
</html>
