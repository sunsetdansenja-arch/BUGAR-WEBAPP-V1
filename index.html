<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARENA SYSTEM V4.7 - Night Owl Edition</title>
    
    <link rel="icon" href="https://raw.githubusercontent.com/sunsetdansenja-arch/bot-arrena-assets/main/logo%20arena%20gaming.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --mario-orange: #FF6B00; --mario-black: #000000; --mario-yellow: #FFD700; }
        body { font-family: 'Fredoka', sans-serif; background-color: var(--mario-orange); color: var(--mario-black); -webkit-font-smoothing: antialiased; background-image: radial-gradient(rgba(0,0,0,0.05) 2px, transparent 2px); background-size: 20px 20px; }
        .mario-card { background-color: white; border: 4px solid var(--mario-black); border-radius: 16px; box-shadow: 6px 6px 0px 0px var(--mario-black); }
        .mario-btn { background-color: white; border: 4px solid var(--mario-black); border-radius: 12px; box-shadow: 4px 4px 0px 0px var(--mario-black); transition: all 0.1s ease-in-out; font-weight: 700; text-align: center; cursor: pointer; text-decoration: none; }
        .mario-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px var(--mario-black); }
        .mario-input { width: 100%; background-color: #F3F4F6; border: 3px solid var(--mario-black); border-radius: 8px; padding: 10px; font-weight: 600; outline: none; }
        .mario-input:focus { border-color: var(--mario-orange); background-color: white; }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 448px; background: white; border-top: 4px solid var(--mario-black); display: flex; justify-content: space-around; padding: 10px 0; z-index: 50; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; font-weight: bold; color: gray; cursor: pointer; }
        .nav-item.active { color: var(--mario-orange); text-shadow: 1px 1px 0px black; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
        #loader { position: fixed; inset: 0; background: rgba(255,107,0,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 6px solid var(--mario-black); border-top-color: var(--mario-yellow); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .animate-pop { animation: popIn 0.3s forwards; }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } }
    </style>
</head>
<body class="pb-24">

    <div id="loader" class="hidden">
        <div class="spinner mb-4"></div>
        <h2 id="loader-text" class="text-xl font-black text-white">SINKRONISASI...</h2>
    </div>

    <header class="max-w-md mx-auto flex justify-between items-center bg-black p-4 sticky top-0 z-40 border-b-4 border-yellow-400">
        <div>
            <h1 class="text-lg font-black text-white">ARENA SYSTEM</h1>
            <p id="user-info-text" class="text-[10px] font-bold text-yellow-400">V4.7 | Silakan Login</p>
        </div>
        <div id="header-actions" class="hidden flex gap-2">
            <button onclick="APP.loadDashboard()" class="bg-blue-500 text-white p-2 rounded-lg border-2 border-white">🔄</button>
            <button onclick="APP.logout()" class="bg-red-500 text-white p-2 rounded-lg border-2 border-white">🚪 Keluar</button>
        </div>
    </header>

    <main id="app" class="max-w-md mx-auto p-4 mt-2 animate-pop">
        
        <section id="view-login" class="mario-card p-6">
            <h2 class="text-xl font-black mb-6 text-center border-b-4 border-black pb-2 uppercase">Akses Sistem</h2>
            <form id="form-login" class="space-y-4">
                <div><label class="text-xs font-bold">USERNAME</label><input type="text" id="login-user" required class="mario-input"></div>
                <div><label class="text-xs font-bold">PASSWORD</label><input type="password" id="login-pass" required class="mario-input"></div>
                <button type="submit" class="w-full mario-btn bg-[#FFD700] p-4 text-lg mt-4">MASUK 🚀</button>
            </form>
        </section>

        <section id="view-main" class="hidden">
            <div id="main-content" class="pb-10 space-y-4"></div>
        </section>

        <section id="view-owner" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="mario-card p-4 bg-black text-center text-white">
                    <p class="text-[9px] font-bold text-gray-400">OMSET BULAN INI</p>
                    <p id="owner-omset-month" class="text-xl font-black text-yellow-400">Rp 0</p>
                </div>
                <div class="mario-card p-4 bg-[#FFE8B3] text-center">
                    <p class="text-[9px] font-bold text-gray-600">OMSET HARI INI</p>
                    <p id="owner-omset-today" class="text-xl font-black text-[#FF6B00]">Rp 0</p>
                </div>
            </div>
            <div class="bg-black text-white p-2 rounded-lg text-center border-2 border-white mb-2">
                <p class="text-xs font-bold uppercase">RIWAYAT TRANSAKSI BULAN INI</p>
            </div>
            <div id="owner-logs" class="space-y-3 pb-6"></div>
        </section>

    </main>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <div class="nav-item active" onclick="APP.switchTab('logs')" id="tab-logs"><span class="nav-icon">🎮</span>LOGS</div>
        <div class="nav-item" onclick="APP.switchTab('input')" id="tab-input"><span class="nav-icon">📝</span>INPUT</div>
        <div class="nav-item hidden" onclick="APP.switchTab('omset')" id="tab-omset"><span class="nav-icon">📈</span>OMSET</div>
        <div class="nav-item hidden" onclick="APP.switchTab('expense')" id="tab-expense"><span class="nav-icon">💸</span>BIAYA</div>
        <div class="nav-item hidden" onclick="APP.switchTab('report')" id="tab-report"><span class="nav-icon">📊</span>CETAK</div>
    </nav>

    <div id="print-area" class="hidden"></div>

    <script>
        const CONFIG = {
            WEBHOOK_URL: "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/86cee1b8-b00d-4aa6-8ff4-23735dc9afe1", 
            PRICING: {
                Paket: [
                    { name: "Malam", price: 50000 }, { name: "Pagi", price: 45000 }, 
                    { name: "Sore", price: 45000 }, { name: "Sultan 24H", price: 115000 }
                ],
                Regular: [
                    { name: "3 Jam", price: 30000 }, { name: "4 Jam", price: 40000 }, { name: "5 Jam", price: 50000 }
                ]
            }
        };

        const STATE = { user: null, logs: [], expenses: [], activeTab: 'logs', lastFinalPrice: 0 };

        const APP = {
            init: () => {
                document.getElementById('form-login').addEventListener('submit', APP.handleLogin);
                const saved = localStorage.getItem('arena_user_v47');
                if (saved) { STATE.user = JSON.parse(saved); APP.loadDashboard(); }
            },
            showLoader: (t) => { document.getElementById('loader-text').innerText = t; document.getElementById('loader').classList.remove('hidden'); },
            hideLoader: () => document.getElementById('loader').classList.add('hidden'),
            formatRp: (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0),
            
            getTodayStr: () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; },
            getYesterdayStr: () => { const d = new Date(); d.setDate(d.getDate()-1); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; },
            getTomorrowStr: () => { const d = new Date(); d.setDate(d.getDate()+1); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; },
            getMonthStr: () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().substring(0,7); },
            
            generateMonthOptions: () => {
                const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                let opts = '';
                for(let i=0; i<12; i++) {
                    let d = new Date(); d.setMonth(d.getMonth() - i);
                    let val = d.toISOString().substring(0,7);
                    let label = `${monthNames[d.getMonth()]} ${d.getFullYear()}`;
                    opts += `<option value="${val}">${label}</option>`;
                }
                return opts;
            },

            api: async (p) => {
                try {
                    const payloadBody = { action: p.action, data: p };
                    const r = await fetch(CONFIG.WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payloadBody) });
                    if (!r.ok) return [];
                    const txt = await r.text(); return txt ? JSON.parse(txt) : [];
                } catch (e) { return null; }
            },

            handleLogin: async (e) => {
                e.preventDefault();
                APP.showLoader('VERIFIKASI...');
                const data = await APP.api({ action: 'login', username: document.getElementById('login-user').value, password: document.getElementById('login-pass').value });
                APP.hideLoader();
                
                if (data === null) { alert("❌ Gagal Terhubung! Cek koneksi / seting CORS di n8n."); return; }
                let rawUser = Array.isArray(data) ? (data[0]?.json || data[0]) : (data?.json || data);
                
                if (rawUser && rawUser.role) {
                    let roleStr = String(rawUser.role).toLowerCase().trim();
                    let uType = roleStr; let uBranch = "Semua Cabang"; 
                    if(roleStr.startsWith('sh')) {
                        uType = 'owner';
                        if(roleStr.includes('sabang')) uBranch = 'Sabang';
                        else if(roleStr.includes('banda')) uBranch = 'Banda'; 
                        else if(roleStr.includes('atim') || roleStr.includes('aceh timur')) uBranch = 'Aceh Timur';
                    } else {
                        if(rawUser.cabang_arena || rawUser.cabang) uBranch = rawUser.cabang_arena || rawUser.cabang;
                    }
                    STATE.user = { username: rawUser.id_user_arena || rawUser.Users || 'User', userType: uType, branch: uBranch };
                    localStorage.setItem('arena_user_v47', JSON.stringify(STATE.user));
                    APP.loadDashboard();
                } else { alert("❌ Gagal Login. Periksa Username/Password."); }
            },
            logout: () => { localStorage.removeItem('arena_user_v47'); location.reload(); },

            loadDashboard: async () => {
                APP.showLoader('SINKRONISASI...');
                const reqBranch = (STATE.user.userType === 'admin' || STATE.user.userType === 'manager') ? 'ALL' : STATE.user.branch;
                const res = await APP.api({ action: 'get_dashboard', role: STATE.user.userType, branch: reqBranch });
                APP.hideLoader();

                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('header-actions').classList.remove('hidden');
                
                const roleDisplay = STATE.user.userType === 'owner' ? 'SHARE HOLDER' : STATE.user.userType;
                document.getElementById('user-info-text').innerText = `${STATE.user.username.toUpperCase()} | ${roleDisplay.toUpperCase()}`;

                let raw = Array.isArray(res) ? res.map(i => i.json !== undefined ? i.json : i) : [];
                STATE.logs = raw.filter(i => i.tagihan_arena !== undefined);
                STATE.expenses = raw.filter(i => i.pengeluaran_arena !== undefined);

                if (STATE.user.userType === 'owner') {
                    APP.renderOwner();
                } else {
                    document.getElementById('bottom-nav').classList.remove('hidden');
                    document.getElementById('view-main').classList.remove('hidden');
                    if (STATE.user.userType === 'manager') {
                        document.getElementById('tab-omset').classList.remove('hidden');
                        document.getElementById('tab-expense').classList.remove('hidden');
                        document.getElementById('tab-report').classList.remove('hidden');
                    }
                    APP.switchTab(STATE.activeTab);
                }
            },

            switchTab: (tab) => {
                STATE.activeTab = tab;
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.getElementById(`tab-${tab}`).classList.add('active');
                
                const container = document.getElementById('main-content');
                if (tab === 'logs') { container.innerHTML = APP.renderLogsUI(); }
                else if (tab === 'input') { container.innerHTML = APP.renderInputForm(); APP.updateUnitOptions(); APP.updatePrice(); }
                else if (tab === 'omset') { container.innerHTML = APP.renderOmsetTab(); }
                else if (tab === 'expense') { container.innerHTML = APP.renderExpenseForm(); }
                else if (tab === 'report') { container.innerHTML = APP.renderReportTab(); }
            },

            renderOmsetTab: () => {
                const todayStr = APP.getTodayStr(); const yestStr = APP.getYesterdayStr(); const monthStr = APP.getMonthStr();
                let data = { ALL: { t: 0, y: 0, m: 0 }, 'Sabang': { t: 0, y: 0, m: 0 }, 'Banda': { t: 0, y: 0, m: 0 }, 'Aceh Timur': { t: 0, y: 0, m: 0 } };

                STATE.logs.forEach(l => {
                    if (String(l.status_unit_arena).toLowerCase() === 'batal') return; 
                    const dateStr = (l.jam_mulai_sewa || '').substring(0,10);
                    const mStr = (l.jam_mulai_sewa || '').substring(0,7);
                    const val = Number(l.tagihan_arena) || 0;
                    const branch = l.cabang_arena === 'Banda Aceh' ? 'Banda' : l.cabang_arena;

                    if (mStr === monthStr) { data.ALL.m += val; if (data[branch]) data[branch].m += val; }
                    if (dateStr === todayStr) { data.ALL.t += val; if (data[branch]) data[branch].t += val; }
                    if (dateStr === yestStr) { data.ALL.y += val; if (data[branch]) data[branch].y += val; }
                });

                return `
                    <div class="mario-card p-4 animate-pop">
                        <h2 class="font-black text-center border-b-2 border-black pb-2 mb-4 uppercase">Monitoring Omset</h2>
                        <div class="bg-black text-white p-4 rounded-xl border-4 border-yellow-400 mb-4 shadow-[4px_4px_0px_#000]">
                            <p class="text-[10px] font-bold text-gray-300 text-center">TOTAL KESELURUHAN (BULAN INI)</p>
                            <p class="text-3xl font-black text-yellow-400 text-center">${APP.formatRp(data.ALL.m)}</p>
                            <div class="flex justify-between mt-3 pt-3 border-t-2 border-gray-700">
                                <div class="text-left"><p class="text-[9px] text-gray-400 font-bold">HARI INI</p><p class="font-black text-green-400 text-sm">${APP.formatRp(data.ALL.t)}</p></div>
                                <div class="text-right"><p class="text-[9px] text-gray-400 font-bold">KEMARIN</p><p class="font-black text-[#FF6B00] text-sm">${APP.formatRp(data.ALL.y)}</p></div>
                            </div>
                        </div>
                        <h3 class="font-black text-[11px] mb-2 uppercase text-gray-700">Rincian Per Cabang:</h3>
                        <div class="space-y-3">
                            ${['Banda', 'Sabang', 'Aceh Timur'].map(b => `
                                <div class="border-2 border-black p-3 rounded-lg shadow-[2px_2px_0px_#000] bg-white">
                                    <p class="font-black text-sm mb-2 border-b-2 border-dashed border-gray-300 pb-1">${b === 'Banda' ? 'BANDA ACEH' : b.toUpperCase()}</p>
                                    <div class="grid grid-cols-3 gap-1 text-center">
                                        <div><p class="text-[9px] font-bold text-gray-500">HARI INI</p><p class="text-xs font-black text-green-600">${APP.formatRp(data[b].t)}</p></div>
                                        <div><p class="text-[9px] font-bold text-gray-500">KEMARIN</p><p class="text-xs font-black text-gray-700">${APP.formatRp(data[b].y)}</p></div>
                                        <div><p class="text-[9px] font-bold text-gray-500">BULAN INI</p><p class="text-xs font-black text-[#FF6B00]">${APP.formatRp(data[b].m)}</p></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            },

            // --- DASHBOARD KOTAK UNIT WATERMARK ---
            renderUnitBoxes: () => {
                const todayStr = APP.getTodayStr(); 
                const tomorrowStr = APP.getTomorrowStr(); 
                const yestStr = APP.getYesterdayStr(); // FIX BUG SHIFT MALAM!
                const reversedLogs = [...STATE.logs].reverse();
                let html = '<div class="grid grid-cols-3 gap-2 mb-4">';

                for(let i=1; i<=9; i++) {
                    let status = 'kosong'; 
                    const latestLog = reversedLogs.find(l => {
                        const uNum = String(l.unit_arena).replace(/\D/g, ''); 
                        const dStr = (l.jam_mulai_sewa||'').substring(0,10);
                        // Cek 3 Hari (Kemarin, Hari Ini, Besok)
                        return uNum === String(i) && (dStr === todayStr || dStr === tomorrowStr || dStr === yestStr) && String(l.status_unit_arena).toLowerCase() !== 'batal';
                    });

                    if (latestLog) {
                        const stat = String(latestLog.status_unit_arena).toLowerCase();
                        if (stat === 'booked' || stat === 'book') status = 'book';
                        else if (stat === 'playing' || stat === 'main') status = 'main';
                    }

                    let bgClass = 'bg-black text-white'; let statusText = 'KOSONG';
                    if (status === 'book') { bgClass = 'bg-yellow-400 text-black border-yellow-500'; statusText = 'BOOKED'; }
                    else if (status === 'main') { bgClass = 'bg-green-500 text-white border-green-600'; statusText = 'MAIN'; }

                    let branchShadow = 'BANDA';
                    if (i <= 2) branchShadow = 'SABANG';
                    else if (i >= 8) branchShadow = 'ATIM';

                    html += `
                        <div class="border-2 rounded-lg pt-1 pb-2 px-2 text-center shadow-[2px_2px_0px_#000] ${bgClass} flex flex-col justify-center items-center relative">
                            <p class="text-[7px] font-black opacity-50 tracking-widest mb-0.5">${branchShadow}</p>
                            <p class="font-black text-lg leading-none">U${i}</p>
                            <p class="text-[9px] font-bold uppercase mt-1">${statusText}</p>
                        </div>`;
                }
                return html + '</div>';
            },

            renderLogsUI: () => {
                return `
                    <div class="mario-card p-4 animate-pop">
                        <h2 class="font-black text-center border-b-2 border-black pb-2 mb-4 uppercase">Status 9 Unit</h2>
                        <div id="dashboard-unit-boxes">${APP.renderUnitBoxes()}</div>
                        <div class="flex justify-between items-center mb-3 mt-4 border-t-2 border-dashed border-gray-400 pt-4">
                            <h3 class="font-black text-[11px]">LOGS (KEMARIN, HARI INI & BESOK)</h3>
                            <select id="log-filter-cabang" onchange="APP.updateLogList()" class="mario-input w-auto p-1 text-xs">
                                <option value="ALL">Semua Cabang</option><option value="Sabang">Sabang</option><option value="Banda">Banda Aceh</option><option value="Aceh Timur">Aceh Timur</option>
                            </select>
                        </div>
                        <div id="filtered-logs-container" class="space-y-3">${APP.getLogListHTML('ALL')}</div>
                    </div>
                `;
            },
            updateLogList: () => {
                const selCabang = document.getElementById('log-filter-cabang').value;
                document.getElementById('filtered-logs-container').innerHTML = APP.getLogListHTML(selCabang);
            },
            getLogListHTML: (cabangFilter) => {
                const todayStr = APP.getTodayStr(); const yestStr = APP.getYesterdayStr(); const tomorrowStr = APP.getTomorrowStr();
                const recentLogs = STATE.logs.filter(l => { const d = (l.jam_mulai_sewa||'').substring(0,10); return d === todayStr || d === yestStr || d === tomorrowStr; });
                const filtered = recentLogs.filter(l => cabangFilter === 'ALL' || l.cabang_arena === cabangFilter || l.cabang_arena === (cabangFilter === 'Banda Aceh' ? 'Banda' : cabangFilter));
                
                const daysName = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];

                return filtered.reverse().map(l => {
                    const rowId = l.id || l.row_number || l._rowIndex;
                    const unitLabel = String(l.unit_arena).toLowerCase().includes('unit') ? l.unit_arena : 'Unit ' + l.unit_arena;
                    const cabLabel = l.cabang_arena === 'Banda' ? 'Banda Aceh' : l.cabang_arena;

                    let dayStr = '';
                    if (l.jam_mulai_sewa) {
                        const dObj = new Date(l.jam_mulai_sewa.replace(' ', 'T'));
                        if (!isNaN(dObj)) dayStr = daysName[dObj.getDay()];
                    }
                    
                    const waLink = l.link_wa_pelanggan_arena || 'https://wa.me/' + String(l.nomor_pelanggan_arena).replace(/^0/, '62');

                    // SMART UI LOGIC
                    const stat = String(l.status_unit_arena).toLowerCase();
                    const pay = l.pembayaran;

                    let cardClass = "border-2 border-black p-3 rounded-xl bg-white shadow-[2px_2px_0px_#000] relative";
                    let textClass = "";
                    let badgeHtml = "";

                    if (stat === 'batal') {
                        cardClass = "border-2 border-gray-400 p-3 rounded-xl bg-gray-200 opacity-60 relative";
                        textClass = "line-through text-gray-500";
                    } else if (stat === 'booked' || stat === 'book') {
                        cardClass = "border-2 border-yellow-500 p-3 rounded-xl bg-yellow-50 shadow-[2px_2px_0px_#eab308] relative";
                    } else if (stat === 'playing' || stat === 'main') {
                        cardClass = "border-2 border-green-500 p-3 rounded-xl bg-green-50 shadow-[2px_2px_0px_#22c55e] relative";
                        badgeHtml = `<span class="absolute top-3 right-3 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>`;
                    } else if (stat === 'finished' || stat === 'selesai') {
                        if (pay !== 'Lunas') {
                            cardClass = "border-4 border-red-600 p-3 rounded-xl bg-red-50 shadow-[2px_2px_0px_#dc2626] relative";
                            badgeHtml = `<div class="bg-red-600 text-white text-[9px] font-black px-2 py-1 absolute top-0 right-0 rounded-bl-lg rounded-tr-lg animate-pulse shadow-md">⚠️ BELUM BAYAR</div>`;
                        } else {
                            cardClass = "border-2 border-gray-400 p-3 rounded-xl bg-gray-100 shadow-[2px_2px_0px_gray] relative";
                        }
                    }

                    return `
                    <div class="${cardClass}">
                        ${badgeHtml}
                        <div class="flex justify-between items-start mb-2 border-b-2 border-dashed border-gray-300 pb-2">
                            <div class="flex flex-col">
                                <span class="font-black text-xl text-[#FF6B00] leading-none mb-1 ${textClass}">${dayStr}</span>
                                <span class="font-bold text-[10px] text-gray-500">${l.jam_mulai_sewa || ''}</span>
                            </div>
                            <span class="font-black text-[10px] bg-black text-white px-2 py-1 rounded-md h-fit mt-1">${unitLabel} (${cabLabel})</span>
                        </div>
                        <p class="font-bold text-sm uppercase ${textClass}">${l.nama_pelanggan_arena} <span class="text-[10px] text-gray-500 normal-case ml-1">${l.nomor_pelanggan_arena || ''}</span></p>
                        <div class="flex justify-between items-end mt-1">
                            <span class="text-xs font-semibold text-gray-700 ${textClass}">${l.paket_arena}</span><span class="text-sm font-black text-orange-600 ${textClass}">${APP.formatRp(l.tagihan_arena)}</span>
                        </div>
                        <div class="flex gap-1 mt-3 pt-2 border-t border-gray-200">
                            <select onchange="APP.changeStatus('${rowId}', this.value, '${l.pembayaran}')" class="mario-input p-1 text-[9px] w-1/3 font-bold">
                                <option value="booked" ${stat==='booked'?'selected':''}>BOOKED</option>
                                <option value="playing" ${stat==='playing'?'selected':''}>PLAYING</option>
                                <option value="finished" ${stat==='finished'?'selected':''}>FINISHED</option>
                                <option value="batal" ${stat==='batal'?'selected':''}>BATAL ❌</option>
                            </select>
                            <button onclick="APP.togglePayment('${rowId}', '${l.status_unit_arena}', '${l.pembayaran}')" class="mario-btn p-1 text-[9px] w-1/3 ${l.pembayaran==='Lunas'?'bg-green-400':'bg-red-400 text-white'}">
                                ${l.pembayaran==='Lunas'?'✅ LUNAS':'❌ BELUM'}
                            </button>
                            <a href="${waLink}" target="_blank" class="mario-btn p-1 text-[10px] w-1/3 bg-[#25D366] text-white flex items-center justify-center font-black">
                                💬 WA
                            </a>
                        </div>
                    </div>`;
                }).join('') || '<p class="text-center font-bold text-gray-500">Tidak ada log.</p>';
            },

            changeStatus: async (id, newStat, currentPay) => {
                APP.showLoader('UPDATE STATUS...');
                await APP.api({ action: 'update_status', row_id: id, status_unit: newStat, pembayaran: currentPay });
                await APP.loadDashboard();
            },
            togglePayment: async (id, currentStat, currentPay) => {
                const newPay = currentPay === 'Lunas' ? 'Belum' : 'Lunas';
                APP.showLoader('UPDATE BAYAR...');
                await APP.api({ action: 'update_status', row_id: id, status_unit: currentStat, pembayaran: newPay });
                await APP.loadDashboard();
            },

            renderInputForm: () => {
                const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                const b = STATE.user.branch || ''; 
                return `
                <div class="mario-card p-5 animate-pop">
                    <h2 class="font-black text-center border-b-2 border-black pb-2 mb-4">INPUT TRANSAKSI</h2>
                    <form onsubmit="APP.saveRental(event)" class="space-y-3">
                        <div class="grid grid-cols-2 gap-2"><div><label class="text-[10px] font-bold">PELANGGAN</label><input type="text" id="r-name" placeholder="Nama" required class="mario-input p-2 text-sm"></div><div><label class="text-[10px] font-bold">NO WA</label><input type="number" id="r-wa" placeholder="08xx" required class="mario-input p-2 text-sm"></div></div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="text-[10px] font-bold">CABANG</label>
                                <select id="r-branch" onchange="APP.updateUnitOptions()" class="mario-input p-2 text-sm">
                                    <option value="Banda" ${b.includes('Banda')?'selected':''}>Banda Aceh</option>
                                    <option value="Sabang" ${b.includes('Sabang')?'selected':''}>Sabang</option>
                                    <option value="Aceh Timur" ${b.includes('Timur')?'selected':''}>Aceh Timur</option>
                                </select>
                            </div>
                            <div><label class="text-[10px] font-bold">UNIT</label><select id="r-unit" class="mario-input p-2 text-sm" required></select></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2"><div><label class="text-[10px] font-bold">TIPE SEWA</label><select id="r-type" onchange="APP.updatePrice()" class="mario-input p-2 text-sm"><option value="Paket">Paket</option><option value="Regular">Regular</option></select></div><div><label class="text-[10px] font-bold">AMUNISI</label><select id="r-prod" onchange="APP.updatePrice()" class="mario-input p-2 text-sm"></select></div></div>
                        
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <div><label class="text-[10px] font-bold">WAKTU MULAI SEWA</label><input type="datetime-local" id="r-datetime" value="${now.toISOString().slice(0,16)}" required class="mario-input p-2 text-sm"></div>
                            <div><label class="text-[10px] font-bold text-red-600">DISKON (Rp)</label><input type="number" id="r-diskon" placeholder="0" min="0" onkeyup="APP.updatePrice()" onchange="APP.updatePrice()" class="mario-input p-2 text-sm border-red-500 focus:border-red-600"></div>
                        </div>

                        <div class="bg-black text-yellow-400 p-3 rounded-lg text-center mt-2"><p class="text-[10px] font-bold text-gray-300">TOTAL TAGIHAN</p><p id="price-tag" class="text-2xl font-black">Rp 0</p></div>
                        <button type="submit" class="w-full mario-btn bg-yellow-400 p-3 mt-4">SIMPAN 💾</button>
                    </form>
                </div>`;
            },
            updateUnitOptions: () => {
                const branch = document.getElementById('r-branch').value;
                const unitSel = document.getElementById('r-unit');
                if(!unitSel) return;
                
                let opts = '';
                if(branch === 'Sabang') opts = '<option value="1">Unit 1</option><option value="2">Unit 2</option>';
                else if(branch === 'Banda') opts = '<option value="3">Unit 3</option><option value="4">Unit 4</option><option value="5">Unit 5</option><option value="6">Unit 6</option><option value="7">Unit 7</option>';
                else if(branch === 'Aceh Timur') opts = '<option value="8">Unit 8</option><option value="9">Unit 9</option>';
                else opts = '<option value="1">Unit 1</option>';
                unitSel.innerHTML = opts;
            },
            updatePrice: () => {
                const type = document.getElementById('r-type').value;
                const prodSel = document.getElementById('r-prod');
                const diskonInput = document.getElementById('r-diskon');
                
                if(prodSel.options.length === 0 || document.getElementById('r-type').dataset.last !== type) {
                    prodSel.innerHTML = CONFIG.PRICING[type].map((p,i) => `<option value="${i}">${p.name} ${p.time!=='Bebas'?'('+p.time+')':''}</option>`).join('');
                    document.getElementById('r-type').dataset.last = type;
                }
                
                const basePrice = CONFIG.PRICING[type][prodSel.value].price;
                const diskonVal = Number(diskonInput ? diskonInput.value : 0) || 0;
                
                let finalCalc = basePrice - diskonVal;
                if (finalCalc < 0) finalCalc = 0; 
                
                STATE.lastFinalPrice = finalCalc;
                document.getElementById('price-tag').innerText = APP.formatRp(finalCalc);
            },
            saveRental: async (e) => {
                e.preventDefault();
                APP.showLoader('MENYIMPAN...');
                try {
                    const type = document.getElementById('r-type').value;
                    const prodSel = document.getElementById('r-prod');
                    const rawDate = document.getElementById('r-datetime').value || ''; 
                    const formattedDate = rawDate ? rawDate.replace('T', ' ') + (rawDate.length === 16 ? ':00' : '') : '';
                    
                    const finalName = CONFIG.PRICING[type][prodSel.value].name;
                    const diskonVal = Number(document.getElementById('r-diskon').value) || 0;
                    
                    let finalPaket = `${finalName} (${type})`;
                    if (diskonVal > 0) { finalPaket += ` [Diskon ${APP.formatRp(diskonVal)}]`; }

                    await APP.api({
                        action: 'input_rental',
                        name: document.getElementById('r-name').value, wa: document.getElementById('r-wa').value, 
                        branch: document.getElementById('r-branch').value, unit: document.getElementById('r-unit').value,
                        price: STATE.lastFinalPrice, admin_name: STATE.user.username, status_unit: 'booked', pembayaran: 'Belum',
                        paket: finalPaket, jam_mulai_sewa: formattedDate
                    });
                    await APP.loadDashboard();
                    APP.switchTab('logs'); 
                } catch (error) {
                    alert("Gagal memproses input. Mohon coba lagi.");
                    APP.hideLoader();
                }
            },

            renderExpenseForm: () => `
                <div class="mario-card p-5 animate-pop">
                    <h2 class="font-black text-center border-b-2 border-black pb-2 mb-4">INPUT PENGELUARAN</h2>
                    <form onsubmit="APP.saveExpense(event)" class="space-y-3">
                        <div><label class="text-xs font-bold">CABANG</label><select id="exp-branch" class="mario-input p-2 text-sm"><option value="Banda">Banda Aceh</option><option value="Sabang">Sabang</option><option value="Aceh Timur">Aceh Timur</option></select></div>
                        <div><label class="text-xs font-bold">NAMA ITEM</label><input type="text" id="exp-name" required class="mario-input p-2"></div>
                        <div><label class="text-xs font-bold">NOMINAL (Rp)</label><input type="number" id="exp-amount" required class="mario-input p-2"></div>
                        <div><label class="text-xs font-bold">TANGGAL</label><input type="date" id="exp-date" required class="mario-input p-2" value="${APP.getTodayStr()}"></div>
                        <button type="submit" class="w-full mario-btn bg-red-500 text-white p-3 mt-4">SIMPAN PENGELUARAN 💸</button>
                    </form>
                </div>`,
            saveExpense: async (e) => {
                e.preventDefault();
                APP.showLoader('MENYIMPAN...');
                await APP.api({ action: 'add_expense', expense_name: document.getElementById('exp-name').value, expense_amount: document.getElementById('exp-amount').value, expense_date: document.getElementById('exp-date').value, branch: document.getElementById('exp-branch').value });
                await APP.loadDashboard();
            },

            renderReportTab: () => `
                <div class="mario-card p-6 text-center animate-pop">
                    <h2 class="text-xl font-black mb-4 border-b-4 border-black pb-2">MESIN CETAK LAPORAN</h2>
                    <div class="space-y-3 text-left mb-6">
                        <div><label class="text-xs font-bold">PILIH CABANG</label><select id="report-branch" class="mario-input p-2 text-sm"><option value="ALL">Semua Cabang</option><option value="Sabang">Sabang</option><option value="Banda">Banda Aceh</option><option value="Aceh Timur">Aceh Timur</option></select></div>
                        <div><label class="text-xs font-bold">PILIH BULAN</label><select id="report-month" class="mario-input p-2 text-sm">${APP.generateMonthOptions()}</select></div>
                    </div>
                    <button onclick="APP.printReport()" class="w-full mario-btn bg-black text-white p-4">🖨️ CETAK LAPORAN A4</button>
                </div>
            `,
            printReport: () => {
                const branch = document.getElementById('report-branch').value;
                const month = document.getElementById('report-month').value; 
                const monthLabel = document.getElementById('report-month').options[document.getElementById('report-month').selectedIndex].text;

                let rowHTML = ''; let totalOmset = 0;
                STATE.logs.forEach(l => {
                    const dateStr = (l.jam_mulai_sewa||'').substring(0,7); 
                    const matchBranch = branch === 'ALL' || l.cabang_arena === branch || (branch === 'Banda' && l.cabang_arena === 'Banda');
                    if (matchBranch && dateStr === month && String(l.status_unit_arena).toLowerCase() !== 'batal') {
                        totalOmset += Number(l.tagihan_arena);
                        rowHTML += `<tr><td style="border:1px solid #000; padding:8px;">${(l.jam_mulai_sewa||'').substring(0,10)}</td><td style="border:1px solid #000; padding:8px;">${l.cabang_arena} / U${l.unit_arena}</td><td style="border:1px solid #000; padding:8px;">${l.nama_pelanggan_arena}</td><td style="border:1px solid #000; padding:8px;">${l.paket_arena}</td><td style="border:1px solid #000; padding:8px; text-align:right;">${APP.formatRp(l.tagihan_arena)}</td></tr>`;
                    }
                });

                document.getElementById('print-area').innerHTML = `
                    <h1 style="text-align:center; font-size:24px; margin-bottom:5px;">LAPORAN OMSET ARENA PLAYBOX</h1>
                    <h2 style="text-align:center; font-size:18px; margin-bottom:20px;">Periode: ${monthLabel} | Cabang: ${branch === 'Banda' ? 'Banda Aceh' : branch}</h2>
                    <p style="margin-bottom:10px; font-weight:bold;">Dicetak Oleh: ${STATE.user.username.toUpperCase()}</p>
                    <table style="width:100%; border-collapse: collapse; text-align:left; font-size:12px;">
                        <tr style="background:#eee;"><th style="border:1px solid #000; padding:8px;">Tanggal</th><th style="border:1px solid #000; padding:8px;">Unit</th><th style="border:1px solid #000; padding:8px;">Pelanggan</th><th style="border:1px solid #000; padding:8px;">Sewa</th><th style="border:1px solid #000; padding:8px; text-align:right;">Tagihan</th></tr>
                        ${rowHTML || '<tr><td colspan="5" style="text-align:center; padding:10px;">Tidak ada data.</td></tr>'}
                        <tr><td colspan="4" style="border:1px solid #000; padding:10px; text-align:right; font-weight:bold; font-size:14px;">TOTAL OMSET (KOTOR)</td><td style="border:1px solid #000; padding:10px; text-align:right; font-weight:bold; font-size:14px;">${APP.formatRp(totalOmset)}</td></tr>
                    </table>
                `;
                document.getElementById('print-area').classList.remove('hidden'); window.print(); document.getElementById('print-area').classList.add('hidden');
            },

            renderOwner: () => {
                document.getElementById('view-owner').classList.remove('hidden');
                const branchStr = STATE.user.branch; const todayStr = APP.getTodayStr(); const monthStr = APP.getMonthStr(); 
                let omsetToday = 0; let omsetMonth = 0;
                
                const ownerLogs = STATE.logs.filter(l => {
                    const dateStr = (l.jam_mulai_sewa || '').substring(0,10);
                    return (l.cabang_arena === branchStr || (branchStr==='Banda Aceh' && l.cabang_arena==='Banda')) && dateStr.startsWith(monthStr) && String(l.status_unit_arena).toLowerCase() !== 'batal';
                });

                ownerLogs.forEach(l => {
                    if ((l.jam_mulai_sewa||'').substring(0,10) === todayStr) omsetToday += Number(l.tagihan_arena);
                    omsetMonth += Number(l.tagihan_arena);
                });

                document.getElementById('owner-omset-today').innerText = APP.formatRp(omsetToday); document.getElementById('owner-omset-month').innerText = APP.formatRp(omsetMonth);
                
                const daysName = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
                document.getElementById('owner-logs').innerHTML = ownerLogs.reverse().map(l => {
                    let dayStr = '';
                    if (l.jam_mulai_sewa) {
                        const dObj = new Date(l.jam_mulai_sewa.replace(' ', 'T'));
                        if (!isNaN(dObj)) dayStr = daysName[dObj.getDay()];
                    }
                    return `
                    <div class="mario-card p-3 bg-white flex justify-between items-center text-xs">
                        <div>
                            <p class="font-black text-sm text-[#FF6B00] leading-none mb-1">${dayStr}</p>
                            <p class="font-black">${l.nama_pelanggan_arena} <span class="bg-gray-200 px-1 rounded text-[10px]">U${l.unit_arena}</span></p>
                            <p class="text-[10px] text-gray-500 font-bold">${(l.jam_mulai_sewa||'').substring(0,16)}</p>
                        </div>
                        <div class="text-right"><p class="font-black text-green-600">${APP.formatRp(l.tagihan_arena)}</p><p class="text-[10px] font-bold text-gray-400">${l.paket_arena}</p></div>
                    </div>`
                }).join('') || '<p class="text-center text-white font-bold">Tidak ada riwayat.</p>';
            }
        };
        APP.init();
    </script>
</body>
</html>
