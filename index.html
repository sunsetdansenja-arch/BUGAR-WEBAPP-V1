<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bugar Connect V5.12 - Core System</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { animation: { 'slide-up': 'slideUp 0.4s ease-out', 'fade-in': 'fadeIn 0.3s ease-out' }, keyframes: { slideUp: { 'from': { opacity: '0', transform: 'translateY(20px)' }, 'to': { opacity: '1', transform: 'translateY(0)' } }, fadeIn: { 'from': { opacity: '0' }, 'to': { opacity: '1' } } } } } }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input, select, textarea { font-size: 16px !important; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#111111] text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect, useMemo, useRef } = React;

        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/239f820a-2d32-4432-a4b1-af48e7f97550";
        const LOGO_URL = "https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png";
        
        const PAKET_STANDAR = ["Paket 1 (70 Menit) - Rp 100.000", "Paket 2 (90 Menit) - Rp 120.000", "Paket 3 (120 Menit) - Rp 140.000", "Paket 4 (120 Menit) - Rp 150.000", "Paket 5 (120 Menit) - Rp 150.000", "Paket 6 (120 Menit) - Rp 170.000", "Paket 7 (120 Menit) - Rp 200.000", "Paket 8 - Rp 300.000: Chiropractic"];
        const PAKET_LHOKSEUMAWE = ["Paket 1 (1.5 Jam) - Rp 100.000", "Paket 2 (2 Jam) - Rp 120.000", "Paket 3 (2 Jam) - Rp 130.000", "Paket 4 (2 Jam) - Rp 150.000", "Paket 5 (2.5 Jam) - Rp 200.000", "Paket 6 (2 Jam) - Rp 150.000", "Paket 7 - Rp 300.000: Chiropractic", "Paket 8 (2.5 Jam) - Rp 200.000", "Paket 9 (2.5 Jam) - Rp 200.000", "Paket 10 (3 Jam) - Rp 350.000"];
        const PAKET_HOTEL = ["Paket Hotel Hermes - Rp 180.000", "Paket Hotel Kriyad - Rp 200.000", "Paket Hotel Plum Lading - Rp 160.000", "Paket Hotel The Pade - Rp 180.000", "Paket Premium (Hotel) - Rp 220.000", "Paket Reguler (Hotel) - Rp 200.000", "Paket Standart (Hotel) - Rp 180.000"];
        const PAKET_NON = ["BODY MASSAGE (60 Menit) - Rp 80.000", "REFLEKSI (60 Menit) - Rp 80.000", "BEKAM BASAH (60 Menit) - Rp 80.000", "LULUR - Rp 80.000", "TOTOK WAJAH (20 Menit) - Rp 60.000", "PIJAT KEPALA (20 Menit) - Rp 60.000", "TERAPI TELINGA - Rp 60.000", "BEKAM KERING - Rp 50.000"];
        
        const formatIDR = (val) => 'Rp ' + Number(val || 0).toLocaleString('id-ID');

        const HotelDateRangePicker = ({ value, onChange, title, theme = "dark" }) => {
            const [step, setStep] = useState(0); const [showModal, setShowModal] = useState(false);
            const days = useMemo(() => {
                const arr = []; const today = new Date(); today.setHours(0,0,0,0);
                const getLocalIso = (d) => new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                for(let i=34; i>=0; i--) { const d = new Date(today); d.setDate(d.getDate() - i); arr.push({ date: d, iso: getLocalIso(d), dayStr: d.getDate(), isToday: i===0 }); } return arr;
            }, []);
            const handleDayClick = (iso) => { if (step === 0 || iso < value.start) { onChange({ start: iso, end: iso }); setStep(1); } else { onChange({ ...value, end: iso }); setStep(0); setShowModal(false); } };
            const formatDateStr = (iso) => { if(!iso) return "-"; const d = new Date(iso); return d.toLocaleDateString('id-ID', {day:'numeric', month:'short'}); };

            const isDark = theme === "dark";
            const boxClass = isDark ? "bg-[#1C1C1E] border border-white/10 text-white hover:border-white/20 shadow-inner" : "bg-[#F2F2F7] border border-gray-200 text-[#1C1C1E] shadow-sm";
            const titleClass = isDark ? "text-gray-500" : "text-gray-400";

            return (
                <div className="w-full">
                    <label className={`text-[10px] uppercase font-black tracking-widest mb-2 block ${titleClass}`}>{title || "Pilih Rentang Waktu"}</label>
                    <div onClick={() => {setShowModal(true); setStep(0);}} className={`${boxClass} rounded-2xl p-4 flex justify-between items-center cursor-pointer active:scale-95 transition-all`}>
                        <div className="flex gap-4 items-center"><i className="fa-regular fa-calendar text-[#0A84FF] text-xl"></i><div><p className={`text-[10px] font-bold uppercase tracking-widest ${titleClass}`}>Mulai</p><p className="text-base font-black">{formatDateStr(value.start)}</p></div></div>
                        <div className={`h-8 w-[1px] ${isDark ? 'bg-white/10' : 'bg-gray-300'}`}></div>
                        <div className="text-right"><p className={`text-[10px] font-bold uppercase tracking-widest ${titleClass}`}>Selesai</p><p className="text-base font-black">{formatDateStr(value.end)}</p></div>
                    </div>
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-fade-in">
                            <div className="bg-[#1C1C1E] w-full max-w-sm rounded-[2.5rem] p-6 shadow-2xl border border-white/10 animate-slide-up relative overflow-hidden">
                                <div className="text-center mb-6"><h3 className="text-lg font-black uppercase tracking-tight text-white">{step === 0 ? "Pilih Tanggal Mulai" : "Pilih Tanggal Selesai"}</h3><p className="text-[10px] text-[#0A84FF] font-bold uppercase tracking-widest mt-1">Maksimal 35 Hari Ke Belakang</p></div>
                                <div className="grid grid-cols-7 gap-2 mb-2">{['Min','Sen','Sel','Rab','Kam','Jum','Sab'].map(d=><div key={d} className="text-center text-[9px] font-black text-gray-500 uppercase">{d}</div>)}</div>
                                <div className="grid grid-cols-7 gap-y-2 gap-x-0 relative">
                                    {Array.from({length: days[0].date.getDay()}).map((_,i) => <div key={`blank-${i}`} />)}
                                    {days.map((d, i) => {
                                        const isStart = d.iso === value.start; const isEnd = d.iso === value.end; const inRange = d.iso > value.start && d.iso < value.end;
                                        let bgClass = "bg-transparent text-gray-300";
                                        if (isStart || isEnd) bgClass = "bg-[#0A84FF] text-white shadow-[0_0_15px_rgba(10,132,255,0.5)] z-10 scale-110 rounded-full";
                                        else if (inRange) bgClass = "bg-[#0A84FF]/20 text-[#0A84FF] rounded-none";
                                        else if (d.isToday) bgClass = "bg-white/10 text-white border border-white/20 rounded-full";
                                        let wrapperClass = "flex justify-center items-center h-10 w-full relative cursor-pointer";
                                        if(isStart && value.start !== value.end) wrapperClass += " rounded-l-full bg-[#0A84FF]/20";
                                        if(isEnd && value.start !== value.end) wrapperClass += " rounded-r-full bg-[#0A84FF]/20";
                                        return (<div key={i} className={wrapperClass} onClick={() => handleDayClick(d.iso)}><div className={`w-8 h-8 flex items-center justify-center font-bold text-sm transition-all ${bgClass}`}>{d.dayStr}</div></div>)
                                    })}
                                </div>
                                <button onClick={()=>setShowModal(false)} className="mt-8 w-full py-4 bg-white/10 text-white font-black uppercase tracking-widest rounded-2xl active:scale-95 text-base hover:bg-white/20 transition-all">Batalkan</button>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        const BranchCard = ({ cabang, idx }) => {
            const [expanded, setExpanded] = useState(false);
            return (
                <div className="bg-black rounded-[2rem] border border-white/5 overflow-hidden transition-all duration-300 shadow-lg">
                    <div className="p-5 sm:p-6 cursor-pointer active:bg-white/5 transition-all" onClick={() => setExpanded(!expanded)}>
                        <div className="flex justify-between items-start sm:items-center mb-5 gap-2">
                            <div className="flex items-center gap-3 min-w-0">
                                <div className={`shrink-0 w-10 h-10 sm:w-12 sm:h-12 rounded-2xl flex items-center justify-center font-black text-sm sm:text-lg ${idx === 0 ? 'bg-gradient-to-br from-[#FF3B30] to-[#E02020] text-white shadow-[0_0_15px_rgba(255,59,48,0.5)]' : 'bg-[#1C1C1E] text-gray-400 border border-white/5'}`}>{idx + 1}</div>
                                <h4 className="font-black text-lg sm:text-2xl tracking-tighter uppercase text-white leading-none truncate max-w-[120px] sm:max-w-none">{cabang.id}</h4>
                            </div>
                            <div className="text-right shrink-0">
                                <p className="text-[8px] sm:text-[9px] text-gray-500 uppercase font-black tracking-widest mb-1.5 whitespace-nowrap">Laba Hak Owner</p>
                                <p className="text-lg sm:text-2xl font-black text-[#FF3B30] leading-none whitespace-nowrap">{formatIDR(cabang.labaHariIni)}</p>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-3 sm:gap-4 bg-[#111111] p-3 sm:p-4 rounded-xl border border-white/5">
                            <div><p className="text-[8px] sm:text-[9px] text-gray-500 font-bold uppercase tracking-widest mb-1 truncate">Omset Total</p><p className="text-xs sm:text-sm font-black text-white">{formatIDR(cabang.omsetHariIni)}</p></div>
                            <div className="text-right"><p className="text-[8px] sm:text-[9px] text-gray-500 font-bold uppercase tracking-widest mb-1 truncate">Pengeluaran</p><p className="text-xs sm:text-sm font-black text-gray-300">{formatIDR(cabang.expenseHariIni)}</p></div>
                        </div>
                    </div>

                    <div className={`bg-[#111111] overflow-hidden transition-all duration-300 ${expanded ? 'max-h-[1000px] border-t border-white/5' : 'max-h-0'}`}>
                        <div className="grid grid-cols-3 gap-px bg-white/5 border-b border-white/5">
                            <div className="p-3 text-center bg-[#111111]"><p className="text-[8px] text-gray-500 font-black uppercase tracking-widest">Pasien</p><p className="text-sm font-black text-white mt-0.5">{cabang.paxHariIni}</p></div>
                            <div className="p-3 text-center bg-[#111111]"><p className="text-[8px] text-gray-500 font-black uppercase tracking-widest">Margin</p><p className={`text-sm font-black mt-0.5 ${cabang.margin > 50 ? 'text-[#34C759]' : 'text-[#FFCC00]'}`}>{cabang.margin}%</p></div>
                            <div className="p-3 text-center bg-[#111111]"><p className="text-[8px] text-gray-500 font-black uppercase tracking-widest">Trp MVP</p><p className="text-xs font-black text-[#0A84FF] mt-1 truncate">{cabang.mvp}</p></div>
                        </div>
                        <div className="p-4 space-y-2">
                            <p className="text-[9px] text-gray-600 font-black uppercase tracking-widest mb-3 px-1">Rincian Transaksi Hari Ini</p>
                            {cabang.logsHariIni && cabang.logsHariIni.length === 0 && <p className="text-center text-xs font-bold text-gray-600 py-4">Belum ada aktivitas</p>}
                            {cabang.logsHariIni && cabang.logsHariIni.map((log, i) => (
                                <div key={i} className="flex justify-between items-center bg-black p-3 rounded-xl border border-white/5">
                                    <div className="flex gap-3 items-center min-w-0"><span className="text-[9px] font-black text-gray-500">{log.jam}</span><div className="min-w-0"><p className={`text-xs font-bold uppercase truncate max-w-[120px] sm:max-w-[180px] ${log.type==='expense' ? 'text-[#FF3B30]' : 'text-gray-200'}`}>{log.nama}</p>{log.terapis && <p className="text-[8px] text-gray-500 font-black tracking-widest uppercase mt-0.5">Trp: {log.terapis}</p>}</div></div>
                                    <p className={`text-xs font-black shrink-0 ${log.type==='expense' ? 'text-[#FF3B30]' : 'text-white'}`}>{log.type==='expense'?'-':''}{formatIDR(log.nominal)}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div onClick={() => setExpanded(!expanded)} className="bg-black text-center py-3 border-t border-white/5 cursor-pointer hover:bg-white/5 transition-all text-gray-500 hover:text-white"><span className="text-[9px] font-black uppercase tracking-widest">{expanded ? 'Tutup Rincian ▲' : 'Lihat Rincian Hari Ini ▾'}</span></div>
                </div>
            )
        }

        const CashierView = ({ activeCabang, onLogout, sendToN8N, showToast }) => {
            const [mode, setMode] = useState('pemasukan'); 
            const [stats, setStats] = useState({ hariIni: 0, bulanIni: 0, hariIniCash: 0, hariIniTransfer: 0 });
            const [history, setHistory] = useState([]);
            const [expenseHistory, setExpenseHistory] = useState([]);
            
            const [formData, setFormData] = useState({ NAMA_PASIEN: '', NOMOR_CUSTOMER: '', PAKET: '', TAGIHAN: '', TERAPIS: '', METODE_BAYAR: 'CASH' });
            const [expenseData, setExpenseData] = useState({ NAMA_PENGELUARAN: '', NOMINAL: '', KETERANGAN: '' });

            // FITUR BARU: STATE PENGAJUAN BONUS
            const [reqBonus, setReqBonus] = useState(false);
            const [alasanBonus, setAlasanBonus] = useState('Pasien Ke-4 (40%)');

            const [loading, setLoading] = useState(false);
            const [fetching, setFetching] = useState(false);
            
            const [kategoriMenu, setKategoriMenu] = useState('REGULER');
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const dropdownRef = useRef(null);

            const isoToday = new Date(new Date().getTime() - (new Date().getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const [filterRekap, setFilterRekap] = useState({ start: isoToday, end: isoToday });

            const loadDashboardData = useCallback(async (isInitial = false) => {
                if (isInitial) setFetching(true);
                const res = await sendToN8N('load_data', { CABANG_ID: activeCabang });
                if (res && (res.status === 'success' || res.history)) {
                    setStats(res.stats || { hariIni: 0, bulanIni: 0, hariIniCash: 0, hariIniTransfer: 0 });
                    setHistory(res.history || []);
                    setExpenseHistory(res.expenseHistory || []); 
                    const arrDates = (res.history || []).map(h => h.TANGGAL).sort();
                    if(arrDates.length > 0) setFilterRekap({ start: arrDates[0], end: isoToday });
                }
                if (isInitial) setFetching(false);
            }, [activeCabang]);

            useEffect(() => { loadDashboardData(true); }, [loadDashboardData]);

            // Tutup dropdown saat klik di luar
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsDropdownOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [dropdownRef]);

            const expenseHariIniKasir = expenseHistory.filter(e => e.TANGGAL === isoToday).reduce((sum, item) => sum + (Number(item.NOMINAL)||0), 0);
            const targetSetoran = stats.hariIniCash - expenseHariIniKasir;

            const rekapTerapis = useMemo(() => {
                const recapMap = {};
                history.forEach(item => {
                    if (item.TANGGAL < filterRekap.start || item.TANGGAL > filterRekap.end) return;
                    if (Number(item.TAGIHAN) === 0) return;
                    const namaTrp = item.TERAPIS || "Tanpa Nama";
                    if (!recapMap[namaTrp]) recapMap[namaTrp] = { nama: namaTrp, pasien: 0, komisi: 0, riwayat: [] };
                    recapMap[namaTrp].pasien += 1;
                    recapMap[namaTrp].komisi += Number(item.BAGI_TERAPIS) || 0;
                    recapMap[namaTrp].riwayat.push(item);
                });
                return Object.values(recapMap).sort((a,b) => b.komisi - a.komisi);
            }, [history, filterRekap]);

            const isLhokseumawe = activeCabang.includes('LSM') || activeCabang === 'LHOKSEUMAWE';

            // MIRRORING LOGIC (Untuk Live Card Estimasi)
            const estimasiBagiHasil = useMemo(() => {
                if (!formData.TAGIHAN || formData.TAGIHAN <= 0) return null;
                
                const wib = new Date(new Date().getTime() + (new Date().getTimezoneOffset() * 60000) + (3600000 * 7));
                const jam = wib.getHours();
                const menit = wib.getMinutes();
                let isShiftMalam = false;
                if ((jam === 22 && menit >= 40) || jam >= 23 || jam < 7) { isShiftMalam = true; }

                const cleanTagihan = Number(formData.TAGIHAN);
                const paketName = String(formData.PAKET || "").toUpperCase();

                let bagiTerapis = 0;
                let bagiOwner = 0;
                let tipeHitungan = "Persentase 30%";

                if (paketName.includes("PAKET 8") || paketName.includes("CHIROPRACTIC")) {
                    bagiTerapis = 100000;
                    bagiOwner = cleanTagihan - bagiTerapis;
                    tipeHitungan = "Flat Paket Khusus";
                } 
                else if (paketName.includes("HERMES")) {
                    bagiTerapis = 54000;
                    bagiOwner = cleanTagihan - bagiTerapis; 
                    tipeHitungan = "Flat Hotel Hermes";
                }
                else if (paketName.includes("BODY MASSAGE (60 MENIT)")) { bagiTerapis = 30000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("REFLEKSI (60 MENIT)")) { bagiTerapis = 30000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("BEKAM BASAH")) { bagiTerapis = 30000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("LULUR")) { bagiTerapis = 30000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("TOTOK WAJAH")) { bagiTerapis = 20000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("PIJAT KEPALA")) { bagiTerapis = 20000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("TERAPI TELINGA")) { bagiTerapis = 20000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("BEKAM KERING")) { bagiTerapis = 20000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (!paketName.includes("PAKET") && !paketName.includes("HOTEL") && paketName !== "") { 
                    bagiTerapis = cleanTagihan * 0.30; tipeHitungan = "Ala Carte (30%)"; bagiOwner = cleanTagihan - bagiTerapis;
                } else {
                    let persenTerapis = isShiftMalam ? 0.40 : 0.30;

                    bagiTerapis = cleanTagihan * persenTerapis;
                    bagiOwner = cleanTagihan - bagiTerapis;
                    
                    let labelPersen = persenTerapis * 100;
                    tipeHitungan = isShiftMalam ? `Lembur/Overtime (${labelPersen}%)` : `Reguler (${labelPersen}%)`;
                    if (reqBonus) tipeHitungan += " + Request ACC";
                }

                return { bagiOwner, bagiTerapis, tipeHitungan };
            }, [formData.TAGIHAN, formData.PAKET, reqBonus]);

            const handleSelectPaket = (selectedPaket) => {
                let autoHarga = formData.TAGIHAN;
                if (selectedPaket && !selectedPaket.includes("Ala Carte")) { 
                    const match = selectedPaket.match(/Rp\s*([\d.]+)/); 
                    if (match && match[1]) autoHarga = match[1].replace(/\./g, ''); 
                } else if (selectedPaket.includes("Ala Carte")) { autoHarga = ""; }
                
                setFormData({ ...formData, PAKET: selectedPaket, TAGIHAN: autoHarga });
                setIsDropdownOpen(false);
            };

            const activeListPaket = useMemo(() => {
                if (kategoriMenu === 'REGULER') return isLhokseumawe ? PAKET_LHOKSEUMAWE : PAKET_STANDAR;
                if (kategoriMenu === 'HOTEL') return PAKET_HOTEL;
                return PAKET_NON;
            }, [kategoriMenu, isLhokseumawe]);

            const handleOrderSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                
                // Hitung pasien ke berapa HANYA UNTUK LOG/CATATAN
                const terapisName = formData.TERAPIS.trim().toUpperCase();
                const pasienHariIni = history.filter(h => h.TANGGAL === isoToday && (h.TERAPIS || "").toUpperCase() === terapisName && Number(h.TAGIHAN) > 0).length;
                const pasienKe = pasienHariIni + 1;

                const payload = { 
                    ...formData, 
                    CABANG_ID: activeCabang, 
                    PASIEN_KE: pasienKe,
                    REQ_BONUS: reqBonus,
                    ALASAN_BONUS: reqBonus ? alasanBonus : "-"
                };

                const res = await sendToN8N('insert', payload);
                if (res && (res.id || res.status === 'success')) {
                    setFormData({ NAMA_PASIEN: '', NOMOR_CUSTOMER: '', PAKET: '', TAGIHAN: '', TERAPIS: '', METODE_BAYAR: 'CASH' });
                    setReqBonus(false); setAlasanBonus('Pasien Ke-4 (40%)');
                    showToast(reqBonus ? 'Order Disimpan & Bonus Diajukan!' : 'Pasien Berhasil Disimpan'); 
                    await loadDashboardData();
                } else { showToast('Gagal Menyimpan', 'error'); }
                setLoading(false);
            };

            const handleExpenseSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                const res = await sendToN8N('insert_expense', { ...expenseData, CABANG_ID: activeCabang });
                if (res && res.status === 'success') {
                    setExpenseData({ NAMA_PENGELUARAN: '', NOMINAL: '', KETERANGAN: '' });
                    showToast('Pengeluaran Berhasil Dicatat'); await loadDashboardData();
                } else { showToast('Gagal Mencatat', 'error'); }
                setLoading(false);
            };

            const TerapisAccordion = ({ t }) => {
                const [expanded, setExpanded] = useState(false);
                return (
                    <div className="bg-white rounded-[1.5rem] border border-gray-100 shadow-sm overflow-hidden mb-3">
                        <div className="p-5 flex justify-between items-center cursor-pointer hover:bg-gray-50 transition-all" onClick={() => setExpanded(!expanded)}>
                            <div><p className="font-black text-lg uppercase text-[#1C1C1E] tracking-tight leading-none">{t.nama}</p><p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1.5">{t.pasien} Pasien Diselesaikan</p></div>

                    setShakeLogin(true); 
                    showToast('Akses Ditolak. Silakan buka Portal Keuangan.', 'error');
                    setLoading(false);
                    return;
                }

                const res = await sendToN8N('login', { id: cleanId, password: cleanPass });
                
                if (res && res.status === 'success') {
                    let detectedRole = 'CABANG';
                    if (cleanId.includes('OWNER') || cleanId.includes('MASTER')) detectedRole = 'OWNER';
                    if (cleanId.includes('SUPERVISOR')) detectedRole = 'SUPERVISOR';
                    if (cleanId.includes('LOGISTIK')) detectedRole = 'LOGISTIK';
                    
                    localStorage.setItem('isLoggedIn', 'true'); localStorage.setItem('userRole', detectedRole); localStorage.setItem('activeCabang', cleanId);
                    setUserRole(detectedRole); setActiveCabang(cleanId); setIsLoggedIn(true);
                } else { setShakeLogin(true); showToast(res.message || 'ID atau Password Salah', 'error'); }
                setLoading(false);
            };

            const handleLogout = () => { localStorage.clear(); setIsLoggedIn(false); setUserRole(''); setActiveCabang(''); };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-[#111111] flex items-center justify-center p-6 pb-24 relative overflow-hidden">
                        <div className="absolute top-10 left-10 w-72 h-72 bg-[#FF3B30]/10 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-10 right-10 w-72 h-72 bg-[#0A84FF]/10 rounded-full blur-3xl"></div>
                        <div className={`bg-[#1C1C1E]/80 backdrop-blur-2xl p-10 rounded-[3rem] w-full max-w-md border border-white/10 shadow-[0_30px_60px_rgba(0,0,0,0.5)] relative z-10 ${shakeLogin ? 'animate-shake' : ''}`}>
                            <div className="text-center mb-10"><img src={LOGO_URL} alt="Bugar Logo" className="h-20 mx-auto mb-5 drop-shadow-[0_0_20px_rgba(255,59,48,0.4)]" /><h1 className="text-3xl font-black text-white tracking-tighter uppercase leading-none mb-1">Bugar Connect</h1><p className="text-[10px] text-gray-500 uppercase font-black tracking-[0.3em] mt-2">Portal Management V5.12</p></div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <input type="text" placeholder="LOGIN ID" required className="w-full p-5 rounded-2xl bg-black text-white outline-none border border-white/5 focus:border-[#FF3B30] uppercase font-bold transition-all text-center tracking-widest text-base shadow-inner" value={loginData.id} onChange={(e) => setLoginData({...loginData, id: e.target.value})} />
                                <input type="password" placeholder="PASSWORD" required className="w-full p-5 rounded-2xl bg-black text-white outline-none border border-white/5 focus:border-[#FF3B30] font-bold transition-all text-center tracking-widest text-base shadow-inner" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} />
                                <button type="submit" disabled={loading} className="w-full bg-[#FF3B30] text-white font-black py-5 mt-2 rounded-2xl active:scale-95 transition-all shadow-[0_10px_30px_rgba(255,59,48,0.3)] tracking-widest uppercase text-base hover:bg-[#E02020]">{loading ? <i className="fa-solid fa-spinner fa-spin"></i> : "MASUK SEKARANG"}</button>
                            </form>
                        </div>
                        {toast.show && <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-white font-black text-[10px] uppercase tracking-[0.2em] z-[100] animate-fade-in shadow-2xl ${toast.type === 'success' ? 'bg-[#34C759]' : 'bg-[#FF3B30]'}`}>{toast.message}</div>}
                    </div>
                );
            }

            return (
                <div>
                    {userRole === 'OWNER' && <OwnerView onLogout={handleLogout} />}
                    {userRole === 'SUPERVISOR' && <SupervisorView onLogout={handleLogout} sendToN8N={sendToN8N} showToast={showToast} />}
                    {userRole === 'LOGISTIK' && <LogistikView onLogout={handleLogout} sendToN8N={sendToN8N} showToast={showToast} />}
                    {userRole === 'CABANG' && <CashierView activeCabang={activeCabang} onLogout={handleLogout} sendToN8N={sendToN8N} showToast={showToast} />}
                    
                    {toast.show && <div className={`fixed bottom-32 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-white font-black text-[10px] uppercase tracking-[0.2em] z-[100] animate-fade-in shadow-2xl ${toast.type === 'success' ? 'bg-[#34C759]' : 'bg-[#FF3B30]'}`}>{toast.message}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
