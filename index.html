<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bugar Connect V5.1</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-8px)' }, '75%': { transform: 'translateX(8px)' } },
                        slideUp: { 'from': { opacity: '0', transform: 'translateY(20px)' }, 'to': { opacity: '1', transform: 'translateY(0)' } },
                        fadeIn: { 'from': { opacity: '0' }, 'to': { opacity: '1' } }
                    },
                    animation: { shake: 'shake 0.3s ease-in-out', 'slide-up': 'slideUp 0.4s ease-out', 'fade-in': 'fadeIn 0.3s ease-out' }
                }
            }
        }
    </script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#1C1C1E]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect } = React;

        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/239f820a-2d32-4432-a4b1-af48e7f97550";
        const LOGO_URL = "https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png";
        
        const DAFTAR_PAKET = [
            "Paket 1 (70 Menit) - Rp 100.000: Refleksi, Body Massage, Pijat Kepala",
            "Paket 2 (90 Menit) - Rp 120.000: Refleksi, Body Massage, Pijat Kepala, Totok Wajah",
            "Paket 3 (120 Menit) - Rp 140.000: Refleksi, Body Massage, Pijat Kepala",
            "Paket 4 (120 Menit) - Rp 150.000: Refleksi, Body Massage, Pijat Kepala, Body Scrub",
            "Paket 5 (120 Menit) - Rp 150.000: Refleksi, Body Massage, Pijat Kepala, Bekam Kering",
            "Paket 6 (120 Menit) - Rp 170.000: Refleksi, Body Massage, Pijat Kepala, Bekam Basah",
            "Paket 7 (120 Menit) - Rp 200.000: Refleksi, Body Massage, Pijat Kepala, Totok Wajah, Lulur",
            "Paket 8 - Rp 300.000: Chiropractic (Kretek) 17 Gerakan"
        ];
        
        const formatIDR = (val) => 'Rp ' + Number(val || 0).toLocaleString('id-ID');

        // Generator Tanggal untuk Dropdown
        const getFilterOptions = () => {
            const options = [];
            const today = new Date();
            
            // Format YYYY-MM-DD
            const getIso = (d) => new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            
            // Rentang
            const date15DaysAgo = new Date(today);
            date15DaysAgo.setDate(today.getDate() - 15);
            
            options.push({ label: "15 Hari Terakhir (Akumulasi)", start: getIso(date15DaysAgo), end: getIso(today) });
            options.push({ label: "Bulan Ini", start: getIso(today).substring(0,7) + '-01', end: getIso(today) });
            options.push({ label: "--- Per Tanggal ---", start: "", end: "", disabled: true });

            // 15 Hari Mundur
            for(let i = 0; i <= 15; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const iso = getIso(d);
                const label = i === 0 ? "Hari Ini" : i === 1 ? "Kemarin" : d.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
                options.push({ label: label, start: iso, end: iso });
            }
            return options;
        };

        // ==========================================
        // 1. KOMPONEN DASHBOARD OWNER (2 TABS)
        // ==========================================
        const OwnerView = ({ onLogout }) => {
            const [activeTab, setActiveTab] = useState('dashboard'); // 'dashboard' atau 'report'
            const [data, setData] = useState({ 
                grandTotalHariIni: 0, grandTotalBulanIni: 0, 
                expenseHariIni: 0, expenseBulanIni: 0,
                globalLabaHariIni: 0, globalLabaBulanIni: 0,
                leaderboard: [], trenHari: [], topTerapis: [] 
            });
            const [loading, setLoading] = useState(true);
            const [refreshing, setRefreshing] = useState(false);

            // State Filter Gaji
            const filterOptions = getFilterOptions();
            const [filterGaji, setFilterGaji] = useState({ 
                preset: filterOptions[0].label, 
                startDate: filterOptions[0].start, 
                endDate: filterOptions[0].end, 
                cabang: '' 
            });
            const [slipData, setSlipData] = useState([]);
            const [loadingSlip, setLoadingSlip] = useState(false);

            const loadOwnerData = async (isRefresh = false) => {
                if (isRefresh) setRefreshing(true); else setLoading(true);
                try {
                    const res = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'owner_load' })
                    });
                    const result = await res.json();
                    let finalData = Array.isArray(result) ? result[0] : result;
                    if (finalData && finalData.json) finalData = finalData.json;
                    setData(finalData || {});
                } catch (e) { console.error("Gagal memuat data owner"); }
                setLoading(false); setRefreshing(false);
            };

            useEffect(() => { loadOwnerData(); }, []);

            const handlePresetChange = (e) => {
                const selected = filterOptions.find(opt => opt.label === e.target.value);
                if (selected && !selected.disabled) {
                    setFilterGaji({ ...filterGaji, preset: selected.label, startDate: selected.start, endDate: selected.end });
                }
            };

            const fetchSlipGaji = async () => {
                setLoadingSlip(true);
                try {
                    const res = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'filter_gaji', startDate: filterGaji.startDate, endDate: filterGaji.endDate, cabang: filterGaji.cabang })
                    });
                    const result = await res.json();
                    let finalData = Array.isArray(result) ? result[0] : result;
                    if (finalData && finalData.json) finalData = finalData.json;
                    setSlipData(finalData.data || []);
                } catch (e) { alert("Gagal menarik data gaji terapis"); }
                setLoadingSlip(false);
            };

            const downloadSlipTerapis = (terapis) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ format: 'a5' });
                
                doc.setFontSize(20); doc.setTextColor(255, 59, 48);
                doc.text("BUGAR REFLEKSI", 74, 20, { align: "center" });
                
                doc.setFontSize(12); doc.setTextColor(28, 28, 30);
                doc.text("SLIP KOMISI TERAPIS", 74, 28, { align: "center" });
                
                doc.setLineWidth(0.5); doc.line(10, 35, 138, 35);
                
                doc.setFontSize(10); doc.setTextColor(100, 100, 100);
                doc.text(`Cabang     : ${filterGaji.cabang}`, 15, 45);
                doc.text(`Nama       : ${terapis.nama}`, 15, 53);
                doc.text(`Periode    : ${filterGaji.startDate} s/d ${filterGaji.endDate}`, 15, 61);
                
                doc.line(10, 70, 138, 70);
                
                doc.setFontSize(12); doc.setTextColor(0, 0, 0);
                doc.text(`Total Pasien Diselesaikan: ${terapis.totalPasien} Orang`, 15, 85);
                
                doc.setFont(undefined, 'bold'); doc.setFontSize(14);
                doc.text(`TOTAL KOMISI : ${formatIDR(terapis.totalKomisi)}`, 15, 100);
                
                doc.setFont(undefined, 'normal'); doc.setFontSize(9); doc.setTextColor(150, 150, 150);
                doc.text("Terima kasih atas kerja keras Anda bersama Bugar Refleksi!", 74, 130, { align: "center" });
                
                doc.save(`Slip_${filterGaji.cabang}_${terapis.nama.replace(/\s+/g, '_')}.pdf`);
            };

            const handleShareWA = () => {
                let text = `*📊 LAPORAN BUGAR REFLEKSI*\n\n`;
                text += `💰 *Laba Hari Ini*: ${formatIDR(data.globalLabaHariIni)}\n`;
                text += `*(Omset: ${formatIDR(data.grandTotalHariIni)} | Exp: ${formatIDR(data.expenseHariIni)})*\n\n`;
                if (data.leaderboard && data.leaderboard.length > 0) {
                    text += `🏆 *Top 3 Cabang Hari Ini*:\n`;
                    data.leaderboard.slice(0, 3).forEach((c, idx) => { 
                        text += `${idx + 1}. ${c.id} - Laba: ${formatIDR(c.labaHariIni)}\n`; 
                    });
                }
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            };

            if (loading) return (
                <div className="min-h-screen bg-[#000000] flex items-center justify-center">
                    <i className="fa-solid fa-spinner fa-spin text-[#FF3B30] text-5xl"></i>
                </div>
            );

            const maxPasien = data.trenHari?.length > 0 ? Math.max(...data.trenHari.map(d => d.pasien), 1) : 1;
            const fallbackLabaHariIni = (data.grandTotalHariIni || 0) - (data.expenseHariIni || 0);
            const fallbackLabaBulanIni = (data.grandTotalBulanIni || 0) - (data.expenseBulanIni || 0);

            return (
                <div className="min-h-screen bg-[#000000] text-white font-sans animate-fade-in pb-28">
                    {/* TAB 1: DASHBOARD EKSEKUTIF */}
                    {activeTab === 'dashboard' && (
                        <div className="animate-slide-up">
                            <div className="bg-[#1C1C1E] px-6 py-10 rounded-b-[3rem] shadow-2xl border-b-2 border-[#FF3B30]/30">
                                <div className="max-w-xl mx-auto">
                                    <div className="flex justify-between items-start mb-8">
                                        <div className="flex items-center gap-3">
                                            <img src={LOGO_URL} alt="Logo" className="h-12 w-12 object-contain drop-shadow-[0_0_10px_rgba(255,59,48,0.5)]" />
                                            <div>
                                                <p className="text-[#FF3B30] font-black text-[10px] uppercase tracking-[0.4em] mb-1">Executive Portal</p>
                                                <h1 className="text-2xl font-black tracking-tighter uppercase leading-none text-white">Bugar Analytics</h1>
                                            </div>
                                        </div>
                                        <button onClick={() => loadOwnerData(true)} className="p-3 bg-white/5 rounded-2xl hover:bg-white/10 active:scale-90 transition-all text-white border border-white/10">
                                            <i className={`fa-solid fa-rotate-right text-lg ${refreshing ? 'fa-spin text-[#FF3B30]' : ''}`}></i>
                                        </button>
                                    </div>

                                    {/* KARTU LABA BERSIH */}
                                    <div className="bg-[#FF3B30] p-8 rounded-[2.5rem] shadow-[0_20px_50px_rgba(255,59,48,0.3)] relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-6 opacity-20"><i className="fa-solid fa-wallet text-[80px]"></i></div>
                                        <p className="text-white/80 font-black uppercase tracking-widest text-[10px] mb-2 relative z-10">Laba Bersih Hari Ini</p>
                                        <h2 className="text-5xl font-black tracking-tighter relative z-10">{formatIDR(data.globalLabaHariIni !== undefined ? data.globalLabaHariIni : fallbackLabaHariIni)}</h2>
                                        <div className="flex justify-between items-center mt-5 relative z-10 text-[10px] font-bold uppercase opacity-90 border-t border-white/20 pt-4">
                                            <div><span className="opacity-70 block mb-1">Omset</span> {formatIDR(data.grandTotalHariIni)}</div>
                                            <div className="text-right"><span className="opacity-70 block mb-1">Pengeluaran</span> {formatIDR(data.expenseHariIni)}</div>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-[#111111] border border-white/10 p-6 rounded-[2rem] mt-4 flex items-center justify-between">
                                        <div>
                                            <p className="text-gray-500 font-black uppercase tracking-widest text-[10px] mb-1">Laba Bersih Bulan Ini</p>
                                            <h3 className="text-2xl font-black text-gray-200 tracking-tight">{formatIDR(data.globalLabaBulanIni !== undefined ? data.globalLabaBulanIni : fallbackLabaBulanIni)}</h3>
                                        </div>
                                        <div className="bg-white/5 p-4 rounded-full text-gray-400"><i className="fa-solid fa-vault text-2xl"></i></div>
                                    </div>
                                </div>
                            </div>

                            <main className="max-w-xl mx-auto p-6 space-y-6 mt-2">
                                {/* LEADERBOARD CABANG (DENGAN LABA) */}
                                <div className="bg-[#1C1C1E] p-8 rounded-[2.5rem] border border-white/5">
                                    <h3 className="text-sm font-black uppercase tracking-[0.2em] text-white mb-6 flex items-center gap-3">
                                        <i className="fa-solid fa-trophy text-[#FF3B30]"></i> Performa Cabang (Hari Ini)
                                    </h3>
                                    <div className="space-y-4">
                                        {data.leaderboard && data.leaderboard.map((cabang, idx) => (
                                            <div key={cabang.id} className="bg-black p-5 rounded-2xl border border-white/5">
                                                <div className="flex justify-between items-start mb-4 border-b border-white/10 pb-4">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-black text-xs ${idx === 0 ? 'bg-[#FF3B30] text-white' : 'bg-[#1C1C1E] text-gray-400'}`}>{idx + 1}</div>
                                                        <h4 className="font-black text-lg tracking-tight uppercase text-white leading-none">{cabang.id}</h4>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-[9px] text-gray-500 uppercase font-bold tracking-widest mb-1">Laba Bersih</p>
                                                        <p className="text-lg font-black text-[#FF3B30] leading-none">{formatIDR(cabang.labaHariIni !== undefined ? cabang.labaHariIni : (cabang.omsetHariIni - (cabang.expenseHariIni || 0)))}</p>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4 text-[10px] font-bold uppercase tracking-wider text-gray-400">
                                                    <div>Omset: <span className="text-gray-200">{formatIDR(cabang.omsetHariIni)}</span></div>
                                                    <div className="text-right">Expense: <span className="text-gray-200">{formatIDR(cabang.expenseHariIni)}</span></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* GRAFIK TREN */}
                                <div className="bg-[#1C1C1E] p-8 rounded-[2.5rem] border border-white/5">
                                    <h3 className="text-sm font-black uppercase tracking-[0.2em] text-white mb-8 flex items-center gap-3">
                                        <i className="fa-solid fa-chart-column text-[#FF3B30]"></i> Tren Keramaian Mingguan
                                    </h3>
                                    <div className="space-y-4">
                                        {data.trenHari && data.trenHari.map((item, idx) => {
                                            const persentase = (item.pasien / maxPasien) * 100;
                                            const isTertinggi = item.pasien === maxPasien && item.pasien > 0;
                                            return (
                                                <div key={idx} className="flex items-center gap-4">
                                                    <div className="w-16 text-xs font-black uppercase text-gray-400 tracking-wider">{item.hari}</div>
                                                    <div className="flex-1 h-8 bg-black rounded-full overflow-hidden relative border border-white/5">
                                                        <div className={`absolute top-0 left-0 h-full rounded-full transition-all duration-1000 ${isTertinggi ? 'bg-[#FF3B30]' : 'bg-white/20'}`} style={{ width: `${persentase}%` }}></div>
                                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-white mix-blend-difference">{item.pasien} Pax</div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                
                                <button onClick={handleShareWA} className="w-full bg-white/10 text-white p-5 rounded-2xl font-black uppercase tracking-widest text-sm flex justify-center items-center gap-3 hover:bg-white/20 active:scale-95 transition-all">
                                    <i className="fa-brands fa-whatsapp text-xl text-[#25D366]"></i> Bagikan ke WA
                                </button>
                            </main>
                        </div>
                    )}

                    {/* TAB 2: LAPORAN & GAJI */}
                    {activeTab === 'report' && (
                        <div className="animate-slide-up max-w-xl mx-auto p-6 pt-10 space-y-6">
                            <div className="mb-8">
                                <h2 className="text-3xl font-black uppercase tracking-tighter text-white">Laporan & Gaji</h2>
                                <p className="text-[10px] text-[#FF3B30] font-black uppercase tracking-widest mt-1">Pusat Administrasi Cabang</p>
                            </div>

                            {/* SEGMEN CETAK SLIP GAJI */}
                            <div className="bg-[#1C1C1E] p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
                                <h3 className="text-sm font-black uppercase tracking-[0.2em] text-white mb-6 flex items-center gap-3">
                                    <i className="fa-solid fa-file-invoice-dollar text-[#FF3B30]"></i> Cetak Slip Terapis
                                </h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-2 block">Filter Tanggal (15 Hari Mundur)</label>
                                        <select className="w-full p-4 bg-black rounded-2xl text-white outline-none font-bold text-xs" value={filterGaji.preset} onChange={handlePresetChange}>
                                            {filterOptions.map((opt, i) => (
                                                <option key={i} value={opt.label} disabled={opt.disabled}>{opt.label}</option>
                                            ))}
                                        </select>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[9px] text-gray-600 uppercase font-black tracking-widest mb-1 block">Dari</label>
                                            <input type="date" disabled className="w-full p-3 bg-black/50 rounded-xl text-gray-400 outline-none font-bold text-xs" value={filterGaji.startDate} />
                                        </div>
                                        <div>
                                            <label className="text-[9px] text-gray-600 uppercase font-black tracking-widest mb-1 block">Sampai</label>
                                            <input type="date" disabled className="w-full p-3 bg-black/50 rounded-xl text-gray-400 outline-none font-bold text-xs" value={filterGaji.endDate} />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-2 block mt-2">Pilih Cabang</label>
                                        <select className="w-full p-4 bg-black rounded-2xl text-white outline-none font-bold text-xs" value={filterGaji.cabang} onChange={e => setFilterGaji({...filterGaji, cabang: e.target.value})}>
                                            <option value="">-- Pilih Cabang --</option>
                                            {data.leaderboard && data.leaderboard.map(c => <option key={c.id} value={c.id}>{c.id}</option>)}
                                        </select>
                                    </div>
                                    
                                    <button onClick={fetchSlipGaji} disabled={loadingSlip || !filterGaji.startDate || !filterGaji.endDate || !filterGaji.cabang} className="w-full bg-[#FF3B30] text-white font-black py-4 rounded-2xl active:scale-95 transition-all text-xs uppercase tracking-widest mt-4 disabled:opacity-50 shadow-[0_10px_20px_rgba(255,59,48,0.3)]">
                                        {loadingSlip ? <i className="fa-solid fa-spinner fa-spin"></i> : "CARI DATA KOMISI"}
                                    </button>
                                </div>

                                {/* Hasil Terapis & Tombol Download */}
                                {slipData.length > 0 && (
                                    <div className="mt-6 space-y-3 pt-6 border-t border-white/10">
                                        {slipData.map((terapis, idx) => (
                                            <div key={idx} className="bg-black p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                                                <div>
                                                    <p className="font-black text-sm uppercase text-white mb-1">{terapis.nama}</p>
                                                    <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest">{terapis.totalPasien} Pasien • <span className="text-[#FF3B30]">{formatIDR(terapis.totalKomisi)}</span></p>
                                                </div>
                                                <button onClick={() => downloadSlipTerapis(terapis)} className="bg-white/10 hover:bg-white/20 text-white w-12 h-12 rounded-xl active:scale-90 transition-all flex justify-center items-center">
                                                    <i className="fa-solid fa-file-pdf"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* TOP TERAPIS */}
                            {data.topTerapis && data.topTerapis.length > 0 && (
                                <div className="bg-[#1C1C1E] p-8 rounded-[2.5rem] border border-white/5">
                                    <h3 className="text-sm font-black uppercase tracking-[0.2em] text-white mb-6 flex items-center gap-3">
                                        <i className="fa-solid fa-medal text-[#FF3B30]"></i> Bintang Terapis (Bulan Ini)
                                    </h3>
                                    <div className="space-y-3">
                                        {data.topTerapis.map((terapis, idx) => (
                                            <div key={idx} className="flex justify-between items-center bg-black p-4 rounded-2xl border border-white/5">
                                                <div className="flex items-center gap-3"><span className="text-[#FF3B30] font-black opacity-50">#{idx + 1}</span><span className="font-black text-sm uppercase text-gray-200">{terapis.nama}</span></div>
                                                <span className="font-black text-sm text-gray-400">{formatIDR(terapis.omset)}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* BOTTOM NAVIGATION BAR */}
                    <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-xl z-50 bg-[#1C1C1E]/90 backdrop-blur-xl border-t border-white/10 pb-safe pt-2 px-6 rounded-t-3xl">
                        <div className="flex justify-between items-center mb-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex-1 py-3 flex flex-col items-center gap-1 transition-all ${activeTab === 'dashboard' ? 'text-[#FF3B30]' : 'text-gray-500 hover:text-gray-300'}`}>
                                <i className="fa-solid fa-house text-xl"></i>
                                <span className="text-[9px] font-black uppercase tracking-widest">Dasbor</span>
                            </button>
                            <button onClick={() => setActiveTab('report')} className={`flex-1 py-3 flex flex-col items-center gap-1 transition-all ${activeTab === 'report' ? 'text-[#FF3B30]' : 'text-gray-500 hover:text-gray-300'}`}>
                                <i className="fa-solid fa-file-signature text-xl"></i>
                                <span className="text-[9px] font-black uppercase tracking-widest">Laporan</span>
                            </button>
                            <button onClick={onLogout} className="flex-1 py-3 flex flex-col items-center gap-1 transition-all text-gray-600 hover:text-white">
                                <i className="fa-solid fa-power-off text-xl"></i>
                                <span className="text-[9px] font-black uppercase tracking-widest">Keluar</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 2. KOMPONEN DASHBOARD KASIR
        // ==========================================
        const CashierView = ({ activeCabang, onLogout, sendToN8N, showToast }) => {
            const [mode, setMode] = useState('pemasukan'); 
            const [stats, setStats] = useState({ hariIni: 0, bulanIni: 0 });
            const [history, setHistory] = useState([]);
            
            const [formData, setFormData] = useState({ NAMA_PASIEN: '', NOMOR_CUSTOMER: '', PAKET: '', TAGIHAN: '', TERAPIS: '' });
            const [expenseData, setExpenseData] = useState({ NAMA_PENGELUARAN: '', NOMINAL: '', KETERANGAN: '' });
            
            const [loading, setLoading] = useState(false);
            const [fetching, setFetching] = useState(false);
            const [confirmModal, setConfirmModal] = useState({ show: false, item: null });
            const [isDeleting, setIsDeleting] = useState(null);

            const loadDashboardData = useCallback(async (isInitial = false) => {
                if (isInitial) setFetching(true);
                const res = await sendToN8N('load_data', { CABANG_ID: activeCabang });
                if (res && (res.status === 'success' || res.history)) {
                    setStats(res.stats || { hariIni: 0, bulanIni: 0 });
                    setHistory(res.history || []);
                }
                if (isInitial) setFetching(false);
            }, [activeCabang]);

            useEffect(() => { loadDashboardData(true); }, [loadDashboardData]);

            const handlePaketChange = (e) => {
                const selectedPaket = e.target.value;
                let autoHarga = formData.TAGIHAN;
                if (selectedPaket) {
                    const match = selectedPaket.match(/Rp\s*([\d.]+)/);
                    if (match && match[1]) autoHarga = match[1].replace(/\./g, '');
                }
                setFormData({ ...formData, PAKET: selectedPaket, TAGIHAN: autoHarga });
            };

            const handleOrderSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                const res = await sendToN8N('insert', { ...formData, CABANG_ID: activeCabang });
                if (res && (res.id || res.status === 'success')) {
                    setFormData({ NAMA_PASIEN: '', NOMOR_CUSTOMER: '', PAKET: '', TAGIHAN: '', TERAPIS: '' });
                    showToast('Pasien Berhasil Disimpan'); await loadDashboardData();
                } else { showToast('Gagal Menyimpan', 'error'); }
                setLoading(false);
            };

            const handleExpenseSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                const res = await sendToN8N('insert_expense', { ...expenseData, CABANG_ID: activeCabang });
                if (res && res.status === 'success') {
                    setExpenseData({ NAMA_PENGELUARAN: '', NOMINAL: '', KETERANGAN: '' });
                    showToast('Pengeluaran Berhasil Dicatat'); 
                } else { showToast('Gagal Mencatat', 'error'); }
                setLoading(false);
            };

            const executeDelete = async () => {
                const item = confirmModal.item;
                const targetId = item.id || item.db_id || item.ID || item.id_database;
                setConfirmModal({ show: false, item: null }); setIsDeleting(targetId);
                await sendToN8N('delete', { id_database: targetId, nama_pasien: item.NAMA_PASIEN });
                showToast('Transaksi Dibatalkan'); await loadDashboardData(); setIsDeleting(null);
            };

            return (
                <div className="min-h-screen bg-[#F2F2F7] pb-10 animate-fade-in font-sans">
                    <nav className="bg-white border-b border-gray-200 p-4 sticky top-0 z-40">
                        <div className="max-w-xl mx-auto flex justify-between items-center font-black uppercase text-sm">
                            <div className="flex items-center gap-2 text-[#1C1C1E]">
                                <img src={LOGO_URL} alt="Logo" className="h-6 w-6 object-contain" /> CABANG {activeCabang}
                            </div>
                            <button onClick={onLogout} className="text-[#FF3B30] bg-[#FF3B30]/10 px-4 py-2 rounded-full text-[10px] flex items-center gap-2 hover:bg-[#FF3B30]/20 active:scale-95 transition-all tracking-widest"><i className="fa-solid fa-right-from-bracket"></i> KELUAR</button>
                        </div>
                    </nav>

                    <main className="max-w-xl mx-auto p-4 space-y-5">
                        <div className="flex bg-white p-1.5 rounded-full shadow-sm border border-gray-100">
                            <button onClick={() => setMode('pemasukan')} className={`flex-1 py-3 rounded-full text-xs font-black uppercase transition-all tracking-widest ${mode === 'pemasukan' ? 'bg-[#1C1C1E] text-white shadow-md' : 'text-gray-400 hover:text-black'}`}>Pemasukan</button>
                            <button onClick={() => setMode('pengeluaran')} className={`flex-1 py-3 rounded-full text-xs font-black uppercase transition-all tracking-widest ${mode === 'pengeluaran' ? 'bg-[#FF3B30] text-white shadow-md' : 'text-gray-400 hover:text-red-500'}`}>Pengeluaran</button>
                        </div>

                        {mode === 'pemasukan' ? (
                            <div className="animate-slide-up space-y-5">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-[#FF3B30] p-5 rounded-3xl text-white shadow-lg">
                                        <p className="text-[9px] uppercase font-black opacity-70 tracking-widest mb-1">Hari Ini</p>
                                        <h3 className="text-xl font-black">{formatIDR(stats.hariIni)}</h3>
                                    </div>
                                    <div className="bg-[#1C1C1E] p-5 rounded-3xl text-white shadow-lg">
                                        <p className="text-[9px] uppercase font-black opacity-40 tracking-widest mb-1">Bulan Ini</p>
                                        <h3 className="text-xl font-black">{formatIDR(stats.bulanIni)}</h3>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2rem] p-6 border border-gray-100 shadow-sm">
                                    <h4 className="font-black text-[10px] text-gray-400 mb-5 tracking-widest uppercase">Input Pasien</h4>
                                    <form onSubmit={handleOrderSubmit} className="space-y-4">
                                        <input type="text" placeholder="Nama Pasien" required className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold focus:border-[#FF3B30] transition-all" value={formData.NAMA_PASIEN} onChange={e => setFormData({...formData, NAMA_PASIEN: e.target.value})} />
                                        <input type="tel" placeholder="WhatsApp (08...)" required className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold focus:border-[#FF3B30] transition-all" value={formData.NOMOR_CUSTOMER} onChange={e => setFormData({...formData, NOMOR_CUSTOMER: e.target.value})} />
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            <select required className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold text-[11px] focus:border-[#FF3B30] transition-all appearance-none" value={formData.PAKET} onChange={handlePaketChange}>
                                                <option value="">Pilih Paket...</option>
                                                {DAFTAR_PAKET.map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                            <input type="number" placeholder="Total Tagihan (Rp)" required className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold focus:border-[#FF3B30] transition-all" value={formData.TAGIHAN} onChange={e => setFormData({...formData, TAGIHAN: e.target.value})} />
                                        </div>
                                        <input type="text" placeholder="Nama Terapis" required className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold focus:border-[#FF3B30] transition-all" value={formData.TERAPIS} onChange={e => setFormData({...formData, TERAPIS: e.target.value})} />
                                        <button type="submit" disabled={loading} className="w-full bg-[#1C1C1E] text-white font-black py-5 rounded-2xl hover:bg-[#FF3B30] active:scale-[0.98] transition-all mt-2 tracking-widest uppercase text-sm">
                                            {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : "SIMPAN DATA"}
                                        </button>
                                    </form>
                                </div>

                                <div className="space-y-3">
                                    <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1">Aktivitas Hari Ini</p>
                                    {fetching && history.length === 0 && <div className="text-center py-10"><i className="fa-solid fa-spinner fa-spin text-gray-300 text-2xl"></i></div>}
                                    {history.map((item, idx) => {
                                        const currentId = item.id || item.db_id || item.ID || item.id_database;
                                        const isBatal = Number(item.TAGIHAN) === 0;
                                        return (
                                            <div key={idx} className={`p-4 rounded-2xl border flex justify-between items-center transition-all ${isBatal ? 'bg-red-50 border-red-100 opacity-60' : 'bg-white border-gray-100'}`}>
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black ${isBatal ? 'bg-red-100 text-[#FF3B30]' : 'bg-[#F2F2F7] text-[#1C1C1E]'}`}>{item.NAMA_PASIEN?.charAt(0)}</div>
                                                    <div>
                                                        <h5 className={`font-black text-sm leading-none mb-1 text-[#1C1C1E] ${isBatal ? 'line-through opacity-70' : ''}`}>{item.NAMA_PASIEN}</h5>
                                                        <p className="text-[9px] text-gray-400 font-bold uppercase truncate max-w-[150px]">{item.PAKET} • {item.TERAPIS}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <p className={`text-sm font-black ${isBatal ? 'text-[#FF3B30]' : 'text-[#1C1C1E]'}`}>{formatIDR(item.TAGIHAN)}</p>
                                                    <button onClick={() => setConfirmModal({ show: true, item })} disabled={isBatal || isDeleting === currentId} className={`p-3 rounded-xl ${isBatal ? 'text-transparent' : 'text-gray-300 hover:text-white hover:bg-[#FF3B30] active:scale-90 transition-all'}`}>
                                                        {isDeleting === currentId ? <i className="fa-solid fa-spinner fa-spin text-[#FF3B30]"></i> : (!isBatal && <i className="fa-solid fa-trash"></i>)}
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-[2rem] p-6 border border-gray-100 shadow-sm animate-slide-up">
                                <div className="text-center mb-6">
                                    <i className="fa-solid fa-receipt text-[#FF3B30] text-3xl mb-2"></i>
                                    <h4 className="font-black text-lg text-[#1C1C1E] tracking-tight uppercase">Catat Pengeluaran</h4>
                                    <p className="text-[10px] text-gray-400 uppercase tracking-widest font-bold mt-1">Gunakan dana laci cabang</p>
                                </div>
                                <form onSubmit={handleExpenseSubmit} className="space-y-4">
                                    <input type="text" placeholder="Nama Item (Cth: Beli Tisu, Galon)" required className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold focus:border-[#FF3B30] transition-all" value={expenseData.NAMA_PENGELUARAN} onChange={e => setExpenseData({...expenseData, NAMA_PENGELUARAN: e.target.value})} />
                                    <input type="number" placeholder="Nominal Rp (Cth: 20000)" required className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold focus:border-[#FF3B30] transition-all" value={expenseData.NOMINAL} onChange={e => setExpenseData({...expenseData, NOMINAL: e.target.value})} />
                                    <textarea placeholder="Keterangan Opsional" rows="2" className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold focus:border-[#FF3B30] transition-all resize-none" value={expenseData.KETERANGAN} onChange={e => setExpenseData({...expenseData, KETERANGAN: e.target.value})}></textarea>
                                    <button type="submit" disabled={loading} className="w-full bg-[#FF3B30] text-white font-black py-5 rounded-2xl hover:bg-red-600 active:scale-[0.98] transition-all mt-2 tracking-widest uppercase text-sm shadow-[0_10px_20px_rgba(255,59,48,0.3)]">
                                        {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : "CATAT PENGELUARAN"}
                                    </button>
                                </form>
                            </div>
                        )}
                    </main>

                    {confirmModal.show && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl relative z-10 w-full max-w-xs text-center animate-slide-up">
                                <i className="fa-solid fa-circle-exclamation text-[#FF3B30] text-[48px] mb-5"></i>
                                <h3 className="text-xl font-black mb-2 uppercase text-[#1C1C1E] tracking-tight">Batal Transaksi?</h3>
                                <p className="text-xs text-gray-500 font-bold mb-8 uppercase tracking-widest">Pasien: {confirmModal.item.NAMA_PASIEN}</p>
                                <button onClick={executeDelete} className="w-full py-5 bg-[#FF3B30] text-white font-black rounded-2xl mb-3 active:scale-95 transition-all tracking-widest uppercase">YA, BATALKAN</button>
                                <button onClick={() => setConfirmModal({ show: false, item: null })} className="w-full py-5 bg-[#F2F2F7] text-[#1C1C1E] font-black rounded-2xl active:scale-95 transition-all tracking-widest uppercase">KEMBALI</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // MAIN APP (LOGIN & ROUTER WITH LOCAL STORAGE)
        // ==========================================
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(localStorage.getItem('isLoggedIn') === 'true');
            const [userRole, setUserRole] = useState(localStorage.getItem('userRole') || ''); 
            const [activeCabang, setActiveCabang] = useState(localStorage.getItem('activeCabang') || '');
            
            const [loginData, setLoginData] = useState({ id: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [shakeLogin, setShakeLogin] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
            };

            const sendToN8N = async (action, payload = {}) => {
                try {
                    const response = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, ...payload }) });
                    const text = await response.text();
                    if (!text) return {};
                    const rawData = JSON.parse(text);
                    let unwrapped = Array.isArray(rawData) ? rawData[0] : rawData;
                    if (unwrapped && unwrapped.json) unwrapped = unwrapped.json;
                    return unwrapped;
                } catch (error) { showToast("Koneksi Error", 'error'); return { status: 'error' }; }
            };

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true); setShakeLogin(false);
                const cleanId = loginData.id.trim().toUpperCase();
                const cleanPass = loginData.password.trim();
                const res = await sendToN8N('login', { id: cleanId, password: cleanPass });
                
                if (res && res.status === 'success') {
                    const detectedRole = cleanId.includes('OWNER') ? 'OWNER' : 'CABANG';
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userRole', detectedRole);
                    localStorage.setItem('activeCabang', cleanId);
                    setUserRole(detectedRole); setActiveCabang(cleanId); setIsLoggedIn(true);
                } else {
                    setShakeLogin(true); showToast(res.message || 'ID atau Password Salah', 'error');
                }
                setLoading(false);
            };

            const handleLogout = () => {
                localStorage.removeItem('isLoggedIn'); localStorage.removeItem('userRole'); localStorage.removeItem('activeCabang');
                setIsLoggedIn(false); setUserRole(''); setActiveCabang('');
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-[#1C1C1E] flex items-center justify-center p-6">
                        <div className={`bg-white/10 backdrop-blur-md p-10 rounded-[2.5rem] w-full max-w-md border border-white/5 shadow-2xl ${shakeLogin ? 'animate-shake' : ''}`}>
                            <div className="text-center mb-10">
                                <img src={LOGO_URL} alt="Bugar Logo" className="h-16 mx-auto mb-4 drop-shadow-[0_0_15px_rgba(255,59,48,0.6)]" />
                                <h1 className="text-3xl font-black text-white tracking-tighter uppercase">Bugar Connect</h1>
                                <p className="text-[10px] text-[#FF3B30] uppercase font-black tracking-widest mt-2">Portal Management V5.1</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="text" placeholder="ID AKSES" required className="w-full p-5 rounded-2xl bg-black/40 text-white outline-none border border-transparent focus:border-[#FF3B30] uppercase font-bold transition-all text-center tracking-widest" value={loginData.id} onChange={(e) => setLoginData({...loginData, id: e.target.value})} />
                                <input type="password" placeholder="PASSWORD" required className="w-full p-5 rounded-2xl bg-black/40 text-white outline-none border border-transparent focus:border-[#FF3B30] font-bold transition-all text-center tracking-widest" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} />
                                <button type="submit" disabled={loading} className="w-full bg-[#FF3B30] text-white font-black py-5 mt-2 rounded-2xl active:scale-95 transition-all shadow-[0_10px_30px_rgba(255,59,48,0.3)] tracking-widest uppercase">
                                    {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : "MASUK SEKARANG"}
                                </button>
                            </form>
                        </div>
                        {toast.show && <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-white font-black text-[10px] uppercase tracking-[0.2em] z-[100] animate-bounce shadow-2xl ${toast.type === 'success' ? 'bg-[#1C1C1E]' : 'bg-[#FF3B30]'}`}>{toast.message}</div>}
                    </div>
                );
            }

            return (
                <div>
                    {userRole === 'OWNER' ? <OwnerView onLogout={handleLogout} /> : <CashierView activeCabang={activeCabang} onLogout={handleLogout} sendToN8N={sendToN8N} showToast={showToast} />}
                    {toast.show && <div className={`fixed bottom-24 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-white font-black text-[10px] uppercase tracking-[0.2em] z-[100] animate-bounce shadow-2xl ${toast.type === 'success' ? 'bg-[#1C1C1E]' : 'bg-[#FF3B30]'}`}>{toast.message}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
