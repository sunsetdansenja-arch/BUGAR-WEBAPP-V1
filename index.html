<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bugar Connect V5.15 - Cashier Portal</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: {
                        appleRed: '#FF453A',
                        appleDark: '#09090B',
                        appleCard: '#18181B'
                    },
                    animation: { 
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)', 
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'shake': 'shake 0.4s ease-in-out'
                    }, 
                    keyframes: { 
                        slideUp: { 
                            '0%': { opacity: '0', transform: 'translateY(20px) scale(0.98)' }, 
                            '100%': { opacity: '1', transform: 'translateY(0) scale(1)' } 
                        }, 
                        fadeIn: { 
                            '0%': { opacity: '0' }, 
                            '100%': { opacity: '1' } 
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-5px)' },
                            '50%': { transform: 'translateX(5px)' },
                            '75%': { transform: 'translateX(-5px)' }
                        }
                    } 
                } 
            } 
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000000;
        }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input, select, textarea { font-size: 16px !important; }
        
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(24, 24, 27, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
</head>
<body class="text-white selection:bg-appleRed selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect, useMemo, useRef } = React;

        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/239f820a-2d32-4432-a4b1-af48e7f97550";
        const LOGO_URL = "https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png";
        
        // Menu pilihan drop-down dibersihkan tanpa teks harga Rp 300.000
        const PAKET_STANDAR = ["Paket 1 (70 Menit) - Rp 100.000", "Paket 2 (90 Menit) - Rp 120.000", "Paket 3 (120 Menit) - Rp 140.000", "Paket 4 (120 Menit) - Rp 150.000", "Paket 5 (120 Menit) - Rp 150.000", "Paket 6 (120 Menit) - Rp 170.000", "Paket 7 (120 Menit) - Rp 200.000", "Chiropractic"];
        const PAKET_LHOKSEUMAWE = ["Paket 1 (1.5 Jam) - Rp 100.000", "Paket 2 (2 Jam) - Rp 120.000", "Paket 3 (2 Jam) - Rp 130.000", "Paket 4 (2 Jam) - Rp 150.000", "Paket 5 (2.5 Jam) - Rp 200.000", "Paket 6 (2 Jam) - Rp 150.000", "Chiropractic", "Paket 8 (2.5 Jam) - Rp 200.000", "Paket 9 (2.5 Jam) - Rp 200.000", "Paket 10 (3 Jam) - Rp 350.000"];
        const PAKET_HOTEL = ["Paket Hotel Hermes - Rp 180.000", "Paket Hotel Kriyad - Rp 200.000", "Paket Hotel Plum Lading - Rp 160.000", "Paket Hotel The Pade - Rp 180.000", "Paket Premium (Hotel) - Rp 220.000", "Paket Reguler (Hotel) - Rp 200.000", "Paket Standart (Hotel) - Rp 180.000"];
        const PAKET_NON = ["BODY MASSAGE (60 Menit) - Rp 80.000", "REFLEKSI (60 Menit) - Rp 80.000", "BEKAM BASAH (60 Menit) - Rp 80.000", "LULUR - Rp 80.000", "TOTOK WAJAH (20 Menit) - Rp 60.000", "PIJAT KEPALA (20 Menit) - Rp 60.000", "TERAPI TELINGA - Rp 60.000", "BEKAM KERING - Rp 50.000"];
        
        const formatIDR = (val) => 'Rp ' + Number(val || 0).toLocaleString('id-ID');

        const WelcomeNotification = () => {
            const [show, setShow] = useState(false);
            useEffect(() => {
                const wib = new Date(new Date().getTime() + (new Date().getTimezoneOffset() * 60000) + (3600000 * 7));
                const month = wib.getMonth() + 1;
                const date = wib.getDate();
                if (month < 5 || (month === 5 && date <= 23)) {
                    setShow(true);
                }
            }, []);

            if (!show) return null;

            return (
                <div className="max-w-xl mx-auto px-4 mt-4 animate-slide-up">
                    <div className="glass-panel rounded-2xl p-4 flex items-center justify-between shadow-[0_10px_30px_rgba(255,69,58,0.15)] relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-1 h-full bg-appleRed"></div>
                        <div className="flex items-center gap-4 pl-2">
                            <div className="w-10 h-10 bg-appleRed/20 rounded-full flex items-center justify-center text-appleRed shrink-0">
                                <i className="fa-solid fa-sparkles"></i>
                            </div>
                            <div>
                                <h4 className="text-white font-black text-sm tracking-tight uppercase">Update Bugar 2.0!</h4>
                                <p className="text-white/50 font-bold text-[10px] tracking-widest uppercase mt-0.5">Selamat datang kembali di sistem baru.</p>
                            </div>
                        </div>
                        <button onClick={() => setShow(false)} className="text-white/40 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 shrink-0">
                            <i className="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const HotelDateRangePicker = ({ value, onChange, title }) => {
            const [step, setStep] = useState(0); const [showModal, setShowModal] = useState(false);
            const days = useMemo(() => {
                const arr = []; const today = new Date(); today.setHours(0,0,0,0);
                const getLocalIso = (d) => new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                for(let i=34; i>=0; i--) { const d = new Date(today); d.setDate(d.getDate() - i); arr.push({ date: d, iso: getLocalIso(d), dayStr: d.getDate(), isToday: i===0 }); } return arr;
            }, []);
            const handleDayClick = (iso) => { if (step === 0 || iso < value.start) { onChange({ start: iso, end: iso }); setStep(1); } else { onChange({ ...value, end: iso }); setStep(0); setShowModal(false); } };
            const formatDateStr = (iso) => { if(!iso) return "-"; const d = new Date(iso); return d.toLocaleDateString('id-ID', {day:'numeric', month:'short'}); };

            return (
                <div className="w-full">
                    <label className="text-[10px] uppercase font-black tracking-widest mb-2 block text-white/50">{title || "Pilih Rentang Waktu"}</label>
                    <div onClick={() => {setShowModal(true); setStep(0);}} className="bg-[#1C1C1E] border border-white/5 text-white hover:border-appleRed/50 rounded-2xl p-4 flex justify-between items-center cursor-pointer active:scale-95 transition-all shadow-inner">
                        <div className="flex gap-4 items-center"><i className="fa-regular fa-calendar text-appleRed text-xl"></i><div><p className="text-[10px] font-bold uppercase tracking-widest text-white/50">Mulai</p><p className="text-base font-black">{formatDateStr(value.start)}</p></div></div>
                        <div className="h-8 w-[1px] bg-white/10"></div>
                        <div className="text-right"><p className="text-[10px] font-bold uppercase tracking-widest text-white/50">Selesai</p><p className="text-base font-black">{formatDateStr(value.end)}</p></div>
                    </div>
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-fade-in">
                            <div className="bg-[#18181B] w-full max-w-sm rounded-[2.5rem] p-6 shadow-[0_30px_60px_rgba(0,0,0,0.8)] border border-white/10 animate-slide-up relative overflow-hidden">
                                <div className="text-center mb-6"><h3 className="text-lg font-black uppercase tracking-tight text-white">{step === 0 ? "Pilih Tanggal Mulai" : "Pilih Tanggal Selesai"}</h3><p className="text-[10px] text-appleRed font-bold uppercase tracking-widest mt-1">Maksimal 35 Hari Ke Belakang</p></div>
                                <div className="grid grid-cols-7 gap-2 mb-2">{['Min','Sen','Sel','Rab','Kam','Jum','Sab'].map(d=><div key={d} className="text-center text-[9px] font-black text-white/40 uppercase">{d}</div>)}</div>
                                <div className="grid grid-cols-7 gap-y-2 gap-x-0 relative">
                                    {Array.from({length: days[0].date.getDay()}).map((_,i) => <div key={`blank-${i}`} />)}
                                    {days.map((d, i) => {
                                        const isStart = d.iso === value.start; const isEnd = d.iso === value.end; const inRange = d.iso > value.start && d.iso < value.end;
                                        let bgClass = "bg-transparent text-white/70 hover:bg-white/5 rounded-full";
                                        if (isStart || isEnd) bgClass = "bg-appleRed text-white shadow-[0_0_15px_rgba(255,69,58,0.5)] z-10 scale-110 rounded-full";
                                        else if (inRange) bgClass = "bg-appleRed/20 text-appleRed rounded-none";
                                        else if (d.isToday) bgClass = "bg-white/10 text-white border border-white/20 rounded-full";
                                        let wrapperClass = "flex justify-center items-center h-10 w-full relative cursor-pointer";
                                        if(isStart && value.start !== value.end) wrapperClass += " rounded-l-full bg-appleRed/20";
                                        if(isEnd && value.start !== value.end) wrapperClass += " rounded-r-full bg-appleRed/20";
                                        return (<div key={i} className={wrapperClass} onClick={() => handleDayClick(d.iso)}><div className={`w-8 h-8 flex items-center justify-center font-bold text-sm transition-all ${bgClass}`}>{d.dayStr}</div></div>)
                                    })}
                                </div>
                                <button onClick={()=>setShowModal(false)} className="mt-8 w-full py-4 bg-white/5 text-white/70 font-black uppercase tracking-widest rounded-2xl active:scale-95 text-xs hover:bg-white/10 hover:text-white transition-all border border-white/5">Batalkan</button>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        const CashierView = ({ activeCabang, onLogout, sendToN8N, showToast }) => {
            const [mode, setMode] = useState('pemasukan'); 
            const [stats, setStats] = useState({ hariIni: 0, bulanIni: 0, hariIniCash: 0, hariIniTransfer: 0 });
            const [history, setHistory] = useState([]);
            const [expenseHistory, setExpenseHistory] = useState([]);
            
            const [holdList, setHoldList] = useState([]);
            const [executingHoldId, setExecutingHoldId] = useState(null);

            const [formData, setFormData] = useState({ NAMA_PASIEN: '', NOMOR_CUSTOMER: '', PAKET: '', TAGIHAN: '', TERAPIS: ''});
            const [expenseData, setExpenseData] = useState({ NAMA_PENGELUARAN: '', NOMINAL: '', KETERANGAN: '' });

            const [reqBonus, setReqBonus] = useState(false);
            const [alasanBonus, setAlasanBonus] = useState('Pasien Ke-4 (40%)');

            const [loading, setLoading] = useState(false);
            const [fetching, setFetching] = useState(false);
            
            const [kategoriMenu, setKategoriMenu] = useState('REGULER');
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const dropdownRef = useRef(null);

            const isoToday = new Date(new Date().getTime() - (new Date().getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const [filterRekap, setFilterRekap] = useState({ start: isoToday, end: isoToday });

            const loadDashboardData = useCallback(async (isInitial = false) => {
                if (isInitial) setFetching(true);
                const res = await sendToN8N('load_data', { CABANG_ID: activeCabang });
                if (res && (res.status === 'success' || res.history)) {
                    setStats(res.stats || { hariIni: 0, bulanIni: 0, hariIniCash: 0, hariIniTransfer: 0 });
                    
                    const fullHistory = res.history || [];
                    const activeHolds = fullHistory.filter(h => h.TANGGAL === isoToday && (h.METODE_BAYAR || '').toUpperCase() === 'HOLD');
                    const validHistory = fullHistory.filter(h => (h.METODE_BAYAR || '').toUpperCase() !== 'HOLD');

                    setHoldList(activeHolds);
                    setHistory(validHistory);
                    setExpenseHistory(res.expenseHistory || []); 
                    
                    const arrDates = validHistory.map(h => h.TANGGAL).sort();
                    if(arrDates.length > 0 && isInitial) setFilterRekap({ start: arrDates[0], end: isoToday });
                }
                if (isInitial) setFetching(false);
            }, [activeCabang]);

            useEffect(() => { loadDashboardData(true); }, [loadDashboardData]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsDropdownOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [dropdownRef]);

            const expenseHariIniKasir = expenseHistory.filter(e => e.TANGGAL === isoToday).reduce((sum, item) => sum + (Number(item.NOMINAL)||0), 0);
            const targetSetoran = stats.hariIniCash - expenseHariIniKasir;

            const rekapTerapis = useMemo(() => {
                const recapMap = {};
                history.forEach(item => {
                    if (item.TANGGAL < filterRekap.start || item.TANGGAL > filterRekap.end) return;
                    if (Number(item.TAGIHAN) === 0) return;
                    const namaTrp = item.TERAPIS || "Tanpa Nama";
                    if (!recapMap[namaTrp]) recapMap[namaTrp] = { nama: namaTrp, pasien: 0, komisi: 0, riwayat: [] };
                    recapMap[namaTrp].pasien += 1;
                    recapMap[namaTrp].komisi += Number(item.BAGI_TERAPIS) || 0;
                    recapMap[namaTrp].riwayat.push(item);
                });
                return Object.values(recapMap).sort((a,b) => b.komisi - a.komisi);
            }, [history, filterRekap]);

            const isLhokseumawe = activeCabang === 'BUGAR8' || activeCabang === 'BUGAR13';

            const estimasiBagiHasil = useMemo(() => {
                if (!formData.TAGIHAN || formData.TAGIHAN <= 0) return null;
                
                const wib = new Date(new Date().getTime() + (new Date().getTimezoneOffset() * 60000) + (3600000 * 7));
                const jam = wib.getHours();
                const menit = wib.getMinutes();
                let isShiftMalam = false;
                if ((jam === 22 && menit >= 40) || jam >= 23 || jam < 7) { isShiftMalam = true; }

                const cleanTagihan = Number(formData.TAGIHAN);
                const paketName = String(formData.PAKET || "").toUpperCase();

                let bagiTerapis = 0;
                let bagiOwner = 0;
                let tipeHitungan = "Persentase 30%";

                // Deteksi murni berbasis kata kunci text "CHIROPRACTIC"
                let isChiropractic = paketName.includes("CHIROPRACTIC");

                if (isChiropractic) {
                    if (['BUGAR1', 'BUGAR2', 'BUGAR3', 'BUGAR4', 'BUGAR5'].includes(activeCabang)) {
                        const potonganOwner = cleanTagihan * 0.10;
                        const sisaTagihan = cleanTagihan - potonganOwner;
                        
                        bagiTerapis = sisaTagihan * 0.50;
                        const bagiHasilOwner = sisaTagihan * 0.50;
                        
                        bagiOwner = potonganOwner + bagiHasilOwner; 
                        tipeHitungan = "Chiro (Potong 10%, Sisa 50:50)";
                    } else {
                        bagiTerapis = 100000;
                        bagiOwner = cleanTagihan - bagiTerapis;
                        tipeHitungan = "Flat Paket Khusus";
                    }
                } 
                else if (paketName.includes("HERMES")) {
                    bagiTerapis = 54000; bagiOwner = cleanTagihan - bagiTerapis; tipeHitungan = "Flat Hotel Hermes";
                }
                else if (paketName.includes("BODY MASSAGE (60 MENIT)")) { bagiTerapis = 30000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("REFLEKSI (60 MENIT)")) { bagiTerapis = 30000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("BEKAM BASAH")) { bagiTerapis = 30000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("LULUR")) { bagiTerapis = 30000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("TOTOK WAJAH")) { bagiTerapis = 20000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("PIJAT KEPALA")) { bagiTerapis = 20000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("TERAPI TELINGA")) { bagiTerapis = 20000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (paketName.includes("BEKAM KERING")) { bagiTerapis = 20000; tipeHitungan = "Flat Non-Paket"; bagiOwner = cleanTagihan - bagiTerapis; } 
                else if (!paketName.includes("PAKET") && !paketName.includes("HOTEL") && paketName !== "") { 
                    bagiTerapis = cleanTagihan * 0.30; tipeHitungan = "Ala Carte (30%)"; bagiOwner = cleanTagihan - bagiTerapis;
                } else {
                    let persenTerapis = isShiftMalam ? 0.40 : 0.30;
                    bagiTerapis = cleanTagihan * persenTerapis;
                    bagiOwner = cleanTagihan - bagiTerapis;
                    let labelPersen = persenTerapis * 100;
                    tipeHitungan = isShiftMalam ? `Lembur/Overtime (${labelPersen}%)` : `Reguler (${labelPersen}%)`;
                    if (reqBonus) tipeHitungan += " + Request ACC";
                }

                return { bagiOwner, bagiTerapis, tipeHitungan };
            }, [formData.TAGIHAN, formData.PAKET, reqBonus, activeCabang]);

            const handleSelectPaket = (selectedPaket) => {
                let autoHarga = formData.TAGIHAN;
                // Kosongkan form input harga khusus chiropractic agar nominal fleksibel bisa diisi sendiri
                if (selectedPaket === "Chiropractic") {
                    autoHarga = "";
                } else if (selectedPaket && !selectedPaket.includes("Ala Carte")) { 
                    const match = selectedPaket.match(/Rp\s*([\d.]+)/); 
                    if (match && match[1]) autoHarga = match[1].replace(/\./g, ''); 
                } else if (selectedPaket.includes("Ala Carte")) { autoHarga = ""; }
                
                setFormData({ ...formData, PAKET: selectedPaket, TAGIHAN: autoHarga });
                setIsDropdownOpen(false);
            };

            const activeListPaket = useMemo(() => {
                if (kategoriMenu === 'REGULER') return isLhokseumawe ? PAKET_LHOKSEUMAWE : PAKET_STANDAR;
                if (kategoriMenu === 'HOTEL') return PAKET_HOTEL;
                return PAKET_NON;
            }, [kategoriMenu, isLhokseumawe]);

            const handleOrderSubmit = async (metodeDipilih) => {
                if(!formData.NAMA_PASIEN || !formData.TAGIHAN || !formData.TERAPIS) {
                    showToast('Harap lengkapi Nama, Tagihan, dan Terapis', 'error'); return;
                }

                setLoading(true);
                const terapisName = formData.TERAPIS.trim().toUpperCase();
                const pasienHariIni = history.filter(h => h.TANGGAL === isoToday && (h.TERAPIS || "").toUpperCase() === terapisName && Number(h.TAGIHAN) > 0).length;
                const pasienKe = pasienHariIni + 1;

                const payload = { 
                    ...formData, 
                    METODE_BAYAR: metodeDipilih,
                    CABANG_ID: activeCabang, 
                    PASIEN_KE: pasienKe,
                    REQ_BONUS: reqBonus,
                    ALASAN_BONUS: reqBonus ? alasanBonus : "-"
                };

                const res = await sendToN8N('insert', payload);
                if (res && (res.id || res.status === 'success')) {
                    setFormData({ NAMA_PASIEN: '', NOMOR_CUSTOMER: '', PAKET: '', TAGIHAN: '', TERAPIS: '' });
                    setReqBonus(false); setAlasanBonus('Pasien Ke-4 (40%)');
                    
                    if(metodeDipilih === 'HOLD') {
                        showToast('Order Ditunda (Masuk Antrean Hold)');
                    } else {
                        showToast(reqBonus ? 'Order Lunas & Bonus Diajukan!' : 'Transaksi Berhasil Disimpan'); 
                    }
                    await loadDashboardData();
                } else { showToast('Gagal Menyimpan', 'error'); }
                setLoading(false);
            };

            const handlePayHold = async (holdItem, metodeFinal) => {
                setExecutingHoldId(holdItem.db_id);
                
                const payload = {
                    id_database: holdItem.db_id,
                    METODE_BAYAR: metodeFinal,
                    NOMOR_CUSTOMER: holdItem.NOMOR_CUSTOMER || "",
                    TERAPIS: holdItem.TERAPIS || ""
                };

                const res = await sendToN8N('pay_hold', payload);
                if (res && res.status === 'success') {
                    showToast(`Antrean ${holdItem.NAMA_PASIEN} dilunaskan!`);
                    await loadDashboardData();
                } else {
                    showToast('Gagal melunaskan order', 'error');
                }
                setExecutingHoldId(null);
            };

            const handleExpenseSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                const res = await sendToN8N('insert_expense', { ...expenseData, CABANG_ID: activeCabang });
                if (res && res.status === 'success') {
                    setExpenseData({ NAMA_PENGELUARAN: '', NOMINAL: '', KETERANGAN: '' });
                    showToast('Pengeluaran Berhasil Dicatat'); await loadDashboardData();
                } else { showToast('Gagal Mencatat', 'error'); }
                setLoading(false);
            };

            const TerapisAccordion = ({ t }) => {
                const [expanded, setExpanded] = useState(false);
                return (
                    <div className="bg-[#18181B] border border-white/5 rounded-[1.5rem] shadow-sm overflow-hidden mb-3 transition-colors duration-200">
                        <div className="p-5 flex justify-between items-center cursor-pointer hover:bg-white/5 transition-all" onClick={() => setExpanded(!expanded)}>
                            <div><p className="font-black text-lg uppercase text-white tracking-tight leading-none">{t.nama}</p><p className="text-[10px] text-white/50 font-bold uppercase tracking-widest mt-1.5">{t.pasien} Pasien Diselesaikan</p></div>
                            <div className="text-right"><p className="text-xl font-black text-[#32D74B] leading-none">{formatIDR(t.komisi)}</p><p className="text-[9px] text-white/40 font-black uppercase tracking-widest mt-2">Rincian {expanded ? '▲' : '▼'}</p></div>
                        </div>
                        {expanded && (
                            <div className="bg-appleDark p-5 border-t border-white/5 space-y-3 animate-fade-in">
                                {t.riwayat.map((r, i) => {
                                    // --- FILTER SISI READ KASIR (Paksa konversi teks lama di database agar rapi menjadi 'Chiropractic') ---

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(localStorage.getItem('cashier_isLoggedIn') === 'true');
            const [activeCabang, setActiveCabang] = useState(localStorage.getItem('cashier_activeCabang') || '');
            
            const [loginData, setLoginData] = useState({ id: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [shakeLogin, setShakeLogin] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const showToast = (message, type = 'success') => { setToast({ show: true, message, type }); setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000); };

            const sendToN8N = async (action, payload = {}) => {
                try {
                    const response = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, ...payload }) });
                    const text = await response.text(); if (!text) return {}; const rawData = JSON.parse(text);
                    let unwrapped = Array.isArray(rawData) ? rawData[0] : rawData; return (unwrapped && unwrapped.json) ? unwrapped.json : unwrapped;
                } catch (error) { showToast("Koneksi Error", 'error'); return { status: 'error' }; }
            };

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true); setShakeLogin(false);
                const cleanId = loginData.id.trim().toUpperCase(); const cleanPass = loginData.password.trim();
                
                if (cleanId.includes('OWNER') || cleanId.includes('MASTER') || cleanId.includes('SUPERVISOR') || cleanId.includes('LOGISTIK') || cleanId.includes('KEUANGAN')) {
                    setShakeLogin(true); showToast('Akses Ditolak! Silakan login di portal khusus divisi Anda.', 'error'); setLoading(false); return;
                }

                const res = await sendToN8N('login', { id: cleanId, password: cleanPass });
                
                if (res && res.status === 'success') {
                    localStorage.setItem('cashier_isLoggedIn', 'true'); 
                    localStorage.setItem('cashier_activeCabang', cleanId);
                    setActiveCabang(cleanId); setIsLoggedIn(true);
                } else { setShakeLogin(true); showToast(res.message || 'ID atau Password Salah', 'error'); }
                setLoading(false);
            };

            const handleLogout = () => { 
                localStorage.removeItem('cashier_isLoggedIn');
                localStorage.removeItem('cashier_activeCabang');
                setIsLoggedIn(false); setActiveCabang(''); 
            };

            const FloatingToast = () => {
                if(!toast.show) return null;
                const isError = toast.type === 'error';
                return (
                    <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[100] animate-slide-up w-[90%] max-w-sm">
                        <div className={`backdrop-blur-xl border p-4 rounded-2xl shadow-[0_20px_40px_rgba(0,0,0,0.5)] flex items-center gap-3 ${isError ? 'bg-[#18181B]/90 border-appleRed/50' : 'bg-[#18181B]/90 border-[#32D74B]/50'}`}>
                            <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${isError ? 'bg-appleRed/20 text-appleRed' : 'bg-[#32D74B]/20 text-[#32D74B]'}`}>
                                <i className={`fa-solid ${isError ? 'fa-triangle-exclamation' : 'fa-check'}`}></i>
                            </div>
                            <p className="text-white font-bold text-xs uppercase tracking-widest">{toast.message}</p>
                        </div>
                    </div>
                )
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-black flex items-center justify-center p-6 pb-24 relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-96 h-96 bg-appleRed/10 rounded-full blur-[100px] pointer-events-none"></div>
                        <div className={`glass-panel p-10 rounded-[3rem] w-full max-w-md shadow-[0_30px_60px_rgba(0,0,0,0.8)] relative z-10 ${shakeLogin ? 'animate-shake' : ''}`}>
                            <div className="text-center mb-10"><img src={LOGO_URL} alt="Bugar Logo" className="h-20 mx-auto mb-5 drop-shadow-[0_0_20px_rgba(255,69,58,0.4)] brightness-200 contrast-200" /><h1 className="text-3xl font-black text-white tracking-tighter uppercase leading-none mb-1">Bugar Connect</h1><p className="text-[10px] text-white/40 uppercase font-black tracking-[0.3em] mt-2">Cashier System V5.15</p></div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <input type="text" placeholder="LOGIN ID (CABANG)" required className="w-full p-5 rounded-2xl bg-appleDark text-white placeholder-white/30 outline-none border border-white/5 focus:border-appleRed uppercase font-bold transition-all text-center tracking-widest text-base shadow-inner focus:ring-1 focus:ring-appleRed/30" value={loginData.id} onChange={(e) => setLoginData({...loginData, id: e.target.value})} />
                                <input type="password" placeholder="PASSWORD" required className="w-full p-5 rounded-2xl bg-appleDark text-white placeholder-white/30 outline-none border border-white/5 focus:border-appleRed font-bold transition-all text-center tracking-widest text-base shadow-inner focus:ring-1 focus:ring-appleRed/30" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} />
                                <button type="submit" disabled={loading} className="w-full bg-appleRed text-white font-black py-5 mt-2 rounded-2xl active:scale-95 transition-all shadow-[0_10px_30px_rgba(255,69,58,0.3)] tracking-widest uppercase text-base hover:bg-[#D70015] border border-appleRed/50">{loading ? <i className="fa-solid fa-spinner fa-spin"></i> : "MASUK KE KASIR"}</button>
                            </form>
                        </div>
                        <FloatingToast />
                    </div>
                );
            }

            return (
                <div>
                    <CashierView activeCabang={activeCabang} onLogout={handleLogout} sendToN8N={sendToN8N} showToast={showToast} />
                    <FloatingToast />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
