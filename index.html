<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bugar Connect - Management</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-8px)' }, '75%': { transform: 'translateX(8px)' } },
                        slideUp: { 'from': { opacity: '0', transform: 'translateY(20px)' }, 'to': { opacity: '1', transform: 'translateY(0)' } }
                    },
                    animation: { shake: 'shake 0.3s ease-in-out', 'slide-up': 'slideUp 0.5s ease-out' }
                }
            }
        }
    </script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; font-family: 'Inter', -apple-system, sans-serif; }
        input, select { font-size: 16px !important; } /* Cegah zoom otomatis di iPhone */
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#1C1C1E]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect } = React;

        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/239f820a-2d32-4432-a4b1-af48e7f97550";
        const LOGO_URL = "https://raw.githubusercontent.com/sunsetdansenja-arch/BUGAR-WEBAPP-V1/main/logo%20bugar.png";

        const DAFTAR_PAKET = [
            { n: "Paket 1 (70m) - Rp 100k", p: 100000 },
            { n: "Paket 2 (90m) - Rp 120k", p: 120000 },
            { n: "Paket 3 (120m) - Rp 140k", p: 140000 },
            { n: "Paket 4 (120m) - Rp 150k", p: 150000 },
            { n: "Paket 5 (120m) - Rp 150k", p: 150000 },
            { n: "Paket 6 (120m) - Rp 170k", p: 170000 },
            { n: "Paket 7 (120m) - Rp 200k", p: 200000 },
            { n: "Paket 8 - Chiropractic Rp 300k", p: 300000 }
        ];

        const formatIDR = (val) => 'Rp ' + Number(val || 0).toLocaleString('id-ID');

        // ==========================================
        // 1. KOMPONEN DASHBOARD OWNER
        // ==========================================
        const OwnerView = ({ onLogout }) => {
            const [data, setData] = useState({ grandTotalHariIni: 0, grandTotalBulanIni: 0, leaderboard: [], trenHari: [], topTerapis: [] });
            const [loading, setLoading] = useState(true);
            const [refreshing, setRefreshing] = useState(false);

            const loadOwnerData = async (isRefresh = false) => {
                if (isRefresh) setRefreshing(true); else setLoading(true);
                try {
                    const res = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'owner_load' })
                    });
                    const result = await res.json();
                    let finalData = Array.isArray(result) ? result[0] : result;
                    if (finalData && finalData.json) finalData = finalData.json;
                    setData(finalData || { grandTotalHariIni: 0, grandTotalBulanIni: 0, leaderboard: [], trenHari: [], topTerapis: [] });
                } catch (e) { console.error("Gagal load"); }
                setLoading(false); setRefreshing(false);
            };

            useEffect(() => { loadOwnerData(); }, []);

            const handleShareWA = () => {
                let text = `*📊 LAPORAN BUGAR REFLEKSI*\n\n`;
                text += `💰 *Omset Hari Ini*: ${formatIDR(data.grandTotalHariIni)}\n`;
                text += `📈 *Akumulasi Bulan Ini*: ${formatIDR(data.grandTotalBulanIni)}\n\n`;
                if (data.leaderboard && data.leaderboard.length > 0) {
                    text += `🏆 *Top 3 Cabang Hari Ini*:\n`;
                    data.leaderboard.slice(0, 3).forEach((c, idx) => { text += `${idx + 1}. ${c.id} - ${formatIDR(c.omsetHariIni)}\n`; });
                }
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            };

            const maxPasien = data.trenHari?.length > 0 ? Math.max(...data.trenHari.map(d => d.pasien), 1) : 1;

            if (loading) return (
                <div className="min-h-screen bg-[#000000] flex items-center justify-center">
                    <img src={LOGO_URL} className="w-20 h-20 animate-pulse mb-4 object-contain" />
                </div>
            );

            return (
                <div className="min-h-screen bg-[#000000] text-white pb-24 font-sans animate-slide-up">
                    <div className="bg-[#1C1C1E] px-6 py-10 rounded-b-[3rem] shadow-2xl border-b-2 border-[#FF3B30]/30 text-center">
                        <div className="max-w-xl mx-auto flex flex-col items-center">
                            <img src={LOGO_URL} className="w-16 h-16 mb-4 object-contain" />
                            <h1 className="text-3xl font-black tracking-tighter uppercase leading-none text-white">Bugar Analytics</h1>
                            <p className="text-[#FF3B30] font-black text-[10px] uppercase tracking-[0.4em] mt-2">Executive Portal</p>
                            
                            <div className="flex gap-4 mt-8 w-full">
                                <button onClick={() => loadOwnerData(true)} className="flex-1 p-4 bg-white/5 rounded-2xl border border-white/10 flex items-center justify-center gap-2">
                                    <i className={`fa-solid fa-rotate-right ${refreshing ? 'fa-spin text-[#FF3B30]' : ''}`}></i> REFRESH
                                </button>
                                <button onClick={onLogout} className="flex-1 p-4 bg-[#FF3B30]/10 text-[#FF3B30] rounded-2xl border border-[#FF3B30]/20 flex items-center justify-center gap-2">
                                    <i className="fa-solid fa-right-from-bracket"></i> KELUAR
                                </button>
                            </div>

                            <div className="bg-[#FF3B30] p-8 rounded-[2.5rem] shadow-[0_20px_50px_rgba(255,59,48,0.3)] w-full mt-6 relative overflow-hidden text-left">
                                <p className="text-white/80 font-black uppercase tracking-widest text-[10px] mb-2">Total Omset Hari Ini</p>
                                <h2 className="text-4xl font-black tracking-tighter">{formatIDR(data.grandTotalHariIni)}</h2>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-xl mx-auto p-6 space-y-6">
                        {/* CHART & LEADERBOARD SAMA SEPERTI SEBELUMNYA */}
                        <div className="bg-[#1C1C1E] p-8 rounded-[2.5rem] border border-white/5">
                            <h3 className="text-sm font-black uppercase tracking-[0.2em] text-white mb-8 flex items-center gap-3"><i className="fa-solid fa-chart-column text-[#FF3B30]"></i> Tren Keramaian</h3>
                            <div className="space-y-4">
                                {data.trenHari && data.trenHari.map((item, idx) => (
                                    <div key={idx} className="flex items-center gap-4">
                                        <div className="w-16 text-[10px] font-black uppercase text-gray-400">{item.hari}</div>
                                        <div className="flex-1 h-6 bg-black rounded-full overflow-hidden relative border border-white/5">
                                            <div className="absolute top-0 left-0 h-full bg-[#FF3B30] rounded-full" style={{ width: `${(item.pasien / maxPasien) * 100}%` }}></div>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-[9px] font-black text-white">{item.pasien} Pax</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-[#1C1C1E] p-8 rounded-[2.5rem] border border-white/5">
                            <h3 className="text-sm font-black uppercase tracking-[0.2em] text-white mb-6 flex items-center gap-3"><i className="fa-solid fa-trophy text-[#FF3B30]"></i> Performa Cabang</h3>
                            <div className="space-y-3">
                                {data.leaderboard && data.leaderboard.map((cabang, idx) => (
                                    <div key={cabang.id} className="bg-black p-5 rounded-2xl border border-white/5 flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <div className="w-8 h-8 rounded-lg bg-[#1C1C1E] flex items-center justify-center font-black text-xs">{idx + 1}</div>
                                            <h4 className="font-black text-sm uppercase text-white">{cabang.id}</h4>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-md font-black text-[#FF3B30]">{formatIDR(cabang.omsetHariIni)}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                    
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xl px-6 z-50">
                        <button onClick={handleShareWA} className="w-full bg-[#FF3B30] text-white p-5 rounded-full font-black uppercase tracking-widest text-xs shadow-2xl flex justify-center items-center gap-3 active:scale-95 transition-all">
                            <i className="fa-solid fa-share-nodes"></i> Kirim Laporan WA
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 2. KOMPONEN DASHBOARD KASIR
        // ==========================================
        const CashierView = ({ activeCabang, onLogout, sendToN8N, showToast }) => {
            const [stats, setStats] = useState({ hariIni: 0, bulanIni: 0 });
            const [history, setHistory] = useState([]);
            const [formData, setFormData] = useState({ NAMA_PASIEN: '', NOMOR_CUSTOMER: '', PAKET: '', TAGIHAN: '', TERAPIS: '' });
            const [loading, setLoading] = useState(false);
            const [fetching, setFetching] = useState(false);

            const loadDashboardData = useCallback(async (isInitial = false) => {
                if (isInitial) setFetching(true);
                const res = await sendToN8N('load_data', { CABANG_ID: activeCabang });
                if (res) { setStats(res.stats || { hariIni: 0, bulanIni: 0 }); setHistory(res.history || []); }
                setFetching(false);
            }, [activeCabang]);

            useEffect(() => { loadDashboardData(true); }, [loadDashboardData]);

            // Otomatis isi harga saat paket dipilih
            const handlePaketChange = (e) => {
                const paketName = e.target.value;
                const paketObj = DAFTAR_PAKET.find(p => p.n === paketName);
                setFormData({ ...formData, PAKET: paketName, TAGIHAN: paketObj ? paketObj.p : '' });
            };

            const handleSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                const res = await sendToN8N('insert', { ...formData, CABANG_ID: activeCabang });
                if (res) {
                    setFormData({ NAMA_PASIEN: '', NOMOR_CUSTOMER: '', PAKET: '', TAGIHAN: '', TERAPIS: '' });
                    showToast('Data Tersimpan'); await loadDashboardData();
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-[#F2F2F7] pb-10 animate-slide-up">
                    <nav className="bg-white border-b border-gray-200 p-4 sticky top-0 z-40 flex justify-between items-center">
                        <img src={LOGO_URL} className="h-8 object-contain" />
                        <div className="flex items-center gap-3">
                            <span className="text-[10px] font-black uppercase bg-gray-100 px-3 py-1 rounded-full">{activeCabang}</span>
                            <button onClick={onLogout} className="text-[#FF3B30] text-lg p-2"><i className="fa-solid fa-right-from-bracket"></i></button>
                        </div>
                    </nav>

                    <main className="max-w-xl mx-auto p-4 space-y-5">
                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-[#FF3B30] p-6 rounded-[2rem] text-white shadow-xl shadow-red-500/20">
                                <p className="text-[9px] uppercase font-black opacity-70 mb-1">Hari Ini</p>
                                <h3 className="text-xl font-black">{formatIDR(stats.hariIni)}</h3>
                            </div>
                            <div className="bg-[#1C1C1E] p-6 rounded-[2rem] text-white shadow-xl shadow-black/10">
                                <p className="text-[9px] uppercase font-black opacity-40 mb-1">Bulan Ini</p>
                                <h3 className="text-xl font-black">{formatIDR(stats.bulanIni)}</h3>
                            </div>
                        </div>

                        <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100">
                            <h4 className="font-black text-[10px] text-gray-400 mb-6 uppercase tracking-widest flex items-center gap-2">
                                <i className="fa-solid fa-plus-circle text-[#FF3B30]"></i> Input Transaksi Baru
                            </h4>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input type="text" placeholder="Nama Pasien" required className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold focus:ring-2 focus:ring-[#FF3B30]/20" value={formData.NAMA_PASIEN} onChange={e => setFormData({...formData, NAMA_PASIEN: e.target.value})} />
                                <input type="tel" placeholder="WA Pasien (Cth: 0812...)" required className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold focus:ring-2 focus:ring-[#FF3B30]/20" value={formData.NOMOR_CUSTOMER} onChange={e => setFormData({...formData, NOMOR_CUSTOMER: e.target.value})} />
                                <div className="grid grid-cols-2 gap-3">
                                    <select required className="p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold appearance-none" value={formData.PAKET} onChange={handlePaketChange}>
                                        <option value="">Pilih Paket</option>
                                        {DAFTAR_PAKET.map(p => <option key={p.n} value={p.n}>{p.n}</option>)}
                                    </select>
                                    <input type="number" placeholder="Total Rp" required className="p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold" value={formData.TAGIHAN} onChange={e => setFormData({...formData, TAGIHAN: e.target.value})} />
                                </div>
                                <input type="text" placeholder="Nama Terapis" required className="w-full p-4 bg-[#F2F2F7] rounded-2xl outline-none font-bold" value={formData.TERAPIS} onChange={e => setFormData({...formData, TERAPIS: e.target.value})} />
                                <button type="submit" disabled={loading} className="w-full bg-[#1C1C1E] text-white font-black py-5 rounded-2xl hover:bg-[#FF3B30] active:scale-95 transition-all shadow-lg tracking-widest text-sm">
                                    {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : "SIMPAN DATA"}
                                </button>
                            </form>
                        </div>
                        
                        <div className="space-y-3">
                            <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2">Histori Terakhir</p>
                            {history.map((item, idx) => (
                                <div key={idx} className="bg-white p-4 rounded-2xl border border-gray-100 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center font-black text-xs">{item.NAMA_PASIEN?.charAt(0)}</div>
                                        <div>
                                            <h5 className="font-black text-sm text-[#1C1C1E] leading-none mb-1">{item.NAMA_PASIEN}</h5>
                                            <p className="text-[9px] text-gray-400 font-bold uppercase">{item.PAKET}</p>
                                        </div>
                                    </div>
                                    <p className="text-sm font-black text-[#1C1C1E]">{formatIDR(item.TAGIHAN)}</p>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        // ==========================================
        // MAIN APP (LOGIN & SESSION)
        // ==========================================
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userRole, setUserRole] = useState(''); 
            const [activeCabang, setActiveCabang] = useState('');
            const [loginData, setLoginData] = useState({ id: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [shakeLogin, setShakeLogin] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '' });

            // CEK SESSION SAAT LOAD
            useEffect(() => {
                const savedLogin = localStorage.getItem('BUGAR_SESSION');
                if (savedLogin) {
                    const parsed = JSON.parse(savedLogin);
                    setUserRole(parsed.role);
                    setActiveCabang(parsed.id);
                    setIsLoggedIn(true);
                }
            }, []);

            const showToast = (message) => {
                setToast({ show: true, message });
                setTimeout(() => setToast({ show: false, message: '' }), 3000);
            };

            const sendToN8N = async (action, payload = {}) => {
                try {
                    const response = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, ...payload }) });
                    const rawData = await response.json();
                    let unwrapped = Array.isArray(rawData) ? rawData[0] : rawData;
                    return unwrapped.json || unwrapped;
                } catch (error) { showToast("Koneksi Error"); return null; }
            };

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true); setShakeLogin(false);
                const cleanId = loginData.id.trim().toUpperCase();
                const res = await sendToN8N('login', { id: cleanId, password: loginData.password });
                
                if (res && res.status === 'success') {
                    const role = cleanId.includes('OWNER') ? 'OWNER' : 'CABANG';
                    setUserRole(role);
                    setActiveCabang(cleanId);
                    setIsLoggedIn(true);
                    // SIMPAN SESSION
                    localStorage.setItem('BUGAR_SESSION', JSON.stringify({ id: cleanId, role }));
                } else {
                    setShakeLogin(true);
                    showToast('ID atau Password Salah');
                }
                setLoading(false);
            };

            const handleLogout = () => {
                localStorage.removeItem('BUGAR_SESSION');
                setIsLoggedIn(false);
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-[#1C1C1E] flex items-center justify-center p-6">
                        <div className={`bg-white/10 backdrop-blur-md p-10 rounded-[2.5rem] w-full max-w-md border border-white/5 shadow-2xl text-center ${shakeLogin ? 'animate-shake' : ''}`}>
                            <img src={LOGO_URL} className="w-24 h-24 mx-auto mb-6 object-contain" />
                            <h1 className="text-3xl font-black text-white tracking-tighter uppercase mb-8">Bugar Connect</h1>
                            <form onSubmit={handleLogin} className="space-y-4 text-left">
                                <input type="text" placeholder="ID AKSES" required className="w-full p-5 rounded-2xl bg-black/40 text-white outline-none border border-transparent focus:border-[#FF3B30] uppercase font-bold text-center tracking-widest" value={loginData.id} onChange={(e) => setLoginData({...loginData, id: e.target.value})} />
                                <input type="password" placeholder="PASSWORD" required className="w-full p-5 rounded-2xl bg-black/40 text-white outline-none border border-transparent focus:border-[#FF3B30] font-bold text-center tracking-widest" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} />
                                <button type="submit" disabled={loading} className="w-full bg-[#FF3B30] text-white font-black py-5 mt-4 rounded-2xl shadow-xl tracking-widest uppercase">
                                    {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : "MASUK"}
                                </button>
                            </form>
                        </div>
                        {toast.show && <div className="fixed bottom-10 px-8 py-4 rounded-full bg-[#FF3B30] text-white font-black text-[10px] uppercase tracking-widest animate-bounce z-[100]">{toast.message}</div>}
                    </div>
                );
            }

            return (
                <div>
                    {userRole === 'OWNER' ? <OwnerView onLogout={handleLogout} /> : <CashierView activeCabang={activeCabang} onLogout={handleLogout} sendToN8N={sendToN8N} showToast={showToast} />}
                    {toast.show && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full bg-[#1C1C1E] text-white font-black text-[10px] uppercase tracking-widest z-[100] animate-bounce">{toast.message}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
